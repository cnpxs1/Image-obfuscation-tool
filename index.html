    /**
     * 处理 Viewer.js 初始化失败的情况
     * @param {HTMLElement} container - 容器元素
     * @param {Object} imageData - 图片数据
     * @param {number} token - 并发控制令牌
     */
    async function handleViewerInitializationFailure(container, imageData, token) {
        // 检查是否被新调用取代
        if (isPreviewStale(token)) {
            logLog('预览操作已被取代，跳过失败处理');
            cleanupViewerResources(container);
            return;
        }
            
        // 清理容器并释放 Blob URL
        cleanupViewerResources(container);
            
        // 启用基础图片查看器作为兜底方案
        logLog('启用基础图片查看器作为替代方案');
            
        // 获取当前图片 Blob 并创建临时 URL
        try {
            const blob = await storage.get(`current_${imageData.id}`);
            if (blob) {
                const url = URL.createObjectURL(blob);
                showBasicImageViewer({ blobUrl: url, originalName: imageData.name });
            } else {
                logError('Viewer.js', `无法获取图片数据: ${imageData.id}`);
            }
        } catch (error) {
            logError('Viewer.js', `获取图片 Blob 失败: ${error.message || error}`);
        }
    }

    /**
     * 清理 Viewer.js 相关资源
     * @param {GalleryContainer} container - 容器元素
     * @param {boolean} [skipViewerDestroy=false] - 跳过 Viewer 实例销毁（批量清理时由调用方统一销毁）
     */
    function cleanupViewerResources(container, skipViewerDestroy = false) {
        // 重入防护：destroy() 可能触发 hidden 回调导致递归调用
        if (container && container._cleanedUp) return;
        if (container) container._cleanedUp = true;

        if (!skipViewerDestroy && viewerInstance) {
            try {
                viewerInstance.destroy();
            } catch (e) {
                logWarn('Viewer.js', `销毁 Viewer 实例出错: ${e.message || e}`);
            }
            viewerInstance = null;
        }
        if (container && container.parentNode) {
            // 清除所有图片加载超时定时器
            if (container._timeoutIds) {
                container._timeoutIds.forEach(id => clearTimeout(id));
                container._timeoutIds = null;
            }
            // 释放所有临时 blob URL
            revokeBlobUrlsInContainer(container);
            container.parentNode.removeChild(container);
        }
        logLog('Viewer.js 资源已清理');
    }
    
    /**
     * 窗口大小改变时的防抖处理
     * 避免频繁调用 update 导致性能问题
     */
    let resizeDebounceTimer = null;
    function handleWindowResize() {
        // 清除之前的定时器
        if (resizeDebounceTimer) {
            clearTimeout(resizeDebounceTimer);
        }
        
        // 防抖延迟 150ms
        resizeDebounceTimer = setTimeout(() => {
            if (viewerInstance && viewerInstance.update) {
                viewerInstance.update();
                logLog('窗口大小改变，已更新 Viewer 布局');

        }, 150);

    let isRefreshingThumbnails = false;  // 刷新锁，防止并发刷新

    /**
     * 刷新所有图片的缩略图

    async function refreshAllThumbnails() {

        }
        
        isRefreshingThumbnails = true;
        // 禁用按钮防止误操作
        if (refreshBtn) {
            refreshBtn.disabled = true;
            refreshBtn.style.opacity = '0.5';
            refreshBtn.style.cursor = 'not-allowed';
        }
        
        // 创建快照避免数组变化导致索引错乱
        const snapshot = [...images];
        const statusDiv = document.getElementById('batchStatus');
        const totalCount = snapshot.length;
        let successCount = 0;
        let failureCount = 0;
        
        statusDiv.innerHTML = `<div class="loading"></div> 正在刷新缩略图 (0/${totalCount})...`;
        
        try {
            // 串行刷新，避免大量并发导致内存压力
            for (let i = 0; i < totalCount; i++) {
                const imageData = snapshot[i];
                if (!imageData) continue;
                
                try {
                    const blob = await storage.get(`current_${imageData.id}`);
                    if (blob) {
                        // 清除旧缩略图缓存，确保进入视口时重新生成
                        await storage.delete(`thumb_${imageData.id}`);
                        await updateThumbnail(imageData.id, blob);
                        successCount++;
                    } else {
                        logWarn(imageData.name, 'Blob 数据不存在');
                        failureCount++;
                    }
                } catch (error) {
                    failureCount++;
                    logError(imageData.name, `刷新缩略图失败: ${error.message || '未知错误'}`);
                }
                
                // 更新进度显示
                const progress = Math.round((i + 1) / totalCount * 100);
                statusDiv.innerHTML = `正在刷新缩略图 ${i + 1}/${totalCount} (${progress}%)${progressBarHtml(progress)}`;
                
                // 让出控制权，避免阻塞UI
                await new Promise(resolve => setTimeout(resolve, 10));
            }
            
            showBatchStatus(successCount, failureCount, '刷新');
            
            logInfo('缩略图刷新', `缩略图刷新完成：成功 ${successCount}，失败 ${failureCount}`);
        } catch (error) {
            logError('缩略图刷新', `刷新缩略图过程出错: ${error.message || error}`);
            showTempStatus('❌ 刷新缩略图失败', 3000);
        } finally {
            isRefreshingThumbnails = false;
            // 恢复按钮状态
            if (refreshBtn) {
                refreshBtn.disabled = false;
                refreshBtn.style.opacity = '';
                refreshBtn.style.cursor = '';
            }
        }
    }

    /** 解析 rgb(r,g,b) 或 rgb(r g b) 字符串，返回 {r,g,b} 或 null */
    function normalizeRgb(input) {
        // 现代语法：rgb(255 255 255) 空格分隔
        const modernRegex = /rgb\(\s*(\d{1,3}%?)\s+(\d{1,3}%?)\s+(\d{1,3}%?)\s*\)/i;
        // 传统语法：rgb(255, 255, 255) 逗号分隔
        const legacyRegex = /rgb\(\s*(\d{1,3}%?)\s*,\s*(\d{1,3}%?)\s*,\s*(\d{1,3}%?)\s*\)/i;
        const match = input.match(modernRegex) || input.match(legacyRegex);
        if (!match) return null;
        const toInteger = (value) => {
            if (value.endsWith('%')) return Math.round(parseFloat(value) * 2.55);
            return parseInt(value, 10);
        };
        return { r: toInteger(match[1]), g: toInteger(match[2]), b: toInteger(match[3]) };
    }

        // 颜色输入框事件绑定
        const hexInput = document.getElementById('hex-input');
        const rgbRInput = document.getElementById('rgb-r-input');
        const rgbGInput = document.getElementById('rgb-g-input');
        const rgbBInput = document.getElementById('rgb-b-input');

        if (hexInput) {
            let isHexInputBusy = false;
            let lastValidValue = '#FFFFFF';

            hexInput.addEventListener('input', (e) => {
                if (isHexInputBusy) return;
                isHexInputBusy = true;
                
                let value = e.target.value.trim();
                // 移除所有 # 号，然后统一添加一个 #
                value = value.replace(/#/g, '');
                // 只保留十六进制字符
                value = '#' + value.replace(/[^0-9A-Fa-f]/g, '');
                
                // 检查是否超过FFFFFF
                const hexPart = value.substring(1).toUpperCase();
                if (hexPart.length > 6 || (hexPart.length === 6 && parseInt(hexPart, 16) > 0xFFFFFF)) {
                    // 超过限制，恢复到最后有效值
                    value = lastValidValue;
                } else {
                    // 更新最后有效值
                    lastValidValue = value;
                }
                
                requestAnimationFrame(() => {
                    e.target.value = value;
                    updateColorFromHex(value);
                    isHexInputBusy = false;
                });
            });
            
            // 防止删除 # 号
            hexInput.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' || e.key === 'Delete') {
                    const cursorPos = hexInput.selectionStart;
                    if (cursorPos <= 1) {
                        e.preventDefault();
                    }
                }
            });
            
            // 焦点进入时记录当前值
            hexInput.addEventListener('focus', () => {
                let value = hexInput.value.trim();
                value = value.replace(/#/g, '');
                value = '#' + value.replace(/[^0-9A-Fa-f]/g, '');
                if (value.length > 7) {
                    value = value.substring(0, 7);
                }
                lastValidValue = value;
            });
            
            // 粘贴时自动处理十六进制格式
            hexInput.addEventListener('paste', (e) => {
                const clipboardData = e.clipboardData || window.clipboardData;
                if (!clipboardData) return;
                const pasteText = clipboardData.getData('text');
                // 匹配十六进制颜色格式：#FFF, #FFFFFF, FFF, FFFFFF
                const hexRegex = /^#?([0-9A-Fa-f]{3}|[0-9A-Fa-f]{6})$/;
                
                if (hexRegex.test(pasteText.trim())) {
                    e.preventDefault();
                    let value = pasteText.trim();
                    // 移除所有 # 号
                    value = value.replace(/#/g, '');
                    // 统一添加 # 号
                    value = '#' + value.toUpperCase();
                    // 如果是3位，扩展为6位
                    if (value.length === 4) {
                        value = '#' + value[1] + value[1] + value[2] + value[2] + value[3] + value[3];
                    }
                    hexInput.value = value;
                    updateColorFromHex(value);
                    lastValidValue = value;
                }
            });
            
            // 失焦时同步所有输入框
            hexInput.addEventListener('blur', updateColorInputs);
        }
        
        // 为所有RGB输入框添加粘贴事件监听
        [rgbRInput, rgbGInput, rgbBInput].forEach(input => {
            if (input) {
                input.addEventListener('paste', (e) => {
                    const clipboardData = e.clipboardData || window.clipboardData;
                    if (!clipboardData) return;
                    const pasteText = clipboardData.getData('text');
                    const rgb = normalizeRgb(pasteText);
                    
                    if (rgb && rgbRInput && rgbGInput && rgbBInput) {
                        e.preventDefault();
                        rgbRInput.value = rgb.r;
                        rgbGInput.value = rgb.g;
                        rgbBInput.value = rgb.b;
                        updateColorFromRgb();
                    }
                });
            }
        });
        
        for (const input of [rgbRInput, rgbGInput, rgbBInput]) {
            if (!input) continue;
            input.addEventListener('input', () => {
                validateRgbInput(input);
                updateColorFromRgb();
            });
            input.addEventListener('blur', updateColorInputs);
        }

        function bindToggle(id, key, onChange) {
            const el = document.getElementById(id);
            if (!el) return;
            el.addEventListener('change', () => {
                if (!localStorageEnabled) return;
                saveSetting(key, el.checked);
                if (onChange) onChange(el.checked);
            });
            const saved = loadSetting(key);
            if (saved !== null) el.checked = saved === 'true';
            if (onChange) onChange(el.checked);
        }
        function bindSelect(id, key, callback) {
            const el = document.getElementById(id);
            if (!el) return;
            el.addEventListener('change', () => {
                if (!localStorageEnabled) return;
                saveSetting(key, el.value);
                if (callback) callback(el.value);
            });
            const saved = loadSetting(key);
            if (saved) {
                el.value = saved;
                if (callback) callback(saved);
            }
        }

        // 图片质量 slider 与 number input 双向同步
        const qualitySlider = document.getElementById('quality-slider');
        const qualityInput = document.getElementById('quality-input');

        function syncQuality(source, value) {
            const percent = Math.max(1, Math.min(100, parseInt(value) || 1));
            imageQuality = percent / 100;
            if (source !== 'slider' && qualitySlider) qualitySlider.value = percent;
            if (source !== 'input' && qualityInput) qualityInput.value = percent;
            if (localStorageEnabled) saveSetting('imageQuality', String(percent));
        }

        if (qualitySlider) {
            qualitySlider.addEventListener('input', () => syncQuality('slider', qualitySlider.value));
        }
        if (qualityInput) {
            qualityInput.addEventListener('input', () => {
                if (qualityInput.value === '') return;
                validateQualityInput(qualityInput);
                syncQuality('input', qualityInput.value);
            });
            qualityInput.addEventListener('blur', () => {
                validateQualityInput(qualityInput);
                syncQuality('input', qualityInput.value);
            });
        }

        // 初始化文字气泡（悬停+点击+边缘检测）
        const webpTooltip = document.querySelector('.text-tooltip');
        if (webpTooltip) initTextTooltip(webpTooltip);

        // 本地存储开关（必须在所有 bindToggle 前初始化，确保 loadSetting 正确判断）
        try {
            localStorageEnabled = localStorage.getItem('localStorageEnabled') !== 'false';
        } catch (e) {
            localStorageEnabled = true;
        }
        const lsToggle = document.getElementById('localstorage-toggle');
        if (lsToggle) {
            lsToggle.checked = localStorageEnabled;
            lsToggle.addEventListener('change', function() {
                try {
                    localStorageEnabled = this.checked;
                    localStorage.setItem('localStorageEnabled', this.checked);
                    // 关闭时清空其他键，仅保留 localStorageEnabled 自身
                    if (!this.checked) {
                        for (let i = localStorage.length - 1; i >= 0; i--) {
                            const key = localStorage.key(i);
                            if (key !== 'localStorageEnabled') localStorage.removeItem(key);
                        }
                    }
                } catch (e2) {
                    localStorageEnabled = true;
                }
            });
        }

        bindToggle('webp-lossless-toggle', 'webpLossless');
        bindToggle('zip-download-toggle', 'zipDownload');
        bindSelect('save-format-select', 'saveFormat');
        bindSelect('log-level-select', 'logLevel', (v) => { logLevel = v; });
        bindToggle('viewerjs-toggle', 'viewerJs', (v) => { useViewerJs = v; });
        bindToggle('irojs-toggle', 'iroJs', (v) => { useIroJs = v; });

        // 清除 localStorage 按钮
        document.getElementById('clear-localstorage-btn')?.addEventListener('click', () => {
            if (!confirm('确定要清除全部 localStorage 数据吗？\n\n页面将刷新以应用默认设置。')) return;
            try {
                localStorage.clear();
                localStorage.setItem('localStorageEnabled', 'true');
            } catch (e) { /* localStorage 不可用，跳过 */ }
            localStorageEnabled = true;
            const lsToggle = document.getElementById('localstorage-toggle');
            if (lsToggle) lsToggle.checked = true;
            logInfo('localStorage', '已清除全部 localStorage 数据');
            location.reload();
        });

        // 从 localStorage 恢复图片质量
        (function loadQuality() {
            const savedQuality = loadSetting('imageQuality');
            if (savedQuality !== null) {
                const percent = Math.max(1, Math.min(100, parseInt(savedQuality) || 100));
                imageQuality = percent / 100;
                if (qualitySlider) qualitySlider.value = percent;
                if (qualityInput) qualityInput.value = percent;
            }
        })();

        // 初始化图片懒加载器（IntersectionObserver）
        imageLazyLoader = new ImageLazyLoader({
            rootMargin: '300px',
            threshold: 0.01
        });
    });
</script>
