    // =============================================
    // 希尔伯特曲线算法
    // =============================================

    /**
     * 生成二维希尔伯特曲线坐标序列
     * @param {number} width - 图片宽度
     * @param {number} height - 图片高度
     * @returns {Array} 坐标数组，每个元素为[x, y]
     *
     * 希尔伯特曲线是一种空间填充曲线，能够保持像素的空间相关性
     * 通过黄金分割比例计算偏移量实现混淆效果
     */
    // =============================================
    // 希尔伯特曲线缓存（LRU淘汰策略）
    // =============================================
    
    // 希尔伯特曲线缓存 - LFU-Aging 策略（新条目以平均频率起步 + 周期性老化）
    // 同时缓存 shiftedCurve（加密解密映射表），避免循环内取模运算
    const curveCache = new Map(); // key -> {curve: Uint32Array, shiftedCurve: Uint32Array, frequency: number, lastAccess: number}
    const MAX_CACHE_SIZE = 20;
    let accessCounter = 0;
    const STATS_INTERVAL = MAX_CACHE_SIZE * 2; // 每 40 次访问输出一次监控

    // 命中率监控（仅在 log 级别统计，其他级别完全跳过计算）
    let cacheHits = 0, cacheMisses = 0, cacheEvictions = 0;

    function logCacheStats() {
        if (logLevel !== 'log') return;
        const total = cacheHits + cacheMisses;
        if (total === 0) return;
        const rate = (cacheHits / total * 100).toFixed(1);
        const freqs = [...curveCache.values()].map(e => e.frequency);
        const minF = freqs.length ? Math.min(...freqs) : 0;
        const maxF = freqs.length ? Math.max(...freqs) : 0;
        logLog(`曲线缓存: 命中率 ${rate}% (${cacheHits}/${total}) | 条目 ${curveCache.size}/${MAX_CACHE_SIZE} | 频率 ${minF}~${maxF} | 淘汰 ${cacheEvictions} | 访问 ${accessCounter}`);
    }

    function averageCacheFrequency() {
        if (curveCache.size === 0) return 1;
        let sum = 0;
        for (const entry of curveCache.values()) sum += entry.frequency;
        return Math.max(1, Math.ceil(sum / curveCache.size));
    }

    function ageFrequencies() {
        for (const entry of curveCache.values()) entry.frequency >>= 1;
    }

    function getCachedCurve(width, height) {
        const key = `${width}x${height}`;
        accessCounter++;

        if (curveCache.has(key)) {
            if (logLevel === 'log') cacheHits++;
            const cacheEntry = curveCache.get(key);
            cacheEntry.frequency++;
            cacheEntry.lastAccess = accessCounter;
            if (logLevel === 'log' && accessCounter % STATS_INTERVAL === 0) logCacheStats();
            return cacheEntry.data;
        }

        if (logLevel === 'log') cacheMisses++;
        // 未命中：生成新的曲线数据及映射表
        const totalPixels = width * height;
        const curve = hilbert2D(width, height);
        const offset = Math.round((Math.sqrt(5) - 1) / 2 * totalPixels);
        const shiftedCurve = new Uint32Array(totalPixels);
        for (let i = 0; i < totalPixels; i++) {
            shiftedCurve[i] = curve[(i + offset) % totalPixels];
        }

        if (curveCache.size >= MAX_CACHE_SIZE) {
            ageFrequencies();
            evictLfuCacheEntry();
            cacheEvictions++;
        }

        const newData = { curve, shiftedCurve };
        curveCache.set(key, {
            data: newData,
            frequency: averageCacheFrequency(),
            lastAccess: accessCounter
        });

        if (logLevel === 'log' && accessCounter % STATS_INTERVAL === 0) logCacheStats();
        return newData;
    }

    /**
     * LFU-Aging 淘汰策略
     * 淘汰频率最低的条目，频率相同时淘汰最久未访问的
     * （ageFrequencies 右移老化后大量条目频率→1，统一走频率+时间判断，语义一致）
     */
    function evictLfuCacheEntry() {
        let minFreq = Infinity;
        for (const entry of curveCache.values()) {
            if (entry.frequency < minFreq) minFreq = entry.frequency;
        }
        let oldestAccess = Infinity;
        let evictionKey = null;
        for (const [key, entry] of curveCache.entries()) {
            if (entry.frequency === minFreq && entry.lastAccess < oldestAccess) {
                oldestAccess = entry.lastAccess;
                evictionKey = key;
            }
        }
        if (evictionKey !== null) curveCache.delete(evictionKey);
    }

    /**
     * 生成二维希尔伯特曲线遍历顺序的像素索引数组
     * @param {number} width  - 图像宽度
     * @param {number} height - 图像高度
     * @returns {Uint32Array} 按曲线顺序排列的像素线性索引
     */
    function hilbert2D(width, height) {
        const w = width;
        const total = width * height;
        const order = new Uint32Array(total);
        let idx = 0;

        const maxDepth = Math.ceil(Math.log2(Math.max(width, height))) * 2 + 4;
        const stack = new Int32Array(maxDepth * 6);
        let sp;

        // 初始方向向量：dx1/dy1 和 dx2/dy2 各有一维为零
        if (width >= height) {
            stack[0] = 0; stack[1] = 0;
            stack[2] = width; stack[3] = 0;
            stack[4] = 0; stack[5] = height;
        } else {
            stack[0] = 0; stack[1] = 0;
            stack[2] = 0; stack[3] = height;
            stack[4] = width; stack[5] = 0;
        }
        sp = 6;

        while (sp > 0) {
            sp -= 6;
            const x0  = stack[sp];
            const y0  = stack[sp + 1];
            const dx1 = stack[sp + 2];
            const dy1 = stack[sp + 3];
            const dx2 = stack[sp + 4];
            const dy2 = stack[sp + 5];

            // 方向向量各有一维为零，求和取绝对值即得单元尺寸（无分支）
            const cellW = Math.abs(dx1 + dy1);
            const cellH = Math.abs(dx2 + dy2);
            // (v>0)-(v<0) 等价于 Math.sign 但无函数调用开销
            const sX1 = (dx1 > 0) - (dx1 < 0);
            const sY1 = (dy1 > 0) - (dy1 < 0);
            const sX2 = (dx2 > 0) - (dx2 < 0);
            const sY2 = (dy2 > 0) - (dy2 < 0);

            if (cellH === 1) {
                const step = sX1 + sY1 * w;
                let ptr = y0 * w + x0;
                const end = idx + cellW;
                while (idx < end) {
                    order[idx++] = ptr;
                    ptr += step;
                }
                continue;
            }

            if (cellW === 1) {
                const step = sX2 + sY2 * w;
                let ptr = y0 * w + x0;
                const end = idx + cellH;
                while (idx < end) {
                    order[idx++] = ptr;
                    ptr += step;
                }
                continue;
            }

            let hX1 = dx1 >> 1;
            let hY1 = dy1 >> 1;
            let hX2 = dx2 >> 1;
            let hY2 = dy2 >> 1;
            const halfW = Math.abs(hX1 + hY1);
            const halfH = Math.abs(hX2 + hY2);

            if (2 * cellW > 3 * cellH) {
                if ((halfW & 1) && cellW > 2) {
                    hX1 += sX1;
                    hY1 += sY1;
                }

                stack[sp]     = x0 + hX1;
                stack[sp + 1] = y0 + hY1;
                stack[sp + 2] = dx1 - hX1;
                stack[sp + 3] = dy1 - hY1;
                stack[sp + 4] = dx2;
                stack[sp + 5] = dy2;
                sp += 6;

                stack[sp]     = x0;
                stack[sp + 1] = y0;
                stack[sp + 2] = hX1;
                stack[sp + 3] = hY1;
                stack[sp + 4] = dx2;
                stack[sp + 5] = dy2;
                sp += 6;
            } else {
                if ((halfH & 1) && cellH > 2) {
                    hX2 += sX2;
                    hY2 += sY2;
                }

                stack[sp]     = x0 + (dx1 - sX1) + (hX2 - sX2);
                stack[sp + 1] = y0 + (dy1 - sY1) + (hY2 - sY2);
                stack[sp + 2] = -hX2;
                stack[sp + 3] = -hY2;
                stack[sp + 4] = -(dx1 - hX1);
                stack[sp + 5] = -(dy1 - hY1);
                sp += 6;

                stack[sp]     = x0 + hX2;
                stack[sp + 1] = y0 + hY2;
                stack[sp + 2] = dx1;
                stack[sp + 3] = dy1;
                stack[sp + 4] = dx2 - hX2;
                stack[sp + 5] = dy2 - hY2;
                sp += 6;

                stack[sp]     = x0;
                stack[sp + 1] = y0;
                stack[sp + 2] = hX2;
                stack[sp + 3] = hY2;
                stack[sp + 4] = hX1;
                stack[sp + 5] = hY1;
                sp += 6;
            }
        }

        return order;
    }

    // =============================================
    // Canvas池管理函数（按尺寸分组）
    // =============================================
    
    /**
     * 按尺寸分组的Canvas池
     * key: "width×height", value: HTMLCanvasElement[]
     * @type {Map<string, HTMLCanvasElement[]>}
     */
    const canvasPoolBySize = new Map();
    const recentCanvasSizes = new Map(); // key: "WxH", value: 最近使用次数
    
    /**
     * 从Canvas池获取指定尺寸的Canvas对象
     * @param {number} width - 所需Canvas宽度
     * @param {number} height - 所需Canvas高度
     * @returns {HTMLCanvasElement} Canvas对象
     * 
     * 按尺寸精确匹配，减少重复设置宽高的开销
     * 池为空时创建新对象并设置对应尺寸
     */
    function getCanvasFromPool(width, height) {
        const key = `${width}x${height}`;

        // 记录实际请求的尺寸，用于页面可见时的智能预创建
        recentCanvasSizes.set(key, (recentCanvasSizes.get(key) || 0) + 1);

        let pool = canvasPoolBySize.get(key);
        
        if (!pool) {
            pool = [];
            canvasPoolBySize.set(key, pool);
        }
        
        if (pool.length > 0) {
            return pool.pop();
        }
        
        // 池为空时创建新Canvas并设置尺寸，初始化上下文避免后续getContext属性不匹配
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        canvas.getContext('2d', { willReadFrequently: true, premultipliedAlpha: false });
        return canvas;
    }
    
    /**
     * 将Canvas对象按尺寸放回对应的池中
     * @param {HTMLCanvasElement} canvas - 要回收的Canvas对象
     * 
     * 按Canvas的实际尺寸进行分组存储
     * 每个尺寸组限制最大容量为5个对象
     */
    function releaseCanvasToPool(canvas) {
        // 使用Canvas的实际尺寸作为键
        const key = `${canvas.width}x${canvas.height}`;
        
        // 确保该尺寸组存在
        if (!canvasPoolBySize.has(key)) {
            canvasPoolBySize.set(key, []);
        }
        
        const pool = canvasPoolBySize.get(key);
        
        // 限制每个尺寸组的最大容量为5个Canvas对象
        if (pool.length < 5) {
            pool.push(canvas);
        }
        // 超过容量限制的对象会被垃圾回收
    }
    
    /**
     * 智能清理Canvas池
     * 保留部分常用尺寸的Canvas，避免频繁重建影响性能
     */
    function smartClearCanvasPools() {
        // 使用近期实际处理过的尺寸作为保留依据，而非硬编码尺寸
        const RETAIN_COUNT_PER_SIZE = 2; // 每个尺寸保留2个Canvas

        canvasPoolBySize.forEach((pool, key) => {
            if (recentCanvasSizes.has(key)) {
                // 对于常用尺寸，保留部分Canvas
                if (pool.length > RETAIN_COUNT_PER_SIZE) {
                    const canvasesToKeep = pool.slice(0, RETAIN_COUNT_PER_SIZE);
                    const canvasesToClear = pool.slice(RETAIN_COUNT_PER_SIZE);
                    
                    // 清理多余的Canvas
                    canvasesToClear.forEach(canvas => {
                        canvas.width = 0;
                        canvas.height = 0;
                    });
                    
                    // 保留指定数量的Canvas
                    pool.length = 0;
                    pool.push(...canvasesToKeep);
                    logLog(`保留常用尺寸 ${key}: ${canvasesToKeep.length} 个Canvas`);
                }
            } else {
                // 非常用尺寸完全清理
                pool.forEach(canvas => {
                    canvas.width = 0;
                    canvas.height = 0;
                });
                const cleanedCount = pool.length;
                pool.length = 0;
                logLog(`清理非常用尺寸 ${key}: ${cleanedCount} 个Canvas`);
            }
        });
        
        // 清理完全空的池
        for (const [key, pool] of canvasPoolBySize.entries()) {
            if (pool.length === 0) {
                canvasPoolBySize.delete(key);
            }
        }
        
        logLog('智能清理完成，保留了常用尺寸的Canvas');
    }
    
    /**
     * 预创建常用尺寸的Canvas
     * 在页面重新可见时提前创建可能需要的Canvas
     */
    function preCreateCommonCanvases() {
        // 基于近期实际处理的图片尺寸预创建，而非固定硬编码尺寸
        if (recentCanvasSizes.size === 0) return;

        // 按使用频率排序，取前4个最常用尺寸
        const topSizes = [...recentCanvasSizes.entries()]
            .sort((a, b) => b[1] - a[1])
            .slice(0, 4);

        topSizes.forEach(([key]) => {
            const [w, h] = key.split('x').map(Number);
            let pool = canvasPoolBySize.get(key);

            if (!pool) {
                pool = [];
                canvasPoolBySize.set(key, pool);
            }

            // 确保每个常用尺寸至少有2个Canvas
            while (pool.length < 2) {
                const canvas = document.createElement('canvas');
                canvas.width = w;
                canvas.height = h;
                pool.push(canvas);
            }
        });

        logLog(`预创建常用Canvas完成 (${topSizes.length} 种尺寸)`);
    }
    
    /**
     * 清理所有Canvas池中的对象
     * 
     * 在页面卸载时调用，完全释放所有Canvas资源
     */
    function clearAllCanvasPools() {
        canvasPoolBySize.forEach((pool) => {
            pool.forEach(canvas => {
                // 重置尺寸以帮助垃圾回收
                canvas.width = 0;
                canvas.height = 0;
            });
            pool.length = 0;
        });
        canvasPoolBySize.clear();
        recentCanvasSizes.clear();
        logLog('已清理所有Canvas池');
    }

    // =============================================
    // 图片格式转换函数
    // =============================================

    /**
     * 将Canvas转换为BMP格式的二进制数据（优化版本）
     * @param {HTMLCanvasElement} canvas - 要转换的Canvas元素
     * @returns {ArrayBuffer} BMP格式的二进制数据
     *
     * 优化点：
     * 1. 使用Uint8Array直接填充文件头，减少DataView开销
     * 2. 预计算行对齐参数，避免循环中重复计算
     * 3. 对大图(>2MB)可考虑使用Web Worker处理
     */
    /**
     * 将 RGBA 像素数据编码为 BMP 24位格式
     * 供同步 canvasToBmp 和异步 Web Worker 共用，消除维护双份代码的风险
     */
    function encodeBmpData(width, height, imageData) {
        const bytesPerPixel = 3;
        const rowPadding = (4 - (width * bytesPerPixel) % 4) % 4;
        const rowSize = width * bytesPerPixel + rowPadding;
        const pixelDataSize = rowSize * height;
        const totalSize = 54 + pixelDataSize;

        const result = new Uint8Array(totalSize);

        // BMP文件头 (14字节)
        result[0] = 0x42; result[1] = 0x4D;
        result[2] = totalSize & 0xFF;
        result[3] = (totalSize >> 8) & 0xFF;
        result[4] = (totalSize >> 16) & 0xFF;
        result[5] = (totalSize >> 24) & 0xFF;
        result[10] = 54 & 0xFF;
        result[11] = (54 >> 8) & 0xFF;

        // BMP信息头 (40字节)
        result[14] = 40;
        result[18] = width & 0xFF;
        result[19] = (width >> 8) & 0xFF;
        result[20] = (width >> 16) & 0xFF;
        result[21] = (width >> 24) & 0xFF;
        const negativeHeight = -height;
        result[22] = negativeHeight & 0xFF;
        result[23] = (negativeHeight >> 8) & 0xFF;
        result[24] = (negativeHeight >> 16) & 0xFF;
        result[25] = (negativeHeight >> 24) & 0xFF;
        result[26] = 1; result[28] = 24;
        result[34] = pixelDataSize & 0xFF;
        result[35] = (pixelDataSize >> 8) & 0xFF;
        result[36] = (pixelDataSize >> 16) & 0xFF;
        result[37] = (pixelDataSize >> 24) & 0xFF;
        result[38] = 47; result[39] = 11;
        result[42] = 47; result[43] = 11;

        // 像素数据转换：RGBA -> BGR
        let srcIndex = 0;
        let dstIndex = 54;
        for (let y = 0; y < height; y++) {
            for (let x = 0; x < width; x++) {
                result[dstIndex++] = imageData[srcIndex + 2];
                result[dstIndex++] = imageData[srcIndex + 1];
                result[dstIndex++] = imageData[srcIndex];
                srcIndex += 4;
            }
            dstIndex += rowPadding;
        }

        return result;
    }

    function canvasToBmp(canvas) {
        const ctx = canvas.getContext('2d', { premultipliedAlpha: false });
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        return encodeBmpData(canvas.width, canvas.height, imageData.data).buffer;
    }
    
    /**
     * 异步BMP生成函数（用于大图处理）
     * @param {HTMLCanvasElement} canvas - 要转换的Canvas元素
     * @returns {Promise<ArrayBuffer>} BMP格式的二进制数据
     * 
     * 对于大图(>2MB)使用Web Worker避免主线程阻塞
     */
    async function canvasToBmpAsync(canvas) {
        const dataSize = canvas.width * canvas.height * 4;
        
        // 小图直接同步处理
        if (dataSize <= 2 * 1024 * 1024) {  // 2MB阈值
            return canvasToBmp(canvas);
        }
        
        // 大图使用Web Worker处理
        return new Promise((resolve, reject) => {
            let blobUrl = null;
            let worker = null;
            let settled = false;
            function finalize(err) {
                if (settled) return;
                settled = true;
                if (blobUrl) URL.revokeObjectURL(blobUrl);
                if (worker) worker.terminate();
                reject(err);
            }

            try {
                // 创建内联Worker处理大图（复用 encodeBmpData，消除双份维护）
                const workerCode = `
                    ${encodeBmpData.toString()}
                    self.onmessage = function(e) {
                        const { width, height, imageData } = e.data;
                        const result = encodeBmpData(width, height, imageData);
                        self.postMessage(result.buffer, [result.buffer]);
                        self.close();
                    };
                `;

                const blob = new Blob([workerCode], { type: 'application/javascript' });
                blobUrl = URL.createObjectURL(blob);
                worker = new Worker(blobUrl);

                worker.onmessage = function(e) {
                    if (settled) return;
                    settled = true;
                    URL.revokeObjectURL(blobUrl);
                    worker.terminate();
                    resolve(e.data);
                };

                worker.onerror = function(error) {
                    finalize(new Error(`Web Worker处理失败: ${error.message}`));
                };

                worker.addEventListener('messageerror', function() {
                    finalize(new Error('Web Worker消息传输失败'));
                });

                const ctx = canvas.getContext('2d', { premultipliedAlpha: false });
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

                worker.postMessage({
                    width: canvas.width,
                    height: canvas.height,
                    imageData: imageData.data
                }, [imageData.data.buffer]);

            } catch (error) {
                logWarn('图片处理', `Web Worker不可用，回退到同步处理: ${error.message || error}`);
                if (worker) worker.terminate();
                if (blobUrl) URL.revokeObjectURL(blobUrl);
                resolve(canvasToBmp(canvas));
            }
        });
    }

    // =============================================
    // 状态辅助函数：根据 scrambleLevel 返回显示文本、CSS类名和文件名后缀
    // =============================================
    function getStatusInfo(level) {
        if (level === 0) return { text: '原始图片', className: 'status-original', suffix: 'original' };
        if (level > 0) {
            return {
                text: level === 1 ? '已混淆' : `已${level}次混淆`,
                className: 'status-encrypted',
                suffix: level === 1 ? 'encrypted' : `encrypted_${level}`
            };
        }
        const absLevel = Math.abs(level);
        return {
            text: absLevel === 1 ? '已解混淆' : `已${absLevel}次解混淆`,
            className: 'status-decrypted',
            suffix: absLevel === 1 ? 'decrypted' : `decrypted_${absLevel}`
        };
    }
    

    // =============================================
    // 共享工具函数
    // =============================================

    function addTouchScrollDismiss(element, removeEdgeClasses = false) {
        let startY = 0;
        const closeOnScroll = (e) => {
            if (!element.classList.contains('tooltip-active')) return;
            if (e.type === 'touchstart') {
                startY = e.touches[0].clientY;
            } else if (Math.abs(e.touches[0].clientY - startY) > 10) {
                if (removeEdgeClasses) {
                    element.classList.remove('tooltip-active', 'edge-left', 'edge-right');
                } else {
                    element.classList.remove('tooltip-active');
                }
            }
        };
        document.addEventListener('touchstart', closeOnScroll, { passive: true });
        document.addEventListener('touchmove', closeOnScroll, { passive: true });
        return closeOnScroll;
    }

    function cleanupImageFromUi(imageId, skipUI = false) {
        const item = document.querySelector(`[data-id="${imageId}"]`);
        if (item) item.remove();
        if (imageLazyLoader) imageLazyLoader.unobserve(imageId);
        images = images.filter(img => img.id !== imageId);
        selectedImages.delete(imageId);
        if (!skipUI) {
            updateSaveButtonText();
            updateImageCounter();
            if (images.length === 0) showEmptyState();
        }
    }

    // 缩略图绘制：智能缓存 + WebP 0.8 优先 + JPEG 0.9 兼容
    async function createAndDrawThumbnail(thumbnailContainer, imageData) {
        const canvas = document.createElement('canvas');
        canvas.className = 'thumbnail-canvas';
        canvas.style.cssText = 'display:block;max-width:100%;max-height:100%';

        try {
            // 1. 优先使用已缓存的缩略图
            let thumbBlob = await storage.get(`thumb_${imageData.id}`);

            if (!thumbBlob) {
                // 2. 缓存未命中：从原图生成缩略图
                const fullBlob = await storage.get(`current_${imageData.id}`);
                if (!fullBlob) return canvas;

                await withImageBitmap(fullBlob, async (bitmap) => {
                    const { width, height } = getThumbnailSize(thumbnailContainer, bitmap.width, bitmap.height);
                    drawThumbnail(canvas, bitmap, width, height);
                });

                // 3. 导出为压缩格式（WebP 优先）
                const [mime, quality] = await getThumbnailEncodeParams();
                thumbBlob = await new Promise(resolve => canvas.toBlob(resolve, mime, quality));

                // 4. 缓存压缩结果，供后续直接使用
                await storage.set(`thumb_${imageData.id}`, thumbBlob);
            } else {
                // 5. 缓存命中：用压缩缩略图绘制（跳过原图解码）
                await withImageBitmap(thumbBlob, async (bitmap) => {
                    const { width, height } = getThumbnailSize(thumbnailContainer, bitmap.width, bitmap.height);
                    drawThumbnail(canvas, bitmap, width, height);
                });
            }
        } catch (e) {
            logWarn('图片处理', `缩略图绘制失败: ${e.message}`);
            // 即使失败，若 Canvas 已有内容也会返回
        }

        return canvas;
    }

    /**
     * 后台预生成缩略图缓存（不创建 DOM Canvas，仅写缓存）
     * 上传时调用，确保滚动展示时直接命中缓存，避免解码原图造成卡顿
     * @param {Object} imageData - 图片数据对象
     * @returns {Promise<void>}
     */
    async function prefetchThumbnailCache(imageData) {
        const existing = await storage.get(`thumb_${imageData.id}`);
        if (existing) return;

        try {
            const fullBlob = await storage.get(`current_${imageData.id}`);
            if (!fullBlob) return;

            // 自适应：测量实际缩略图容器尺寸，而非硬编码固定值
            const item = document.querySelector(`[data-id="${imageData.id}"]`);
            const container = item?.querySelector('.thumbnail-container');
            const dpr = window.devicePixelRatio || 1;
            const maxWidth = (container?.clientWidth || 250) * dpr;
            const maxHeight = (container?.clientHeight || 150) * dpr;

            const offscreen = document.createElement('canvas');
            await withImageBitmap(fullBlob, async (bitmap) => {
                const scale = Math.min(maxWidth / bitmap.width, maxHeight / bitmap.height, 1);
                const width = Math.round(bitmap.width * scale);
                const height = Math.round(bitmap.height * scale);
                offscreen.width = width;
                offscreen.height = height;
                drawThumbnail(offscreen, bitmap, width, height);
            });

            const [mime, quality] = await getThumbnailEncodeParams();
            const thumbBlob = await new Promise(resolve => offscreen.toBlob(resolve, mime, quality));
            await storage.set(`thumb_${imageData.id}`, thumbBlob);
        } catch (e) {
            // 预缓存失败不阻塞主流程，滚动时会走正常的缓存未命中路径
        }
    }

    /**
     * 调度后台缩略图预缓存（使用 requestIdleCallback 避免阻塞主线程）
     * @param {Object} imageData - 图片数据对象
     */
    function schedulePrefetch(imageData) {
        const run = () => prefetchThumbnailCache(imageData);
        if (typeof requestIdleCallback === 'function') {
            requestIdleCallback(run, { timeout: 2000 });
        } else {
            setTimeout(run, 100);
        }
    }

    // =============================================
    // 图片处理核心函数
    // =============================================
    /**
     * 处理单张图片
     * @param {Object} imageData - 图片数据对象
     * @param {string} operation - 操作类型：'encrypt'|'decrypt'|'restore'
     * @returns {Promise} 处理完成的 Promise
     *
     * 使用希尔伯特曲线算法对图片像素进行空间重排
     * 通过黄金分割比例计算偏移量实现混淆效果
     */
    async function processSingleImage(imageData, operation) {
        // 还原操作：直接复制原始 Blob，完全跳过 Canvas 处理
        if (operation === 'restore') {
            const originalBlob = await storage.get(`original_${imageData.id}`);
            if (!originalBlob) throw new Error('原始图片数据不存在');

            await storage.set(`current_${imageData.id}`, originalBlob);

            imageData.scrambleLevel = 0;
            imageData.format = (originalBlob.type || 'image/png').replace('image/', '').toUpperCase();
            imageData.processed = false;
            imageData.size = originalBlob.size;

            await updateThumbnail(imageData.id, originalBlob);
            updateImageInfo(imageData.id);
            return;
        }

        // 获取当前图片 Blob
        const sourceBlob = await storage.get(`current_${imageData.id}`);
        if (!sourceBlob) throw new Error('图片数据不存在');

        // 通过 ImageBitmap 加载到 canvas
        const bitmap = await createImageBitmap(sourceBlob, { premultiplyAlpha: 'none' });
        const canvas = getCanvasFromPool(bitmap.width, bitmap.height);
        try {
            const ctx = canvas.getContext('2d', { willReadFrequently: true, premultipliedAlpha: false });
            // 清除旧内容，避免透明图层残留
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(bitmap, 0, 0);

            // 获取像素数据
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const totalPixels = canvas.width * canvas.height;
            const { curve, shiftedCurve } = getCachedCurve(canvas.width, canvas.height);

            const srcU32 = new Uint32Array(imgData.data.buffer);
            const newImageData = new ImageData(canvas.width, canvas.height);
            const dstU32 = new Uint32Array(newImageData.data.buffer);

            const to = operation === 'encrypt' ? shiftedCurve : curve;
            const from = operation === 'encrypt' ? curve : shiftedCurve;
            for (let i = 0; i < totalPixels; i++) {
                dstU32[to[i]] = srcU32[from[i]];
            }
            imageData.scrambleLevel = (imageData.scrambleLevel || 0) + (operation === 'encrypt' ? 1 : -1);

            ctx.putImageData(newImageData, 0, 0);

            // 生成新 Blob (PNG 格式存储)
            const newBlob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
            await storage.set(`current_${imageData.id}`, newBlob);

            imageData.format = 'PNG';
            imageData.processed = true;
            imageData.size = newBlob.size;

            await updateThumbnail(imageData.id, newBlob);
            updateImageInfo(imageData.id);
        } finally {
            if (bitmap) bitmap.close();
            releaseCanvasToPool(canvas);
        }
    }

    /**
     * 计算缩略图在容器内的缩放尺寸
     * @param {HTMLElement} container - 缩略图容器元素
     * @param {number} imgWidth - 原始图片宽度
     * @param {number} imgHeight - 原始图片高度
     * @returns {{width: number, height: number}}
     */
    function getThumbnailSize(container, imgWidth, imgHeight) {
        // getBoundingClientRect 比 clientWidth/clientHeight 更可靠，会触发布局重算
        const rect = container.getBoundingClientRect();
        const maxWidth = rect.width || 250;
        const maxHeight = rect.height || 150;
        const scale = Math.min(maxWidth / imgWidth, maxHeight / imgHeight, 1);
        return {
            width: Math.round(imgWidth * scale),
            height: Math.round(imgHeight * scale)
        };
    }

    /**
     * 将 ImageBitmap 按目标尺寸绘制到缩略图 canvas
     * @param {HTMLCanvasElement} canvas
     * @param {ImageBitmap} bitmap
     * @param {number} drawWidth
     * @param {number} drawHeight
     */
    function drawThumbnail(canvas, bitmap, drawWidth, drawHeight) {
        canvas.width = drawWidth;
        canvas.height = drawHeight;
        const ctx = canvas.getContext('2d', { premultipliedAlpha: false });
        ctx.clearRect(0, 0, drawWidth, drawHeight);
        ctx.drawImage(bitmap, 0, 0, drawWidth, drawHeight);
    }

    /**
     * 获取缩略图编码参数（WebP 0.8 优先，否则 JPEG 0.9 兼容）
     * @returns {Promise<[string, number]>} [mime, quality]
     */
    async function getThumbnailEncodeParams() {
        return (await isWebPSupported())
            ? ['image/webp', 0.8]
            : ['image/jpeg', 0.9];
    }

    /**
     * 更新缩略图显示
     * @param {string} imageId - 图片 ID
     * @param {Blob} blob - 图片 Blob 对象
     *
     * 使用 ImageBitmap 将 Blob 绘制到 canvas 缩略图
     */
    async function updateThumbnail(imageId, blob) {
        let bitmap;
        try {
            bitmap = await createImageBitmap(blob, { premultiplyAlpha: 'none' });

            // 1. 始终更新存储缓存（用离屏 canvas，不依赖 DOM 状态）
            //    避免未滚动到的缩略图在处理后缓存未刷新，导致懒加载时显示旧图
            const offscreen = document.createElement('canvas');
            const maxDim = 250 * (window.devicePixelRatio || 1);
            let { width, height } = bitmap;
            if (width > height) {
                if (width > maxDim) { height *= maxDim / width; width = maxDim; }
            } else {
                if (height > maxDim) { width *= maxDim / height; height = maxDim; }
            }
            offscreen.width = Math.round(width);
            offscreen.height = Math.round(height);
            drawThumbnail(offscreen, bitmap, offscreen.width, offscreen.height);

            const [mime, quality] = await getThumbnailEncodeParams();
            const thumbBlob = await new Promise(resolve => offscreen.toBlob(resolve, mime, quality));
            await storage.set(`thumb_${imageId}`, thumbBlob);

            // 2. 若 DOM 中存在缩略图 canvas，同步更新视觉显示
            if (currentViewMode !== 'list') {
                const item = document.querySelector(`[data-id="${imageId}"]`);
                if (item) {
                    const canvas = item.querySelector('.thumbnail-canvas');
                    const container = item.querySelector('.thumbnail-container');
                    if (canvas && container) {
                        const size = getThumbnailSize(container, bitmap.width, bitmap.height);
                        drawThumbnail(canvas, bitmap, size.width, size.height);
                        updateImageInfo(imageId);
                    }
                }
            }
        } catch (e) {
            logWarn('图片处理', `更新缩略图失败: ${e.message || e}`);
        } finally {
            bitmap?.close();
        }
    }

    // =============================================
    // 批量操作函数
    // =============================================

    /**
     * 批量处理图片（混淆/解混淆/还原）
     * @param {string} operation - 操作类型：'encrypt'|'decrypt'|'restore'
     *
     * 支持选择特定图片或处理所有图片
     * 显示进度条和状态信息
     */
    async function processBatch(operation) {
        if (isProcessing) return;

        // 确定目标图片ID：优先使用选中的图片，否则处理所有图片
        const targetIds = getTargetImageIds();

        if (targetIds.length === 0) {
            showTempStatus('⚠️ 请先选择图片');
            return;
        }

        isProcessing = true;
        const statusDiv = document.getElementById('batchStatus');
        statusDiv.innerHTML = `<div class="loading"></div> 正在处理 ${targetIds.length} 张图片...`;

        // 统计成功和失败数量
        let successCount = 0;
        let failureCount = 0;

        try {
            for (let i = 0; i < targetIds.length; i++) {
                const imageId = targetIds[i];
                const imageData = images.find(img => img.id === imageId);
                if (imageData) {
                    const item = document.querySelector(`[data-id="${imageId}"]`);
                    let overlay = item ? showProcessingOverlay(item) : null;

                    try {
                        await processSingleImage(imageData, operation);
                        successCount++;
                    } catch (error) {
                        failureCount++;
                        logError(imageData.name, `处理失败: ${error.message || '未知错误'}`);
                    } finally {
                        overlay?.remove();
                    }

                    // 更新进度显示
                    const progress = Math.round((i + 1) / targetIds.length * 100);
                    statusDiv.innerHTML = `正在处理 ${i + 1}/${targetIds.length} 张图片 (${progress}%)${progressBarHtml(progress)}`;

                    // 让出控制权，避免阻塞UI
                    await new Promise(resolve => setTimeout(resolve, 0));
                }
            }

            showBatchStatus(successCount, failureCount, '处理');
        } catch (error) {
            logError('批量处理', `批量处理失败: ${error.message || error}`);
            showTempStatus('❌ 处理失败');
        } finally {
            isProcessing = false;
        }
    }

    /**
     * 保存图片到本地
     * @param {string} format - 保存格式：'png'|'bmp'
     *
     * 支持PNG和BMP两种格式
     * 自动处理文件名和状态信息
     */
    /**
     * 保存图片到本地
     * 支持选择特定图片或处理所有图片
     * 使用公共函数saveImageInFormat进行实际的图片保存操作
     * @param {string} format - 保存格式：'png'|'bmp'|'jpg'|'jpeg'|'webp'
     * @returns {Promise<void>} 无返回值的Promise
     */
    async function saveImages(format) {
        // 检查打包下载开关状态
        const zipToggle = document.getElementById('zip-download-toggle');
        const useZip = zipToggle ? zipToggle.checked : false;
        
        if (useZip) {
            // 使用 ZIP 打包下载
            await saveImagesAsZip(format);
        } else {
            // 原有的逐个下载逻辑
            const targetIds = getTargetImageIds();

            if (targetIds.length === 0) {
                showTempStatus('⚠️ 请先选择图片');
                return;
            }

            let successCount = 0;
            let failureCount = 0;

            const statusDiv = document.getElementById('batchStatus');
            statusDiv.innerHTML = `<div class="loading"></div> 正在保存 ${targetIds.length} 张图片...`;

            try {
                for (let i = 0; i < targetIds.length; i++) {
                    const imageId = targetIds[i];
                    const imageData = images.find(img => img.id === imageId);
                    if (!imageData) {
                        failureCount++;
                        continue;
                    }

                    try {
                        await saveImageInFormat(imageData, format);
                        successCount++;
                    } catch (error) {
                        failureCount++;
                        logError(imageData.name, `保存失败: ${error.message || '未知错误'}`);
                    }

                    // 更新进度
                    const progress = Math.round((i + 1) / targetIds.length * 100);
                    statusDiv.innerHTML = `正在保存 ${i + 1}/${targetIds.length} (${progress}%)${progressBarHtml(progress)}`;
                    await new Promise(resolve => setTimeout(resolve, 50));
                }

                showBatchStatus(successCount, failureCount, '保存');
            } catch (error) {
                logError('批量保存', `保存失败: ${error.message || error}`);
                showTempStatus('❌ 保存失败');
            }
        }
    }

    /**
     * 保存图片到本地（公共函数）
     */
    async function saveImageInFormat(imageData, format) {
        const blob = await storage.get(`current_${imageData.id}`);
        if (!blob) throw new Error('图片数据不存在');

        const targetFormat = format.toLowerCase();
        if (targetFormat === 'webp' && !(await isWebPSupported())) {
            throw new Error('浏览器不支持 WebP');
        }
        const outputBlob = await convertImageBlob(blob, targetFormat);

        const ext = getOutputExtension(targetFormat);
        const statusSuffix = getStatusInfo(imageData.scrambleLevel).suffix;
        const fileName = `${imageData.name.replace(/\.[^/.]+$/, '')}_${statusSuffix}.${ext}`;
        downloadBlob(outputBlob, fileName);
    }

    /**
     * 添加图片到应用
     * @param {File} file - 图片文件对象
     */
    async function addImage(file) {
        const id = Date.now().toString(36) + Math.random().toString(36).substring(2);
        let blob;
        let originalFormat = file.type.split('/')[1]?.toUpperCase() || 'UNKNOWN';
        try {
            // 优先使用 arrayBuffer
            const buffer = await file.arrayBuffer();
            blob = new Blob([buffer], { type: file.type });
        } catch (firstError) {
            logWarn(file.name, `arrayBuffer 读取失败，尝试 FileReader: ${firstError.message || firstError}`);
            try {
                // 回退到 FileReader
                /** @type {ArrayBuffer} */
                const buffer = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = () => reject(reader.error);
                    reader.readAsArrayBuffer(file);
                });
                blob = new Blob([buffer], { type: file.type });
            } catch (secondError) {
                logWarn(file.name, `FileReader 读取也失败，尝试 createImageBitmap 直接获取图像: ${secondError.message || secondError}`);
                try {
                    // 最终回退：尝试直接使用 createImageBitmap 获取图像数据（绕过文件读取）
                    const bitmap = await createImageBitmap(file, { premultiplyAlpha: 'none' });
                    // 将 ImageBitmap 绘制到 canvas 并导出为 PNG Blob
                    const canvas = getCanvasFromPool(bitmap.width, bitmap.height);
                    try {
                        const ctx = canvas.getContext('2d', { premultipliedAlpha: false });
                        // 清除旧内容，避免透明图层残留
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        ctx.drawImage(bitmap, 0, 0);
                        blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                    } finally {
                        bitmap.close();
                        releaseCanvasToPool(canvas);
                    }
                    originalFormat = 'PNG'; // 强制格式为 PNG
                    logWarn(file.name, '已将图片转换为 PNG 格式存储（回退方案）');
                } catch (thirdError) {
                    logError(file.name, `所有读取方式均失败: ${thirdError.message || thirdError}`);
                    throw thirdError; // 彻底失败
                }
            }
        }

        // 存储原始图片（带存储空间检查）
        try {
            await storage.set(`original_${id}`, blob);
        } catch (storageErr) {
            if (storageErr.type === 'quota') {
                alert('存储空间已满，无法添加图片。\n\n请删除部分已导入的图片后重试，或减少单次导入的图片数量。');
            } else {
                alert(`图片存储失败: ${storageErr.message}`);
            }
            throw storageErr;
        }
        try {
            await storage.set(`current_${id}`, blob); // 当前图片初始为原始
        } catch (storageErr) {
            // 回滚已存的 original 数据
            await storage.delete(`original_${id}`).catch(() => {});
            if (storageErr.type === 'quota') {
                alert('存储空间已满，无法添加图片。\n\n请删除部分已导入的图片后重试，或减少单次导入的图片数量。');
            } else {
                alert(`图片存储失败: ${storageErr.message}`);
            }
            throw storageErr;
        }

        // 先获取图片尺寸
        const bitmap = await createImageBitmap(blob, { premultiplyAlpha: 'none' });

        const width = bitmap.width;
        const height = bitmap.height;
        bitmap.close();

        const imageData = {
            id,
            name: file.name,
            originalName: file.name,
            scrambleLevel: 0,          // 新增：混淆级别，0=原始，正数=混淆次数，负数=解混淆次数
            size: blob.size,
            width: width,
            height: height,
            naturalWidth: width,
            naturalHeight: height,
            format: originalFormat,
            processed: false
        };
        images.push(imageData);
        await renderImageItem(imageData);
        updateImageCounter();
        hideEmptyState();

        if (!hasImportedFiles) {
            hasImportedFiles = true;
            const desc = document.getElementById('description-text');
            if (desc) desc.style.display = 'none';
        }
        
        // 更新界面显示
        updateImageInfo(imageData.id);
    }

    // =============================================
    // 图片懒加载管理器（IntersectionObserver）
    // =============================================

    /**
     * 基于 IntersectionObserver 的图片缩略图懒加载器
     * 仅当图片项进入视口时才加载缩略图，减少初始渲染开销
     */
    class ImageLazyLoader {
        /** @param {{ rootMargin?: string, threshold?: number }} [options] */
        constructor(options = {}) {
            this.loaded = new Set();
            this.loading = new Set();
            this.queued = new Map();
            this.rootMargin = options.rootMargin || '200px';
            this.threshold = options.threshold || 0.01;

            this.observer = new IntersectionObserver((entries) => {
                for (const entry of entries) {
                    if (entry.isIntersecting) {
                        const item = /** @type {HTMLElement} */ (entry.target);
                        this._loadItem(item);
                    }
                }
            }, {
                rootMargin: this.rootMargin,
                threshold: this.threshold
            });
        }

        /**
         * 注册图片项到观察列表
         * @param {HTMLElement} item - .image-item 元素
         * @param {Object} imageData - 图片数据对象
         */
        observe(item, imageData) {
            const id = imageData.id;
            if (this.loaded.has(id) || this.loading.has(id)) return;
            this.queued.set(id, { item, imageData });
            this.observer.observe(item);
        }

        /**
         * 取消观察指定图片项
         * @param {string} imageId - 图片 ID
         */
        unobserve(imageId) {
            this.loaded.delete(imageId);
            this.loading.delete(imageId);
            const entry = this.queued.get(imageId);
            if (entry) {
                this.observer.unobserve(entry.item);
                this.queued.delete(imageId);
            }
        }

        /**
         * 断开观察器并清空所有状态
         */
        disconnect() {
            this.observer.disconnect();
            this.loaded.clear();
            this.loading.clear();
            this.queued.clear();
        }

        /**
         * 立即加载所有待加载项
         */
        loadAllPending() {
            // 快照避免遍历时 _loadItem 修改 queued
            const pending = [...this.queued.values()];
            for (const { item } of pending) {
                this._loadItem(item);
            }
        }

        /** @private */
        async _loadItem(item) {
            const imageId = item.dataset.id;
            if (!imageId || this.loaded.has(imageId) || this.loading.has(imageId)) return;

            const entry = this.queued.get(imageId);
            if (!entry) return;

            const { imageData } = entry;
            const thumbnailContainer = item.querySelector('.thumbnail-container');
            if (!thumbnailContainer) return;

            // 列表模式下跳过，不标记 loaded（等切回网格时重新 observe）
            if (currentViewMode === 'list') return;

            // 检查是否已有缩略图 canvas
            if (thumbnailContainer.querySelector('.thumbnail-canvas')) return;

            // 标记加载中，取消观察
            this.observer.unobserve(item);
            this.queued.delete(imageId);
            this.loading.add(imageId);

            try {
                const canvas = await createAndDrawThumbnail(thumbnailContainer, imageData);
                // 加载成功：替换占位符为缩略图
                const placeholder = thumbnailContainer.querySelector('.thumbnail-placeholder');
                if (placeholder) placeholder.remove();
                thumbnailContainer.appendChild(canvas);
                item.dataset.lazyLoaded = 'true';
                this.loaded.add(imageId);
            } catch (e) {
                logWarn('懒加载', `缩略图加载失败: ${imageData.name} - ${e.message}`);
                // 保留 placeholder，允许视图切换后重新加载
            } finally {
                this.loading.delete(imageId);
            }
        }
    }
    async function renderImageItem(imageData) {
        const imageList = document.getElementById('imageList');
        const item = document.createElement('div');
        item.className = `image-item ${currentViewMode === 'list' ? 'list-view' : ''}`;
        item.dataset.id = imageData.id;
        
        // 创建复选框
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.className = 'select-checkbox';
        checkbox.addEventListener('change', (event) => {
            event.stopPropagation();
            toggleSelect(imageData.id, event);
        });
        item.appendChild(checkbox);
        
        // 创建缩略图容器
        const thumbnailContainer = document.createElement('div');
        thumbnailContainer.className = 'thumbnail-container';
        thumbnailContainer.onclick = () => showPreview(imageData.id);
        
        // 统一先放置占位符，由懒加载器在进入视口时替换为缩略图
        const placeholder = document.createElement('div');
        placeholder.className = 'thumbnail-placeholder';
        if (currentViewMode === 'grid') {
            // 网格模式：使用简洁的加载占位符，懒加载器负责后续替换
            placeholder.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" style="display:block;width:60px;height:60px;margin:auto;opacity:.3"><rect width="100" height="100" fill="#ccc" rx="8"/><text x="50" y="58" text-anchor="middle" font-size="40" fill="#999">…</text></svg>';
            placeholder.title = '加载中…';
        } else {
            // 列表模式：显示占位符图标
            placeholder.innerHTML = getPlaceholderSvg();
            placeholder.title = '点击预览图片';
        }
        thumbnailContainer.appendChild(placeholder);

        item.appendChild(thumbnailContainer);

        // 获取状态文本和样式
        const statusInfo = getStatusInfo(imageData.scrambleLevel);
        const statusText = statusInfo.text;
        const statusClass = statusInfo.className;

        // 创建信息区域
        const infoDiv = document.createElement('div');
        infoDiv.className = 'image-info';
        infoDiv.id = `info-${imageData.id}`;
        infoDiv.innerHTML = `
            <div class="text-multiline" style="font-weight: bold;">${escapeHtml(imageData.name)}</div>
            <div class="image-info-row">
                <span>${imageData.width > 0 ? `${imageData.width}×${imageData.height}` : '<span style="color:#999;">尺寸未知</span>'}</span>
            </div>
            <div class="file-size">格式：${imageData.format || 'N/A'} | ${formatFileSize(imageData.size)}</div>
            <div class="status-badge ${statusClass}">${statusText}</div>
        `;
        item.appendChild(infoDiv);

        // 创建操作按钮区域
        const actionsDiv = document.createElement('div');
        actionsDiv.className = 'image-actions';
        actionsDiv.innerHTML = `
            <button class="action-btn" data-operation="encrypt">混淆</button>
            <button class="action-btn" data-operation="decrypt">解混淆</button>
            <button class="action-btn" data-operation="restore">还原</button>
            <div class="action-group">
                <button class="action-btn delete-btn" data-operation="delete">删除</button>
                <button class="action-btn" data-operation="save">保存</button>
            </div>
        `;
        item.appendChild(actionsDiv);

        imageList.appendChild(item);

        // 设置选中状态（如果之前已选中）
        if (selectedImages.has(imageData.id)) {
            checkbox.checked = true;
            item.classList.add('selected');
        }

        // 缓存 DOM 引用以便后续更新
        imageData.domCache = {
            sizeRow: infoDiv.querySelector('.image-info-row'),
            fileSize: infoDiv.querySelector('.file-size'),
            statusBadge: infoDiv.querySelector('.status-badge')
        };

        // 网格模式：注册到懒加载器
        if (currentViewMode === 'grid' && imageLazyLoader) {
            imageLazyLoader.observe(item, imageData);
        }

        // 后台预生成缩略图缓存，滚动展示时直接命中，避免卡顿
        schedulePrefetch(imageData);
    }

    /**
     * 格式化文件大小为易读格式
     * @param {number} bytes - 文件大小（字节）
     * @returns {string} 格式化后的文件大小字符串
     *
     * 支持B、KB、MB、GB四种单位，自动选择合适的单位
     */
    function formatFileSize(bytes) {
        if (bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    /**
     * 更新图片信息显示
     * @param {string} imageId - 图片 ID
     *
     * 更新图片名称、尺寸、大小和状态信息的显示
     * 优化：文件名仅在初次渲染时设置，此处仅更新可变部分（尺寸、状态等）
     */
    function updateImageInfo(imageId) {
        const imageData = images.find(img => img.id === imageId);
        if (!imageData) return;
    
        const cache = imageData.domCache;
        if (!cache) return;
    
        // 更新尺寸信息
        const hasValidSize = imageData.hasOwnProperty('width') && 
                            imageData.hasOwnProperty('height') && 
                            typeof imageData.width === 'number' && 
                            typeof imageData.height === 'number' &&
                            imageData.width > 0 && 
                            imageData.height > 0;
        
        if (cache.sizeRow) {
            cache.sizeRow.innerHTML = `<span>${hasValidSize ? 
                `${imageData.width}×${imageData.height}` : 
                '<span style="color: #999; font-style: italic;">尺寸未知</span>'}</span>`;
        }
            
        // 更新格式和大小信息
        if (cache.fileSize) {
            cache.fileSize.textContent = `格式：${imageData.format || 'N/A'} | ${formatFileSize(imageData.size)}`;
        }
            
        // 更新状态徽章（基于 scrambleLevel）
        if (cache.statusBadge) {
            const statusInfo = getStatusInfo(imageData.scrambleLevel);
            cache.statusBadge.className = `status-badge ${statusInfo.className}`;
            cache.statusBadge.textContent = statusInfo.text;
        }
    }

     */
    function updateSaveButtonText() {

        if (saveBtn) {
            saveBtn.textContent = selectedImages.size > 0 ? '保存所选' : '保存所有';
        }

    /**
     * 切换图片选择状态
     * @param {string} imageId - 图片ID
     * @param {Event} event - 事件对象
     *
     * 切换单张图片的选择状态，更新UI显示
     */
    function toggleSelect(imageId, event) {
        event.stopPropagation();

        const checked = event.target.checked;
        const item = document.querySelector(`[data-id="${imageId}"]`);

        if (checked) {
            selectedImages.add(imageId);
            if (item) item.classList.add('selected');
        } else {
            selectedImages.delete(imageId);
            if (item) item.classList.remove('selected');
        }

        updateSaveButtonText();
    }

    /**
     * 全选图片
     *
     * 选择所有图片，更新选中状态和UI显示
     */
    function selectAll() {
        selectedImages.clear();
        images.forEach(img => {
            selectedImages.add(img.id);
            const item = document.querySelector(`[data-id="${img.id}"]`);
            if (item) {
                item.classList.add('selected');
                const checkbox = item.querySelector('.select-checkbox');
                if (checkbox) checkbox.checked = true;
            }
        });
        
        // 更新保存按钮文字
        updateSaveButtonText();
    }

    /**
     * 清空选择
     *
     * 取消所有图片的选择状态
     */
    function clearSelection() {
        // 使用Array.from创建快照，避免在遍历时直接修改Set
        Array.from(selectedImages).forEach(imageId => {
            const item = document.querySelector(`[data-id="${imageId}"]`);
            if (item) {
                item.classList.remove('selected');
                const checkbox = item.querySelector('.select-checkbox');
                if (checkbox) checkbox.checked = false;
            }
        });
        selectedImages.clear();
        
        // 更新保存按钮文字
        updateSaveButtonText();
    }

    /**
     * 删除选中的图片
     *
     * 释放选中图片的资源，从数组和 DOM 中移除，清空选择状态
     */
    async function deleteSelectedImages() {
        if (isProcessing) {
            alert('正在处理中，请稍后...');
            return;
        }
            
        // 如果没有选中的图片，提示用户
        if (selectedImages.size === 0) {
            showTempStatus('⚠️ 请先选择要删除的图片');
            return;
        }
            
        // 复制选中的 ID 集合，避免在迭代时修改集合
        const idsToDelete = Array.from(selectedImages);
            
        // 清理存储中的数据
        for (const id of idsToDelete) {
            await storage.delete(`original_${id}`);
            await storage.delete(`current_${id}`);
            await storage.delete(`thumb_${id}`);
        }
            
        // 从 DOM 和数据中移除选中的图片（批量删除，跳过逐项 UI 更新）
        idsToDelete.forEach(id => cleanupImageFromUi(id, true));
        // 批量操作完成后一次性更新 UI
        selectedImages.clear();
        updateSaveButtonText();
        updateImageCounter();
        if (images.length === 0) {
            showEmptyState();
            await storage.clear();
            logLog('所有图片已删除：已清除全部缓存');
        }
        logLog(`已删除 ${idsToDelete.length} 张选中的图片`);
    }

    /**
     * 处理单张图片（用户界面调用）
     * 提供用户界面级别的单张图片处理功能
     * 
     * @param {string} imageId - 图片ID
     * @param {string} operation - 操作类型：'encrypt'|'decrypt'|'restore'|'save'
     */
    async function processSingle(imageId, operation) {
        if (isProcessing) return;

        isProcessing = true;
        const imageData = images.find(img => img.id === imageId);
        if (!imageData) {
            isProcessing = false;
            return;
        }

        let overlay = null;
        try {
            if (operation === 'save') {
                await saveSingleImage(imageId);
            } else {
                const item = document.querySelector(`[data-id="${imageId}"]`);
                if (item) overlay = showProcessingOverlay(item);

                await processSingleImage(imageData, operation);

                showTempStatus(`✅ "${imageData.name}" 处理完成`);
            }
        } catch (error) {
            logError(imageData.name, `处理失败: ${error.message || error}`);
            showTempStatus(`❌ "${imageData.name}" 处理失败`);
        } finally {
            overlay?.remove();
            isProcessing = false;
        }
    }

    /**
     * 处理文件添加
     * @param {File[]} files - 文件数组
     *
     * 处理通过拖拽或文件选择添加的图片文件
     */
    async function handleFiles(files) {
        let addedCount = 0;
        let errorCount = 0;

        for (const file of files) {
            // 检查是否为 ZIP 文件
            const isZip = file.type === 'application/zip' || 
                          file.name.toLowerCase().endsWith('.zip');
            
            if (isZip) {
                // 处理 ZIP 文件
                const result = await extractZipAndAddImages(file);
                addedCount += result.added;
                errorCount += result.errors.length;
                continue;
            }
            
            // 原有图片处理逻辑
            if (!isValidImageFile(file)) {
                logWarn(file.name, '不是支持/有效的图片文件');
                errorCount++;
                continue;
            }

            try {
                await addImage(file);
                addedCount++;
            } catch (error) {
                logError(file.name, `添加失败: ${error.message || '未知错误'}`);
                errorCount++;
            }
        }

        let message = '';
        if (addedCount > 0 && errorCount > 0) {
            message = ` 已添加 ${addedCount} 张图片， ${errorCount} 个文件被拒绝或读取失败`;
        } else if (addedCount > 0) {
            message = ` 已添加 ${addedCount} 张图片`;
        } else if (errorCount > 0) {
            message = ` 所有 ${errorCount} 个文件都被拒绝或读取失败`;
        }

        if (message) {
            showTempStatus(message, 3000);
        }
    }



    /**
     * 验证文件是否为图片
     * @param {File} file - 文件对象
     * @returns {boolean} 是否为有效的图片文件
     *
     * 检查文件的MIME类型和扩展名来确定是否为图片
     */
    function isValidImageFile(file) {
        if (VALID_MIME_TYPES.includes(file.type.toLowerCase())) return true;
        const fileName = file.name.toLowerCase();
        return VALID_EXTENSIONS.some(ext => fileName.endsWith('.' + ext));
    }

    /**

     * JPEG/BMP 格式不支持 alpha 通道
     */
    function blobMayHaveTransparency(type) {
        return type === 'image/png' || type === 'image/webp';
    }


    // =============================================

    // =============================================

    /**
     * 不透明格式的背景颜色（默认白色）
     * @type {string} 十六进制颜色值
     */
    let opaqueBackgroundColor = '#ffffff';

    /**
     * 图片输出质量 (0.0–1.0)，影响 JPG/WebP 有损压缩
     * @type {number}
     */
    let imageQuality = 1.0;
    
    /**
     * @typedef {Object} IroColorPicker
     * @property {function(string, function): void} on - 绑定事件
     * @property {function(string, function): void} off - 解绑事件
     * @property {{hexString: string, hsv: Object, rgb: {r: number, g: number, b: number}}} color - 当前颜色对象
     */

    /**
     * iro.js 颜色选择器实例
     * @type {IroColorPicker|null}
     */
    let colorPickerInstance = null;

    /**
     * iro.js 颜色选择器 ResizeObserver 引用
     * @type {ResizeObserver|null}
     */
    let colorPickerResizeObserver = null;

    /**
     * 颜色变更处理器（具名函数，便于重建时移除旧监听器）
     */
    function handleColorChange(color) {
        updateColorInputs(color);
        updateColorPreview(color.hexString);
        opaqueBackgroundColor = color.hexString;
    }

    /**
     * 创建颜色选择器实例并绑定事件
     * @param {Object} options - iro.js ColorPicker 配置
     * @returns {IroColorPicker} ColorPicker 实例
     */
    function createColorPicker(options) {
        const instance = new iro.ColorPicker('#color-picker-box', options);
        instance.on('color:change', handleColorChange);
        const c = instance.color;
        updateColorInputs(c);
        updateColorPreview(c.hexString);
        return instance;
    }

    /**
     * 销毁当前颜色选择器实例（不移除 ResizeObserver）
     */
    function disposeColorPicker() {
        if (colorPickerInstance) {
            colorPickerInstance.off('color:change', handleColorChange);
            colorPickerInstance = null;
        }
    }

    /**
     * 断开颜色选择器的 ResizeObserver（面板关闭时调用）
     */
    function disconnectColorPickerObserver() {
        if (colorPickerResizeObserver) {
            colorPickerResizeObserver.disconnect();
            colorPickerResizeObserver = null;
        }
    }

    /**
     * 初始化 iro.js 颜色选择器
     */
    function initColorPicker() {
        if (!useIroJs) return;
        if (!window.iro || typeof iro.ColorPicker !== 'function') {
            logWarn('颜色选择器', 'iro.js 未加载，颜色选择器不可用');
            return;
        }

        try {
            // 断开旧的 ResizeObserver 并清理实例
            if (colorPickerResizeObserver) {
                colorPickerResizeObserver.disconnect();
                colorPickerResizeObserver = null;
            }
            disposeColorPicker();

            colorPickerInstance = createColorPicker({
                width: 200,
                layoutDirection: 'horizontal',
                layout: [
                    { component: iro.ui.Box, options: {} },
                    { component: iro.ui.Slider, options: { sliderType: 'hue' } }
                ],
                color: opaqueBackgroundColor,
                borderWidth: 1,
                borderColor: '#ddd',
                containerStyle: 'border-radius: 0;'
            });

            logLog('颜色选择器初始化成功');

            // 监听容器宽度：换行时切换为垂直布局
            let isWrapped = false;
            const pickerRow = document.getElementById('color-picker-box')?.parentElement;
            if (pickerRow) {
                const layout = [{ component: iro.ui.Box }, { component: iro.ui.Slider, options: { sliderType: 'hue' } }];
                colorPickerResizeObserver = new ResizeObserver(() => {
                    const wrapped = pickerRow.clientHeight > 250;
                    if (wrapped === isWrapped) return;
                    isWrapped = wrapped;
                    const currentColor = colorPickerInstance.color.hsv;
                    // 只清理实例和 DOM，不断开 Observer
                    disposeColorPicker();
                    document.getElementById('color-picker-box').innerHTML = '';
                    colorPickerInstance = createColorPicker({
                        width: 200,
                        layoutDirection: wrapped ? 'vertical' : 'horizontal',
                        layout,
                        color: currentColor,
                        borderWidth: 1,
                        borderColor: '#ddd',
                        containerStyle: 'border-radius: 0;'
                    });
                });
                colorPickerResizeObserver.observe(pickerRow);
            }
        } catch (error) {
            logError('颜色选择器', `初始化失败: ${error.message || error}`);
        }
    }
    
    /**
     * 更新颜色输入框的值
     * @param {Object} color - iro.js 颜色对象
     */
    function updateColorInputs(color) {
        const hexInput = document.getElementById('hex-input');
        const rgbRInput = document.getElementById('rgb-r-input');
        const rgbGInput = document.getElementById('rgb-g-input');
        const rgbBInput = document.getElementById('rgb-b-input');
        const activeElement = document.activeElement;

        let hex, r, g, b;
        if (color) {
            hex = color.hexString;
            r = color.rgb.r;
            g = color.rgb.g;
            b = color.rgb.b;
        } else if (colorPickerInstance && colorPickerInstance.color) {
            hex = colorPickerInstance.color.hexString;
            r = colorPickerInstance.color.rgb.r;
            g = colorPickerInstance.color.rgb.g;
            b = colorPickerInstance.color.rgb.b;
        } else {
            hex = opaqueBackgroundColor || '#FFFFFF';
            // 将短格式 HEX (#FFF) 展开为 6 位 (#FFFFFF)
            const shortMatch = /^#?([a-f\d])([a-f\d])([a-f\d])$/i.exec(hex);
            if (shortMatch) {
                hex = '#' + shortMatch[1] + shortMatch[1] + shortMatch[2] + shortMatch[2] + shortMatch[3] + shortMatch[3];
            }
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            if (result) {
                r = parseInt(result[1], 16);
                g = parseInt(result[2], 16);
                b = parseInt(result[3], 16);
            }
        }

        if (hex !== undefined && hexInput && activeElement !== hexInput) {
            hexInput.value = hex;
        }
        if (r !== undefined && rgbRInput && activeElement !== rgbRInput) {
            rgbRInput.value = r;
        }
        if (g !== undefined && rgbGInput && activeElement !== rgbGInput) {
            rgbGInput.value = g;
        }
        if (b !== undefined && rgbBInput && activeElement !== rgbBInput) {
            rgbBInput.value = b;
        }
    }
    
    /**
     * 更新颜色预览框
     * @param {string} hexColor - 十六进制颜色值
     */
    function updateColorPreview(hexColor) {
        const preview = document.getElementById('color-preview');
        if (preview) {
            preview.style.backgroundColor = hexColor;
        }
    }
    
    /**
     * 从十六进制输入框更新颜色
     * @param {string} hexValue - 十六进制颜色值
     */
    function updateColorFromHex(hexValue) {
        // 验证十六进制格式
        const hexRegex = /^#([A-Fa-f0-9]{6}|[A-Fa-f0-9]{3})$/;
        if (hexRegex.test(hexValue)) {
            if (colorPickerInstance) {
                colorPickerInstance.color.set(hexValue);
            }
            opaqueBackgroundColor = hexValue;
            updateColorPreview(hexValue);
        }
    }
    
    /**
     * 从 RGB 输入框更新颜色
     */
    function updateColorFromRgb() {
        const rgbRInput = document.getElementById('rgb-r-input');
        const rgbGInput = document.getElementById('rgb-g-input');
        const rgbBInput = document.getElementById('rgb-b-input');

        if (!rgbRInput || !rgbGInput || !rgbBInput) return;

        const r = parseInt(rgbRInput.value) || 0;
        const g = parseInt(rgbGInput.value) || 0;
        const b = parseInt(rgbBInput.value) || 0;

        // 验证范围
        if (r >= 0 && r <= 255 && g >= 0 && g <= 255 && b >= 0 && b <= 255) {
            const hex = '#' + [r, g, b].map(c => c.toString(16).padStart(2, '0')).join('');
            if (colorPickerInstance) {
                colorPickerInstance.color.set({ r, g, b });
            }
            opaqueBackgroundColor = hex;
            updateColorPreview(hex);
        }
    }

    /**
     * 按照 Viewer.js 最佳实践实现的图片预览功能
     * @param {string} imageId - 要预览的图片 ID
     * 
     * 遵循 Viewer.js 官方推荐的实现方式：
     * 1. 使用图片容器作为 Viewer 的目标元素
     * 2. 利用 Viewer.js 的内置生命周期事件
     * 3. 实现完善的资源管理和错误处理
     * 4. 支持优雅降级到基础查看器
     * 
     * 取消机制防止竞态条件：
     * - 使用取消令牌避免多个预览实例同时存在
     * - 快速连续点击时自动取消前一个操作
     */
    /**
     * 为单张图片打开基础查看器（跳过创建全部图片元素）
     */
    async function openBasicViewerForImage(imageData, token) {
        if (isPreviewStale(token)) return;
        logLog('启用基础图片查看器');
        try {
            const blob = await storage.get(`current_${imageData.id}`);
            if (blob && !isPreviewStale(token)) {
                const url = URL.createObjectURL(blob);
                showBasicImageViewer({ blobUrl: url, originalName: imageData.name });
            } else if (!blob) {
                logError('Viewer.js', `无法获取图片数据: ${imageData.id}`);
            }
        } catch (error) {
            if (!isPreviewStale(token)) {
                logError('Viewer.js', `获取图片 Blob 失败: ${error.message || error}`);
            }
        }
    }

    async function showPreview(imageId) {
        const imageData = images.find(img => img.id === imageId);
        if (!imageData) {
            logWarn('Viewer.js', `未找到指定图片: ${imageId}`);
            return;
        }

        // 1. 彻底清理所有残留预览容器和实例（含 Blob URL）
        const existingContainers = document.querySelectorAll('.image-gallery-container');
        existingContainers.forEach(container => {
            revokeBlobUrlsInContainer(container);
            if (container.parentNode) container.parentNode.removeChild(container);
        });
        cleanupExistingViewer();

        // 2. 递增令牌，使旧未完成的调用失效
        const token = ++previewNonce;

        // 3. 若关闭 Viewer.js 开关，跳过创建全部图片元素，直接用基础查看器
        if (!useViewerJs) {
            await openBasicViewerForImage(imageData, token);
            return;
        }

        // 4. 等待 Viewer 资源加载（失败时降级到基础查看器）
        try {
            await getViewerLoadPromise();
        } catch (err) {
            logError('Viewer.js', `资源加载失败: ${err.message || err}`);
        }

        if (isPreviewStale(token)) return;

        // 5. Viewer.js 不可用，降级到基础查看器（跳过创建全部图片元素）
        if (!window.Viewer) {
            logError('Viewer.js', 'Viewer.js 不可用');
            await openBasicViewerForImage(imageData, token);
            return;
        }

        // 6. Viewer.js 可用，创建画廊容器（含全部图片元素）并初始化
        let galleryContainer;
        try {
            galleryContainer = await createImageGalleryContainer();
        } catch (createError) {
            if (isPreviewStale(token)) return;
            logError('Viewer.js', `创建画廊容器失败: ${createError.message || createError}`);
            await openBasicViewerForImage(imageData, token);
            return;
        }

        try {
            if (isPreviewStale(token)) {
                cleanupViewerResources(galleryContainer);
                return;
            }
            await initViewerWithBestPractices(imageData, galleryContainer, imageId, token);
        } catch (error) {
            if (isPreviewStale(token)) {
                cleanupViewerResources(galleryContainer);
                return;
            }
            logError('Viewer.js', `初始化失败: ${error.message || error}`);
            await handleViewerInitializationFailure(galleryContainer, imageData, token);
        }
    }

     */
    function cleanupExistingViewer() {
        // 统一销毁 viewer 实例
        if (viewerInstance) {
            try {
                viewerInstance.destroy();
                logLog('已销毁之前的 viewer 实例');
            } catch (error) {
                logWarn('Viewer.js', `销毁 viewer 实例时出错: ${error.message || error}`);
            }
            viewerInstance = null;
        }
        // 复用 cleanupViewerResources 清理所有残留容器
        document.querySelectorAll('.image-gallery-container').forEach(container => {
            cleanupViewerResources(container, true);

    }

                // 对 storage.get 添加超时，防止存储层永久 pending
                const storagePromise = storage.get(`current_${imgData.id}`);
                const timeoutPromise = new Promise((_, reject) =>

                Promise.race([storagePromise, timeoutPromise]).then(blob => {
                    if (!blob) throw new Error(`图片数据不存在：${imgData.name}`);

                    const blobUrl = URL.createObjectURL(blob);
                    const img = document.createElement('img');
                    img.src = blobUrl;
                    img.alt = escapeHtml(imgData.name) || `图片 ${index + 1}`;

                    img.dataset.blobUrl = blobUrl;

                    imgElements[index] = img;

                    // 动态超时：按 blob 大小估算，每 MB 给 3 秒，最少 8 秒，最多 60 秒
                    const blobSizeMB = (blob?.size || 0) / (1024 * 1024);
                    const dynTimeout = Math.max(8000, Math.min(60000, blobSizeMB * 3000));
                    const timeoutId = setTimeout(() => {
                        logError(imgData.name, `图片加载超时(${(dynTimeout/1000).toFixed(0)}s)，使用占位图`);
                        releaseImgBlob(img);
                        img.onerror = null;
                        img.src = PLACEHOLDER_SRC;
                        resolve(img);
                    }, dynTimeout);
                    timeoutIds.push(timeoutId);

                    img.onload = () => {
                        clearTimeout(timeoutId);
                        logLog(`图片 ${img.alt} 加载完成 (${img.naturalWidth}x${img.naturalHeight})`);
                        resolve(img);
                    };

                    img.onerror = () => {
                        clearTimeout(timeoutId);
                        logError(imgData.name, '图片加载失败');
                        releaseImgBlob(img);
                        img.onerror = null;
                        img.src = PLACEHOLDER_SRC;
                        resolve(img);
                    };
                }).catch((err) => {
                    // 捕获 storage.get 失败或 then 中抛出的异常，防止 Promise 永久 pending
                    logError(imgData.name, `图片获取异常：${err?.message || err}`);
                    const img = document.createElement('img');
                    img.src = PLACEHOLDER_SRC;
                    img.alt = escapeHtml(imgData.name) || `图片 ${index + 1}`;
                    img.dataset.imageId = imgData.id;
                    img.dataset.index = index.toString();
                    imgElements[index] = img;
                    resolve(img);
                });
            });
        });
        
        // 等待所有图片元素创建完成后再添加到 DOM
        await Promise.allSettled(loadPromises);
        
        logLog(`Map 完成：imgElements 长度=${imgElements.length}, 已赋值=${imgElements.filter(x => x).length}`);
        
        // 按顺序将所有图片添加到容器（保证 DOM 顺序与 images 数组一致）
        imgElements.forEach((img, index) => {
            if (img) {
                container.appendChild(img);
            } else {
                logWarn('Viewer.js', `图片索引 ${index} 对应的元素未创建成功`);
            }
        });
        
        logLog(`共创建 ${imgElements.length} 个图片元素，实际添加到 DOM ${container.children.length} 个`);
        
        // 存储加载 Promise 到容器
        container._loadPromises = Promise.allSettled(loadPromises);
        
        document.body.appendChild(container);
        return container;
    }


    /**
     * 按照最佳实践初始化 Viewer.js
     * @param {Object} imageData - 图片数据
     * @param {HTMLElement & {_loadPromises?: Promise<any>}} container - 容器元素
     * @param {string} targetImageId - 目标图片 ID
     * @param {number} token - 并发控制令牌
     */
    async function initViewerWithBestPractices(imageData, container, targetImageId, token) {
        // 最终检查是否被新调用取代
        if (isPreviewStale(token)) {
            logLog('预览操作已被取代，跳过 Viewer 实例创建');
            cleanupViewerResources(container);
            return;
        }
            
        try {
            // 等待所有图片至少尝试加载完成
            if (container._loadPromises) {
                logLog('等待图片加载完成...');
                await container._loadPromises;
                logLog('所有图片加载尝试完成');
            }
                
            // 额外等待一小段时间，确保 DOM 渲染完成
            await new Promise(resolve => setTimeout(resolve, 100));
                
            // @ts-ignore - Viewer.js 是动态加载的，忽略类型检查
            const ViewerConstructor = window.Viewer;
                
            viewerInstance = new ViewerConstructor(container, {
                // 基础配置
                inline: false,
                backdrop: true,
                loading: true,
                
                // 导航和交互
                keyboard: true,
                focus: true,
				loop: true,
                
                // UI组件
                button: true,
                navbar: true,
                toolbar: getOptimizedToolbarConfig(),
                title: false,
                
                // 行为配置
                movable: true,
                zoomable: true,
                rotatable: true,
                scalable: true,
                transition: false,   // 关闭动画
                fullscreen: true,
                
                // 过滤器：优化图片加载判断逻辑
                filter(image) {
                    // 更宽松的图片过滤条件，确保所有图片都能被加载
                    const isLoaded = image.complete || image.readyState === 4 || image.naturalWidth > 0;
                    if (isLoaded) {
                        return true;
                    }
                    // 对于未完成加载的图片，也允许 Viewer.js 加载
                    // Viewer.js 会在内部等待图片加载完成
                    logLog(`图片 ${image.alt} 尚未完全加载，Viewer.js 将等待其加载完成`);
                    return true;
                },
                
                // 生命周期事件
                ready() {
                    logLog('Viewer.js 已准备就绪');
                },
                                
                shown() {
                    // 统计加载成功和失败的图片
                    const viewerImages = container.querySelectorAll('img');
                    let loadedCount = 0;
                    let failedImages = [];
                    
                    viewerImages.forEach((img, idx) => {
                        if (img.complete && img.naturalWidth > 0) {
                            loadedCount++;
                        } else {
                            failedImages.push(idx + 1);
                        }
                    });
                    
                    if (failedImages.length === 0) {
                        logLog(`已加载${loadedCount}张图片`);
                    } else {
                        logLog(`已加载${loadedCount}张图片，图片${failedImages.join('、')}失败`);
                    }
                },
                                
                viewed(event) {
                    const { detail } = event;
                    const currentImage = detail.image;
                    const currentIndex = detail.index;
                    logLog(`当前查看图片：${currentImage.alt || '未知'} (索引：${currentIndex})`);
                                    
                    // 每次切换图片时检查加载状态
                    if (!currentImage.complete || currentImage.naturalWidth === 0) {
                        logWarn('Viewer.js', '当前图片尚未加载完成');
                    }
                },
                
                hide() {
                    logLog('Viewer.js 开始隐藏');
                },
                
                hidden() {
                    logLog('Viewer.js 已隐藏');
                    viewerInstance = null; // Viewer.js 已自毁，避免 cleanupViewerResources 重复销毁
                    cleanupViewerResources(container);
                },
                
                play() {
                    logLog('全屏');
                }
            });
            
            // 显示查看器
            viewerInstance.show();
                        
            // 延迟一小段时间确保 DOM 完全渲染
            await new Promise(resolve => setTimeout(resolve, 50));
            
            // 定位到目标图片 - 通过 data-imageId 属性查找 DOM 中的实际位置
            // 检查 Viewer 实例是否仍然有效（用户可能在延时期间快速关闭了查看器）
            if (!viewerInstance) {
                logLog('Viewer 实例已被销毁，跳过图片定位');
                return;
            }

            const targetImg = container.querySelector(`img[data-image-id="${targetImageId}"]`);
            if (targetImg) {
                const domIndex = Array.from(container.children).indexOf(targetImg);
                logLog(`容器中共有 ${container.children.length} 张图片`);
                logLog(`找到目标图片，DOM 索引：${domIndex}`);
                viewerInstance.view(domIndex);
            } else {
                // 详细调试信息
                logError('Viewer.js', `未在 DOM 中找到目标图片：${targetImageId}`);
                logLog(`容器中的图片元素:`);
                Array.from(container.children).forEach((img, idx) => {
                    const imageId = img.dataset?.imageId || '无 ID';
                    logLog(`[${idx}] ID: ${imageId}, Alt: ${img.alt}`);
                });

                // 尝试使用 Viewer.js 的 images 数组访问（Viewer.js 1.x 使用 images 而非 list）
                if (viewerInstance && viewerInstance.images) {
                    logLog(`Viewer.js images 中有 ${viewerInstance.images.length} 张图片`);
                    viewerInstance.images.forEach((img, idx) => {
                        const imageId = img.dataset?.imageId || '无 ID';
                        logLog(`[${idx}] ID: ${imageId}, Alt: ${img.alt}`);
                    });

                    // 尝试在 Viewer.js 的 images 中查找
                    const foundIndex = viewerInstance.images.findIndex(img => img.dataset?.imageId === targetImageId);
                    if (foundIndex >= 0) {
                        logLog(`在 Viewer.js images 中找到目标图片，索引：${foundIndex}`);
                        viewerInstance.view(foundIndex);
                    }
                }
            }
            
        } catch (error) {
            logError('Viewer.js', `初始化过程中发生错误: ${error.message || error}`);
            await handleViewerInitializationFailure(container, imageData, token);
        }
    }
