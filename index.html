    // 页面加载完成后绑定事件
    document.addEventListener('DOMContentLoaded', function() {
        // 全局 resize 监听：窗口大小改变时更新 Viewer 布局（带防抖）
        window.addEventListener('resize', handleWindowResize);
            
        // 加载视图模式偏好
        loadViewModePreference();
        
        // 初始化保存按钮文字
        updateSaveButtonText();
        
        // 绑定视图切换按钮事件
        const viewToggleBtn = document.getElementById('view-toggle-btn');
        if (viewToggleBtn) {
            viewToggleBtn.addEventListener('click', (e) => {
                e.preventDefault();
                switchViewMode();
            });
        }
            
        // 事件委托：在 imageList 容器上统一处理图片项按钮点击事件
        const imageList = document.getElementById('imageList');
        if (imageList) {
            imageList.addEventListener('click', function(event) {
                // 检查点击的目标是否是操作按钮
                const actionButton = event.target.closest('.action-btn');
                if (actionButton) {
                    event.stopPropagation();
                    const operation = actionButton.getAttribute('data-operation');
                    const imageItem = actionButton.closest('.image-item');
                    
                    if (imageItem && operation) {
                        const imageId = imageItem.dataset.id;
                        
                        if (operation === 'delete') {
                            deleteSingleImage(imageId);
                        } else {
                            processSingle(imageId, operation);
                        }
                    }
                }
            });
        }
        
        // 刷新缩略图按钮事件绑定
        const refreshBtn = document.getElementById('refresh-list-btn');
        if (refreshBtn) {
            refreshBtn.addEventListener('click', (e) => {
                e.preventDefault();
                refreshAllThumbnails();
            });
        }
        
        // 设置按钮事件绑定
        const settingsBtn = document.getElementById('settings-btn');
        const settingsContainer = document.getElementById('settings-container');
        const closeSettingsBtn = document.getElementById('close-settings-btn');
        
        if (settingsBtn && settingsContainer) {
            // 点击设置按钮切换容器显示/隐藏
            settingsBtn.addEventListener('click', (e) => {
                e.preventDefault();
                const isHidden = settingsContainer.style.display === 'none' || settingsContainer.style.display === '';
                settingsContainer.style.display = isHidden ? 'block' : 'none';
                
                // 首次打开时初始化颜色选择器
                if (isHidden && !colorPickerInstance) {
                    // 延迟初始化以确保 DOM 完全渲染
                    setTimeout(() => initColorPicker(), 100);
                }
            });
            
            // 点击关闭按钮隐藏容器
            if (closeSettingsBtn) {
                closeSettingsBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    settingsContainer.style.display = 'none';
                });
            }
        }
        
        // 颜色输入框事件绑定
        const hexInput = document.getElementById('hex-input');
        const rgbRInput = document.getElementById('rgb-r-input');
        const rgbGInput = document.getElementById('rgb-g-input');
        const rgbBInput = document.getElementById('rgb-b-input');
        
        // 统一同步所有输入框的值
        function syncAllInputs() {
            requestAnimationFrame(() => {
                if (colorPickerInstance && colorPickerInstance.color) {
                    const hex = colorPickerInstance.color.hexString;
                    const { r, g, b } = colorPickerInstance.color.rgb;
                    
                    // 只同步非焦点的输入框
                    if (hexInput && document.activeElement !== hexInput) {
                        hexInput.value = hex;
                    }
                    if (rgbRInput && document.activeElement !== rgbRInput) {
                        rgbRInput.value = r;
                    }
                    if (rgbGInput && document.activeElement !== rgbGInput) {
                        rgbGInput.value = g;
                    }
                    if (rgbBInput && document.activeElement !== rgbBInput) {
                        rgbBInput.value = b;
                    }
                } else {
                    // 降级处理：从全局背景色解析
                    const hex = opaqueBackgroundColor || '#FFFFFF';
                    const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                    if (result) {
                        const r = parseInt(result[1], 16);
                        const g = parseInt(result[2], 16);
                        const b = parseInt(result[3], 16);
                        if (hexInput && document.activeElement !== hexInput) {
                            hexInput.value = hex;
                        }
                        if (rgbRInput && document.activeElement !== rgbRInput) {
                            rgbRInput.value = r;
                        }
                        if (rgbGInput && document.activeElement !== rgbGInput) {
                            rgbGInput.value = g;
                        }
                        if (rgbBInput && document.activeElement !== rgbBInput) {
                            rgbBInput.value = b;
                        }
                    }
                }
            });
        }
        
        if (hexInput) {
            let isProcessing = false;
            let lastValidValue = '#FFFFFF'; // 记录最后有效的值
            
            hexInput.addEventListener('input', (e) => {
                if (isProcessing) return;
                isProcessing = true;
                
                let value = e.target.value.trim();
                // 移除所有 # 号，然后统一添加一个 #
                value = value.replace(/#/g, '');
                // 只保留十六进制字符
                value = '#' + value.replace(/[^0-9A-Fa-f]/g, '');
                
                // 检查是否超过FFFFFF
                const hexPart = value.substring(1).toUpperCase();
                if (hexPart.length > 6 || (hexPart.length === 6 && parseInt(hexPart, 16) > 0xFFFFFF)) {
                    // 超过限制，恢复到最后有效值
                    value = lastValidValue;
                } else {
                    // 更新最后有效值
                    lastValidValue = value;
                }
                
                requestAnimationFrame(() => {
                    e.target.value = value;
                    updateColorFromHex(value);
                    isProcessing = false;
                });
            });
            
            // 防止删除 # 号
            hexInput.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' || e.key === 'Delete') {
                    const cursorPos = hexInput.selectionStart;
                    if (cursorPos <= 1) {
                        e.preventDefault();
                    }
                }
            });
            
            // 焦点进入时记录当前值
            hexInput.addEventListener('focus', () => {
                let value = hexInput.value.trim();
                value = value.replace(/#/g, '');
                value = '#' + value.replace(/[^0-9A-Fa-f]/g, '');
                if (value.length > 7) {
                    value = value.substring(0, 7);
                }
                lastValidValue = value;
            });
            
            // 粘贴时自动处理十六进制格式
            hexInput.addEventListener('paste', (e) => {
                const pasteText = (e.clipboardData || window.clipboardData).getData('text');
                // 匹配十六进制颜色格式：#FFF, #FFFFFF, FFF, FFFFFF
                const hexRegex = /^#?([0-9A-Fa-f]{3}|[0-9A-Fa-f]{6})$/;
                
                if (hexRegex.test(pasteText.trim())) {
                    e.preventDefault();
                    let value = pasteText.trim();
                    // 移除所有 # 号
                    value = value.replace(/#/g, '');
                    // 统一添加 # 号
                    value = '#' + value.toUpperCase();
                    // 如果是3位，扩展为6位
                    if (value.length === 4) {
                        value = '#' + value[1] + value[1] + value[2] + value[2] + value[3] + value[3];
                    }
                    hexInput.value = value;
                    updateColorFromHex(value);
                    lastValidValue = value;
                }
            });
            
            // 失焦时同步所有输入框
            hexInput.addEventListener('blur', syncAllInputs);
        }
        
        // RGB粘贴检测函数
        function normalizeRgb(input) {
            const regex = /rgb\(\s*(\d{1,3}%?)\s*[, ]\s*(\d{1,3}%?)\s*[, ]\s*(\d{1,3}%?)\s*\)/;
            const match = input.match(regex);
            
            if (!match) return null;
            
            const toInteger = (value) => {
                if (value.endsWith('%')) {
                    return Math.round(parseFloat(value) * 2.55);
                }
                return parseInt(value, 10);
            };
            
            return {
                r: toInteger(match[1]),
                g: toInteger(match[2]),
                b: toInteger(match[3])
            };
        }
        
        // 为所有RGB输入框添加粘贴事件监听
        [rgbRInput, rgbGInput, rgbBInput].forEach(input => {
            if (input) {
                input.addEventListener('paste', (e) => {
                    const pasteText = (e.clipboardData || window.clipboardData).getData('text');
                    const rgb = normalizeRgb(pasteText);
                    
                    if (rgb && rgbRInput && rgbGInput && rgbBInput) {
                        e.preventDefault();
                        rgbRInput.value = rgb.r;
                        rgbGInput.value = rgb.g;
                        rgbBInput.value = rgb.b;
                        updateColorFromRgb();
                    }
                });
            }
        });
        
        for (const input of [rgbRInput, rgbGInput, rgbBInput]) {
            if (!input) continue;
            input.addEventListener('input', () => {
                validateRgbInput(input);
                updateColorFromRgb();
            });
            input.addEventListener('blur', syncAllInputs);
        }

        function bindToggle(id, key, onChange) {
            const el = document.getElementById(id);
            if (!el) return;
            el.addEventListener('change', () => {
                if (!localStorageEnabled) return;
                saveSetting(key, el.checked);
                if (onChange) onChange(el.checked);
            });
            const saved = loadSetting(key);
            if (saved !== null) el.checked = saved === 'true';
            if (onChange) onChange(el.checked);
        }
        function bindSelect(id, key) {
            const el = document.getElementById(id);
            if (!el) return;
            el.addEventListener('change', () => {
                if (!localStorageEnabled) return;
                saveSetting(key, el.value);
            });
            const saved = loadSetting(key);
            if (saved) el.value = saved;
        }

        // 图片质量 slider 与 number input 双向同步
        const qualitySlider = document.getElementById('quality-slider');
        const qualityInput = document.getElementById('quality-input');

        function syncQuality(source, value) {
            const percent = Math.max(1, Math.min(100, parseInt(value) || 100));
            imageQuality = percent / 100;
            if (source !== 'slider' && qualitySlider) qualitySlider.value = percent;
            if (source !== 'input' && qualityInput) qualityInput.value = percent;
            if (localStorageEnabled) saveSetting('imageQuality', String(percent));
        }

        if (qualitySlider) {
            qualitySlider.addEventListener('input', () => syncQuality('slider', qualitySlider.value));
        }
        if (qualityInput) {
            qualityInput.addEventListener('input', () => syncQuality('input', qualityInput.value));
            qualityInput.addEventListener('change', () => syncQuality('input', qualityInput.value));
        }

        // 初始化文字气泡（悬停+点击+边缘检测）
        const webpTooltip = document.querySelector('.text-tooltip');
        if (webpTooltip) initTextTooltip(webpTooltip);

        // 本地存储开关（必须在所有 bindToggle 前初始化，确保 loadSetting 正确判断）
        localStorageEnabled = localStorage.getItem('localStorageEnabled') !== 'false';
        const lsToggle = document.getElementById('localstorage-toggle');
        if (lsToggle) {
            lsToggle.checked = localStorageEnabled;
            lsToggle.addEventListener('change', function() {
                localStorageEnabled = this.checked;
                localStorage.setItem('localStorageEnabled', this.checked);
                // 关闭时清空其他键，仅保留 localStorageEnabled 自身
                if (!this.checked) {
                    for (let i = localStorage.length - 1; i >= 0; i--) {
                        const key = localStorage.key(i);
                        if (key !== 'localStorageEnabled') localStorage.removeItem(key);
                    }
                }
            });
        }

        bindToggle('webp-lossless-toggle', 'webpLossless');
        bindToggle('zip-download-toggle', 'zipDownload');
        bindSelect('save-format-select', 'saveFormat');
        bindToggle('debug-mode-toggle', 'debugMode', (v) => { debugMode = v; });
        bindToggle('viewerjs-toggle', 'viewerJs', (v) => { useViewerJs = v; });
        bindToggle('irojs-toggle', 'iroJs', (v) => { useIroJs = v; });

        // 从 localStorage 恢复图片质量
        (function loadQuality() {
            const savedQuality = loadSetting('imageQuality');
            if (savedQuality !== null) {
                const percent = Math.max(1, Math.min(100, parseInt(savedQuality) || 100));
                imageQuality = percent / 100;
                if (qualitySlider) qualitySlider.value = percent;
                if (qualityInput) qualityInput.value = percent;
            }
        })();
    });
</script>
