    // =============================================
    // 希尔伯特曲线算法
    // =============================================

    /**
     * 生成二维希尔伯特曲线坐标序列
     * @param {number} width - 图片宽度
     * @param {number} height - 图片高度
     * @returns {Array} 坐标数组，每个元素为[x, y]
     *
     * 希尔伯特曲线是一种空间填充曲线，能够保持像素的空间相关性
     * 通过黄金分割比例计算偏移量实现混淆效果
     */
    // =============================================
    // 希尔伯特曲线缓存（LRU淘汰策略）
    // =============================================
    
    // 希尔伯特曲线缓存 - 基于访问频率的LFU策略
    // 同时缓存 shiftedCurve（加密解密映射表），避免循环内取模运算
    const curveCache = new Map(); // key -> {curve: Uint32Array, shiftedCurve: Uint32Array, frequency: number, lastAccess: number}
    const MAX_CACHE_SIZE = 20;
    let accessCounter = 0; // 全局访问计数器，用于记录访问时间

    function getCachedCurve(width, height) {
        const key = `${width}x${height}`;
        accessCounter++;

        if (curveCache.has(key)) {
            const cacheEntry = curveCache.get(key);
            cacheEntry.frequency++;
            cacheEntry.lastAccess = accessCounter;
            return cacheEntry.data;
        }

        // 未命中：生成新的曲线数据及映射表
        const totalPixels = width * height;
        const curve = hilbert2d(width, height);
        const offset = Math.round((Math.sqrt(5) - 1) / 2 * totalPixels);
        const shiftedCurve = new Uint32Array(totalPixels);
        for (let i = 0; i < totalPixels; i++) {
            shiftedCurve[i] = curve[(i + offset) % totalPixels];
        }

        if (curveCache.size >= MAX_CACHE_SIZE) {
            evictLFUCacheEntry();
        }

        curveCache.set(key, {
            data: { curve, shiftedCurve },
            frequency: 1,
            lastAccess: accessCounter
        });

        return curveCache.get(key).data;
    }
    
    // LFU淘汰策略：淘汰访问频率最低的条目，频率相同时淘汰最久未访问的
    function evictLFUCacheEntry() {
        let minFreq = Infinity;
        let oldestAccess = Infinity;
        let evictionKey = null;
        
        // 找到访问频率最低且最久未访问的条目
        for (const [key, entry] of curveCache.entries()) {
            if (entry.frequency < minFreq || 
                (entry.frequency === minFreq && entry.lastAccess < oldestAccess)) {
                minFreq = entry.frequency;
                oldestAccess = entry.lastAccess;
                evictionKey = key;
            }
        }
        
        if (evictionKey !== null) {
            curveCache.delete(evictionKey);
            console.log(`LFU缓存淘汰: ${evictionKey} (频率: ${minFreq}, 最后访问: ${oldestAccess})`);
        }
    }

    /**
     * 生成二维希尔伯特曲线遍历顺序的像素索引数组
     * @param {number} width  - 图像宽度
     * @param {number} height - 图像高度
     * @returns {Uint32Array} 按曲线顺序排列的像素线性索引
     */
    function hilbert2d(width, height) {
        const w = width;
        const total = width * height;
        const order = new Uint32Array(total);
        let idx = 0;

        const maxDepth = Math.ceil(Math.log2(Math.max(width, height))) * 2 + 4;
        const stack = new Int32Array(maxDepth * 6);
        let sp;

        // 初始方向向量：dx1/dy1 和 dx2/dy2 各有一维为零
        if (width >= height) {
            stack[0] = 0; stack[1] = 0;
            stack[2] = width; stack[3] = 0;
            stack[4] = 0; stack[5] = height;
        } else {
            stack[0] = 0; stack[1] = 0;
            stack[2] = 0; stack[3] = height;
            stack[4] = width; stack[5] = 0;
        }
        sp = 6;

        while (sp > 0) {
            sp -= 6;
            const x0  = stack[sp];
            const y0  = stack[sp + 1];
            const dx1 = stack[sp + 2];
            const dy1 = stack[sp + 3];
            const dx2 = stack[sp + 4];
            const dy2 = stack[sp + 5];

            // 方向向量各有一维为零，求和取绝对值即得单元尺寸（无分支）
            const cellW = Math.abs(dx1 + dy1);
            const cellH = Math.abs(dx2 + dy2);
            // (v>0)-(v<0) 等价于 Math.sign 但无函数调用开销
            const sX1 = (dx1 > 0) - (dx1 < 0);
            const sY1 = (dy1 > 0) - (dy1 < 0);
            const sX2 = (dx2 > 0) - (dx2 < 0);
            const sY2 = (dy2 > 0) - (dy2 < 0);

            if (cellH === 1) {
                const step = sX1 + sY1 * w;
                let ptr = y0 * w + x0;
                const end = idx + cellW;
                while (idx < end) {
                    order[idx++] = ptr;
                    ptr += step;
                }
                continue;
            }

            if (cellW === 1) {
                const step = sX2 + sY2 * w;
                let ptr = y0 * w + x0;
                const end = idx + cellH;
                while (idx < end) {
                    order[idx++] = ptr;
                    ptr += step;
                }
                continue;
            }

            let hX1 = dx1 >> 1;
            let hY1 = dy1 >> 1;
            let hX2 = dx2 >> 1;
            let hY2 = dy2 >> 1;
            const halfW = Math.abs(hX1 + hY1);
            const halfH = Math.abs(hX2 + hY2);

            if (2 * cellW > 3 * cellH) {
                if ((halfW & 1) && cellW > 2) {
                    hX1 += sX1;
                    hY1 += sY1;
                }

                stack[sp]     = x0 + hX1;
                stack[sp + 1] = y0 + hY1;
                stack[sp + 2] = dx1 - hX1;
                stack[sp + 3] = dy1 - hY1;
                stack[sp + 4] = dx2;
                stack[sp + 5] = dy2;
                sp += 6;

                stack[sp]     = x0;
                stack[sp + 1] = y0;
                stack[sp + 2] = hX1;
                stack[sp + 3] = hY1;
                stack[sp + 4] = dx2;
                stack[sp + 5] = dy2;
                sp += 6;
            } else {
                if ((halfH & 1) && cellH > 2) {
                    hX2 += sX2;
                    hY2 += sY2;
                }

                stack[sp]     = x0 + (dx1 - sX1) + (hX2 - sX2);
                stack[sp + 1] = y0 + (dy1 - sY1) + (hY2 - sY2);
                stack[sp + 2] = -hX2;
                stack[sp + 3] = -hY2;
                stack[sp + 4] = -(dx1 - hX1);
                stack[sp + 5] = -(dy1 - hY1);
                sp += 6;

                stack[sp]     = x0 + hX2;
                stack[sp + 1] = y0 + hY2;
                stack[sp + 2] = dx1;
                stack[sp + 3] = dy1;
                stack[sp + 4] = dx2 - hX2;
                stack[sp + 5] = dy2 - hY2;
                sp += 6;

                stack[sp]     = x0;
                stack[sp + 1] = y0;
                stack[sp + 2] = hX2;
                stack[sp + 3] = hY2;
                stack[sp + 4] = hX1;
                stack[sp + 5] = hY1;
                sp += 6;
            }
        }

        return order;
    }

    // =============================================
    // 像素缓冲区池管理
    // =============================================
    
    const pixelBufferPool = [];
    
    function getPixelBuffer(size) {
        // 遍历池，找到第一个长度完全相等的缓冲区
        for (let i = 0; i < pixelBufferPool.length; i++) {
            if (pixelBufferPool[i].length === size) {
                return pixelBufferPool.splice(i, 1)[0];
            }
        }
        // 未找到则新建
        return new Uint8ClampedArray(size);
    }
    
    function releasePixelBuffer(buffer) {
        if (!buffer || !(buffer instanceof Uint8ClampedArray)) return;
        const MAX_POOL_SIZE = 5;          // 限制池大小，避免无限增长
        if (pixelBufferPool.length >= MAX_POOL_SIZE) {
            return; // 丢弃，等待GC
        }
        pixelBufferPool.push(buffer);
    }
    
    // =============================================
    // Canvas池管理函数（按尺寸分组）
    // =============================================
    
    /**
     * 按尺寸分组的Canvas池
     * key: "width×height", value: HTMLCanvasElement[]
     * @type {Map<string, HTMLCanvasElement[]>}
     */
    const canvasPoolBySize = new Map();
    
    /**
     * 从Canvas池获取指定尺寸的Canvas对象
     * @param {number} width - 所需Canvas宽度
     * @param {number} height - 所需Canvas高度
     * @returns {HTMLCanvasElement} Canvas对象
     * 
     * 按尺寸精确匹配，减少重复设置宽高的开销
     * 池为空时创建新对象并设置对应尺寸
     */
    function getCanvasFromPool(width, height) {
        const key = `${width}x${height}`;
        let pool = canvasPoolBySize.get(key);
        
        if (!pool) {
            pool = [];
            canvasPoolBySize.set(key, pool);
        }
        
        if (pool.length > 0) {
            return pool.pop();
        }
        
        // 池为空时创建新Canvas并设置尺寸
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        return canvas;
    }
    
    /**
     * 将Canvas对象按尺寸放回对应的池中
     * @param {HTMLCanvasElement} canvas - 要回收的Canvas对象
     * 
     * 按Canvas的实际尺寸进行分组存储
     * 每个尺寸组限制最大容量为5个对象
     */
    function releaseCanvasToPool(canvas) {
        // 使用Canvas的实际尺寸作为键
        const key = `${canvas.width}x${canvas.height}`;
        
        // 确保该尺寸组存在
        if (!canvasPoolBySize.has(key)) {
            canvasPoolBySize.set(key, []);
        }
        
        const pool = canvasPoolBySize.get(key);
        
        // 限制每个尺寸组的最大容量为5个Canvas对象
        if (pool.length < 5) {
            pool.push(canvas);
        }
        // 超过容量限制的对象会被垃圾回收
    }
    
    /**
     * 智能清理Canvas池
     * 保留部分常用尺寸的Canvas，避免频繁重建影响性能
     */
    function smartClearCanvasPools() {
        const COMMON_SIZES = [
            '256x256',   // 常见小图
            '512x512',   // 中等尺寸
            '1024x1024', // 常见大图
            '1920x1080', // 1080p
            '3840x2160'  // 4K
        ];
        
        const RETAIN_COUNT_PER_SIZE = 2; // 每个尺寸保留2个Canvas
        
        canvasPoolBySize.forEach((pool, key) => {
            if (COMMON_SIZES.includes(key)) {
                // 对于常用尺寸，保留部分Canvas
                if (pool.length > RETAIN_COUNT_PER_SIZE) {
                    const canvasesToKeep = pool.slice(0, RETAIN_COUNT_PER_SIZE);
                    const canvasesToClear = pool.slice(RETAIN_COUNT_PER_SIZE);
                    
                    // 清理多余的Canvas
                    canvasesToClear.forEach(canvas => {
                        canvas.width = 0;
                        canvas.height = 0;
                    });
                    
                    // 保留指定数量的Canvas
                    pool.length = 0;
                    pool.push(...canvasesToKeep);
                    console.log(`保留常用尺寸 ${key}: ${canvasesToKeep.length} 个Canvas`);
                }
            } else {
                // 非常用尺寸完全清理
                pool.forEach(canvas => {
                    canvas.width = 0;
                    canvas.height = 0;
                });
                pool.length = 0;
                console.log(`清理非常用尺寸 ${key}: ${pool.length} 个Canvas`);
            }
        });
        
        // 清理完全空的池
        for (const [key, pool] of canvasPoolBySize.entries()) {
            if (pool.length === 0) {
                canvasPoolBySize.delete(key);
            }
        }
        
        console.log('智能清理完成，保留了常用尺寸的Canvas');
    }
    
    /**
     * 预创建常用尺寸的Canvas
     * 在页面重新可见时提前创建可能需要的Canvas
     */
    function preCreateCommonCanvases() {
        const COMMON_SIZES = [
            { width: 256, height: 256 },
            { width: 512, height: 512 },
            { width: 1024, height: 1024 },
            { width: 1920, height: 1080 }
        ];
        
        COMMON_SIZES.forEach(size => {
            const key = `${size.width}x${size.height}`;
            let pool = canvasPoolBySize.get(key);
            
            if (!pool) {
                pool = [];
                canvasPoolBySize.set(key, pool);
            }
            
            // 确保每个常用尺寸至少有2个Canvas
            while (pool.length < 2) {
                const canvas = document.createElement('canvas');
                canvas.width = size.width;
                canvas.height = size.height;
                pool.push(canvas);
            }
        });
        
        console.log('预创建常用Canvas完成');
    }
    
    /**
     * 清理所有Canvas池中的对象
     * 
     * 在页面卸载时调用，完全释放所有Canvas资源
     */
    function clearAllCanvasPools() {
        canvasPoolBySize.forEach((pool, key) => {
            pool.forEach(canvas => {
                // 重置尺寸以帮助垃圾回收
                canvas.width = 0;
                canvas.height = 0;
            });
            pool.length = 0;
        });
        canvasPoolBySize.clear();
        console.log('已清理所有Canvas池');
    }
    

    
    // =============================================
    // 图片格式转换函数
    // =============================================

    /**
     * 将Canvas转换为BMP格式的二进制数据（优化版本）
     * @param {HTMLCanvasElement} canvas - 要转换的Canvas元素
     * @returns {ArrayBuffer} BMP格式的二进制数据
     *
     * 优化点：
     * 1. 使用Uint8Array直接填充文件头，减少DataView开销
     * 2. 预计算行对齐参数，避免循环中重复计算
     * 3. 对大图(>2MB)可考虑使用Web Worker处理
     */
    function canvasToBMP(canvas) {
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;
        const imageData = ctx.getImageData(0, 0, width, height);

        // 预计算行对齐参数（避免在循环中重复计算）
        const bytesPerPixel = 3; // 24位BMP不包含Alpha通道
        const rowPadding = (4 - (width * bytesPerPixel) % 4) % 4; // 4字节对齐padding
        const rowSize = width * bytesPerPixel + rowPadding;
        const pixelDataSize = rowSize * height;
        const totalSize = 54 + pixelDataSize; // 14(文件头) + 40(信息头) + 像素数据
        
        // 使用Uint8Array直接填充文件头（性能优于DataView）
        const result = new Uint8Array(totalSize);
        
        // BMP文件头 (14字节)
        result[0] = 0x42;  // 'B'
        result[1] = 0x4D;  // 'M'
        // 文件大小 (little-endian)
        result[2] = totalSize & 0xFF;
        result[3] = (totalSize >> 8) & 0xFF;
        result[4] = (totalSize >> 16) & 0xFF;
        result[5] = (totalSize >> 24) & 0xFF;
        // 保留字段 (6-9字节为0)
        result[10] = 54 & 0xFF;  // 像素数据偏移量低位
        result[11] = (54 >> 8) & 0xFF;  // 像素数据偏移量高位
        
        // BMP信息头 (40字节)
        result[14] = 40;  // 信息头大小
        // 图片宽度 (little-endian)
        result[18] = width & 0xFF;
        result[19] = (width >> 8) & 0xFF;
        result[20] = (width >> 16) & 0xFF;
        result[21] = (width >> 24) & 0xFF;
        // 图片高度 (负数表示从上到下存储)
        const negativeHeight = -height;
        result[22] = negativeHeight & 0xFF;
        result[23] = (negativeHeight >> 8) & 0xFF;
        result[24] = (negativeHeight >> 16) & 0xFF;
        result[25] = (negativeHeight >> 24) & 0xFF;
        result[26] = 1;  // 颜色平面数
        result[28] = 24; // 每像素位数(24位)
        // 像素数据大小
        result[34] = pixelDataSize & 0xFF;
        result[35] = (pixelDataSize >> 8) & 0xFF;
        result[36] = (pixelDataSize >> 16) & 0xFF;
        result[37] = (pixelDataSize >> 24) & 0xFF;
        // 分辨率 (2835 pixels/meter ≈ 72 DPI)
        result[38] = 47; result[39] = 11;  // 水平分辨率低位
        result[42] = 47; result[43] = 11;  // 垂直分辨率低位
        
        // 转换像素数据：RGBA -> BGR（优化的循环）
        const srcData = imageData.data;
        let srcIndex = 0;
        let dstIndex = 54; // 从文件头后开始写入
        
        for (let y = 0; y < height; y++) {
            for (let x = 0; x < width; x++) {
                // BGR顺序写入（跳过Alpha通道）
                result[dstIndex++] = srcData[srcIndex + 2];  // B
                result[dstIndex++] = srcData[srcIndex + 1];  // G
                result[dstIndex++] = srcData[srcIndex];      // R
                srcIndex += 4; // 跳过Alpha通道
            }
            // 添加行padding（已由Uint8Array初始化为0）
            dstIndex += rowPadding;
        }

        return result.buffer;
    }
    
    /**
     * 异步BMP生成函数（用于大图处理）
     * @param {HTMLCanvasElement} canvas - 要转换的Canvas元素
     * @returns {Promise<ArrayBuffer>} BMP格式的二进制数据
     * 
     * 对于大图(>2MB)使用Web Worker避免主线程阻塞
     */
    async function canvasToBMPAsync(canvas) {
        const dataSize = canvas.width * canvas.height * 4;
        
        // 小图直接同步处理
        if (dataSize <= 2 * 1024 * 1024) {  // 2MB阈值
            return canvasToBMP(canvas);
        }
        
        // 大图使用Web Worker处理
        return new Promise((resolve, reject) => {
            try {
                // 创建内联Worker处理大图
                const workerCode = `
                    self.onmessage = function(e) {
                        const { width, height, imageData } = e.data;
                        
                        // 预计算参数
                        const bytesPerPixel = 3;
                        const rowPadding = (4 - (width * bytesPerPixel) % 4) % 4;
                        const rowSize = width * bytesPerPixel + rowPadding;
                        const pixelDataSize = rowSize * height;
                        const totalSize = 54 + pixelDataSize;
                        
                        const result = new Uint8Array(totalSize);
                        
                        // 文件头
                        result[0] = 0x42; result[1] = 0x4D;
                        result[2] = totalSize & 0xFF;
                        result[3] = (totalSize >> 8) & 0xFF;
                        result[4] = (totalSize >> 16) & 0xFF;
                        result[5] = (totalSize >> 24) & 0xFF;
                        result[10] = 54 & 0xFF;
                        result[11] = (54 >> 8) & 0xFF;
                        
                        // 信息头
                        result[14] = 40;
                        result[18] = width & 0xFF;
                        result[19] = (width >> 8) & 0xFF;
                        result[20] = (width >> 16) & 0xFF;
                        result[21] = (width >> 24) & 0xFF;
                        
                        const negativeHeight = -height;
                        result[22] = negativeHeight & 0xFF;
                        result[23] = (negativeHeight >> 8) & 0xFF;
                        result[24] = (negativeHeight >> 16) & 0xFF;
                        result[25] = (negativeHeight >> 24) & 0xFF;
                        
                        result[26] = 1; result[28] = 24;
                        result[34] = pixelDataSize & 0xFF;
                        result[35] = (pixelDataSize >> 8) & 0xFF;
                        result[36] = (pixelDataSize >> 16) & 0xFF;
                        result[37] = (pixelDataSize >> 24) & 0xFF;
                        result[38] = 47; result[39] = 11;
                        result[42] = 47; result[43] = 11;
                        
                        // 像素数据转换
                        let srcIndex = 0;
                        let dstIndex = 54;
                        
                        for (let y = 0; y < height; y++) {
                            for (let x = 0; x < width; x++) {
                                result[dstIndex++] = imageData[srcIndex + 2];
                                result[dstIndex++] = imageData[srcIndex + 1];
                                result[dstIndex++] = imageData[srcIndex];
                                srcIndex += 4;
                            }
                            dstIndex += rowPadding;
                        }
                        
                        self.postMessage(result.buffer, [result.buffer]);
                        self.close();
                    };
                `;
                
                const blob = new Blob([workerCode], { type: 'application/javascript' });
                const blobUrl = URL.createObjectURL(blob);
                const worker = new Worker(blobUrl);
                
                let settled = false;
                function finalize(err) {
                    if (settled) return;
                    settled = true;
                    URL.revokeObjectURL(blobUrl);
                    worker.terminate();
                    reject(err);
                }
                
                worker.onmessage = function(e) {
                    if (settled) return;
                    settled = true;
                    URL.revokeObjectURL(blobUrl);
                    resolve(e.data);
                };
                
                worker.onerror = function(error) {
                    finalize(new Error(`Web Worker处理失败: ${error.message}`));
                };
                
                // 确保Worker终止时也能释放资源
                worker.addEventListener('messageerror', function() {
                    finalize(new Error('Web Worker消息传输失败'));
                });
                
                const ctx = canvas.getContext('2d');
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                
                worker.postMessage({
                    width: canvas.width,
                    height: canvas.height,
                    imageData: imageData.data
                }, [imageData.data.buffer]);
                
            } catch (error) {
                // Web Worker不可用时回退到同步处理
                console.warn('Web Worker不可用，回退到同步处理:', error);
                resolve(canvasToBMP(canvas));
            }
        });
    }

    // =============================================
    // 状态辅助函数：根据 scrambleLevel 生成显示文本和CSS类名
    // =============================================
    
    /**
     * 根据混淆级别获取状态文本
     * @param {number} level - 混淆级别（正数表示混淆次数，负数表示解混淆次数，0表示原始）
     * @returns {string} 状态文本
     */
    function getStatusText(level) {
        if (level === 0) return '原始图片';
        if (level > 0) {
            return level === 1 ? '已混淆' : `已${level}次混淆`;
        }
        const absLevel = Math.abs(level);
        return absLevel === 1 ? '已解混淆' : `已${absLevel}次解混淆`;
    }
    
    /**
     * 根据混淆级别获取状态徽章的CSS类名
     * @param {number} level - 混淆级别
     * @returns {string} CSS类名
     */
    function getStatusClass(level) {
        if (level === 0) return 'status-original';
        if (level > 0) return 'status-encrypted';
        return 'status-decrypted';
    }
    
    /**
     * 根据混淆级别生成文件名后缀（用于保存图片时的文件名）
     * @param {number} level - 混淆级别
     * @returns {string} 后缀字符串
     */
    function getStatusSuffix(level) {
        if (level === 0) return 'original';
        if (level > 0) {
            return level === 1 ? 'encrypted' : `encrypted_${level}`;
        }
        const absLevel = Math.abs(level);
        return absLevel === 1 ? 'decrypted' : `decrypted_${absLevel}`;
    }
    
    // =============================================
    // 图片处理核心函数
    // =============================================
    /**
     * 处理单张图片
     * @param {Object} imageData - 图片数据对象
     * @param {string} operation - 操作类型：'encrypt'|'decrypt'|'restore'
     * @returns {Promise} 处理完成的 Promise
     *
     * 使用希尔伯特曲线算法对图片像素进行空间重排
     * 通过黄金分割比例计算偏移量实现混淆效果
     */
    async function processSingleImage(imageData, operation) {
        // 还原操作：直接复制原始 Blob，完全跳过 Canvas 处理
        if (operation === 'restore') {
            const originalBlob = await storage.get(`original_${imageData.id}`);
            if (!originalBlob) throw new Error('原始图片数据不存在');

            await storage.set(`current_${imageData.id}`, originalBlob);

            imageData.scrambleLevel = 0;
            imageData.format = (originalBlob.type || 'image/png').replace('image/', '').toUpperCase();
            imageData.processed = false;
            imageData.size = originalBlob.size;

            await updateThumbnail(imageData.id, originalBlob);
            updateImageInfo(imageData.id);
            return;
        }

        // 获取当前图片 Blob
        const sourceBlob = await storage.get(`current_${imageData.id}`);
        if (!sourceBlob) throw new Error('图片数据不存在');

        // 通过 ImageBitmap 加载到 canvas
        const bitmap = await createImageBitmap(sourceBlob);
        const canvas = getCanvasFromPool(bitmap.width, bitmap.height);
        try {
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            // 清除旧内容，避免透明图层残留
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(bitmap, 0, 0);

            // 获取像素数据
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const totalPixels = canvas.width * canvas.height;
            const { curve, shiftedCurve } = getCachedCurve(canvas.width, canvas.height);
            let dstBuffer;
            try {
                dstBuffer = getPixelBuffer(imgData.data.length);
                const srcU32 = new Uint32Array(imgData.data.buffer);
                const dstU32 = new Uint32Array(dstBuffer.buffer);

                if (operation === 'encrypt') {
                    for (let i = 0; i < totalPixels; i++) {
                        dstU32[shiftedCurve[i]] = srcU32[curve[i]];
                    }
                    imageData.scrambleLevel = (imageData.scrambleLevel || 0) + 1;
                } else {
                    for (let i = 0; i < totalPixels; i++) {
                        dstU32[curve[i]] = srcU32[shiftedCurve[i]];
                    }
                    imageData.scrambleLevel = (imageData.scrambleLevel || 0) - 1;
                }

                // 写回 canvas
                const newImageData = new ImageData(dstBuffer, canvas.width, canvas.height);
                ctx.putImageData(newImageData, 0, 0);

                // 生成新 Blob (PNG 格式存储)
                const newBlob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                await storage.set(`current_${imageData.id}`, newBlob);

                imageData.format = 'PNG';
                imageData.processed = true;
                imageData.size = newBlob.size;

                await updateThumbnail(imageData.id, newBlob);
                updateImageInfo(imageData.id);
            } finally {
                releasePixelBuffer(dstBuffer);
            }
        } finally {
            if (bitmap) bitmap.close();
            releaseCanvasToPool(canvas);
        }
    }

    /**
     * 计算缩略图在容器内的缩放尺寸
     * @param {HTMLElement} container - 缩略图容器元素
     * @param {number} imgWidth - 原始图片宽度
     * @param {number} imgHeight - 原始图片高度
     * @returns {{width: number, height: number}}
     */
    function getThumbnailSize(container, imgWidth, imgHeight) {
        const maxWidth = container.clientWidth || 256;
        const maxHeight = container.clientHeight || 256;
        const scale = Math.min(maxWidth / imgWidth, maxHeight / imgHeight, 1);
        return {
            width: Math.round(imgWidth * scale),
            height: Math.round(imgHeight * scale)
        };
    }

    /**
     * 将 ImageBitmap 按目标尺寸绘制到缩略图 canvas
     * @param {HTMLCanvasElement} canvas
     * @param {ImageBitmap} bitmap
     * @param {number} drawWidth
     * @param {number} drawHeight
     */
    function drawThumbnail(canvas, bitmap, drawWidth, drawHeight) {
        canvas.width = drawWidth;
        canvas.height = drawHeight;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, drawWidth, drawHeight);
        ctx.drawImage(bitmap, 0, 0, drawWidth, drawHeight);
    }

    /**
     * 更新缩略图显示
     * @param {string} imageId - 图片 ID
     * @param {Blob} blob - 图片 Blob 对象
     *
     * 使用 ImageBitmap 将 Blob 绘制到 canvas 缩略图
     */
    async function updateThumbnail(imageId, blob) {
        if (currentViewMode === 'list') return;

        const item = document.querySelector(`[data-id="${imageId}"]`);
        if (!item) return;
        const canvas = item.querySelector('.thumbnail-canvas');
        if (!canvas) return;

        const container = item.querySelector('.thumbnail-container');
        if (!container) return;

        try {
            const bitmap = await createImageBitmap(blob);
            const size = getThumbnailSize(container, bitmap.width, bitmap.height);
            drawThumbnail(canvas, bitmap, size.width, size.height);
            bitmap.close();
            updateImageInfo(imageId);
        } catch (e) {
            console.warn('更新缩略图失败', e);
        }
    }

    // =============================================
    // 批量操作函数
    // =============================================

    /**
     * 批量处理图片（混淆/解混淆/还原）
     * @param {string} operation - 操作类型：'encrypt'|'decrypt'|'restore'
     *
     * 支持选择特定图片或处理所有图片
     * 显示进度条和状态信息
     */
    async function processBatch(operation) {
        if (isProcessing) return;

        // 确定目标图片ID：优先使用选中的图片，否则处理所有图片
        const targetIds = selectedImages.size > 0
            ? Array.from(selectedImages)
            : images.map(img => img.id);

        if (targetIds.length === 0) {
            const statusDiv = document.getElementById('batchStatus');
            statusDiv.innerHTML = '⚠️ 请先选择图片';
            setTimeout(() => statusDiv.innerHTML = '', 2000);
            return;
        }

        isProcessing = true;
        const statusDiv = document.getElementById('batchStatus');
        statusDiv.innerHTML = `<div class="loading"></div> 正在处理 ${targetIds.length} 张图片...`;

        // 统计成功和失败数量
        let successCount = 0;
        let failureCount = 0;
        
        try {
            for (let i = 0; i < targetIds.length; i++) {
                const imageId = targetIds[i];
                const imageData = images.find(img => img.id === imageId);
                if (imageData) {
                    const item = document.querySelector(`[data-id="${imageId}"]`);
                    let overlay = item ? showProcessingOverlay(item) : null;

                    try {
                        await processSingleImage(imageData, operation);
                        successCount++;
                    } catch (error) {
                        console.error(`处理图片失败: ${imageData.name}`, error);
                        failureCount++;
                        logError(imageData.name, `处理失败: ${error.message || '未知错误'}`);
                    } finally {
                        overlay?.remove();
                    }

                    // 更新进度显示
                    const progress = Math.round((i + 1) / targetIds.length * 100);
                    statusDiv.innerHTML = `
                    正在处理 ${i + 1}/${targetIds.length} 张图片 (${progress}%)
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${progress}%"></div>
                    </div>
                `;

                    // 让出控制权，避免阻塞UI
                    await new Promise(resolve => setTimeout(resolve, 0));
                }
            }

            showBatchStatus(successCount, failureCount, '处理');
        } catch (error) {
            console.error('批量处理失败:', error);
            statusDiv.innerHTML = '❌ 处理失败';
            setTimeout(() => statusDiv.innerHTML = '', 2000);
        } finally {
            isProcessing = false;
        }
    }

    /**
     * 保存图片到本地
     * @param {string} format - 保存格式：'png'|'bmp'
     *
     * 支持PNG和BMP两种格式
     * 自动处理文件名和状态信息
     */
    /**
     * 保存图片到本地
     * 支持选择特定图片或处理所有图片
     * 使用公共函数saveImageInFormat进行实际的图片保存操作
     * @param {string} format - 保存格式：'png'|'bmp'|'jpg'|'jpeg'|'webp'
     * @returns {Promise<void>} 无返回值的Promise
     */
    async function saveImages(format) {
        // 检查打包下载开关状态
        const zipToggle = document.getElementById('zip-download-toggle');
        const useZip = zipToggle ? zipToggle.checked : false;
        
        if (useZip) {
            // 使用 ZIP 打包下载
            await saveImagesAsZip(format);
        } else {
            // 原有的逐个下载逻辑
            const targetIds = selectedImages.size > 0
                ? Array.from(selectedImages)
                : images.map(img => img.id);

            if (targetIds.length === 0) {
                const statusDiv = document.getElementById('batchStatus');
                statusDiv.innerHTML = '⚠️ 请先选择图片';
                setTimeout(() => statusDiv.innerHTML = '', 2000);
                return;
            }

            let successCount = 0;
            let failureCount = 0;
            
            const statusDiv = document.getElementById('batchStatus');
            statusDiv.innerHTML = `<div class="loading"></div> 正在保存 ${targetIds.length} 张图片...`;

            try {
                for (let i = 0; i < targetIds.length; i++) {
                    const imageId = targetIds[i];
                    const imageData = images.find(img => img.id === imageId);
                    if (!imageData) {
                        failureCount++;
                        continue;
                    }

                    try {
                        await saveImageInFormat(imageData, format);
                        successCount++;
                    } catch (error) {
                        console.error(`保存图片失败: ${imageData.name}`, error);
                        failureCount++;
                        logError(imageData.name, `保存失败: ${error.message || '未知错误'}`);
                    }

                    // 更新进度
                    const progress = Math.round((i + 1) / targetIds.length * 100);
                    statusDiv.innerHTML = `正在保存 ${i + 1}/${targetIds.length} (${progress}%)<div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>`;
                    await new Promise(resolve => setTimeout(resolve, 50));
                }

                showBatchStatus(successCount, failureCount, '保存');
            } catch (error) {
                console.error('保存失败:', error);
                statusDiv.innerHTML = '❌ 保存失败';
                setTimeout(() => statusDiv.innerHTML = '', 2000);
            }
        }
    }

    /**
     * 保存图片到本地（公共函数）
     */
    async function saveImageInFormat(imageData, format) {
        const blob = await storage.get(`current_${imageData.id}`);
        if (!blob) throw new Error('图片数据不存在');

        const targetFormat = format.toLowerCase();
        const outputBlob = await convertImageBlob(blob, targetFormat);

        const ext = targetFormat === 'jpeg' ? 'jpg' : targetFormat;
        const statusSuffix = getStatusSuffix(imageData.scrambleLevel);
        const fileName = `${imageData.name.replace(/\.[^/.]+$/, '')}_${statusSuffix}.${ext}`;
        downloadBlob(outputBlob, fileName);
    }

    /**
     * 添加图片到应用
     * @param {File} file - 图片文件对象
     */
    async function addImage(file) {
        const id = Date.now().toString(36) + Math.random().toString(36).substring(2);
        let blob;
        let originalFormat = file.type.split('/')[1]?.toUpperCase() || 'UNKNOWN';
        try {
            // 优先使用 arrayBuffer
            const buffer = await file.arrayBuffer();
            blob = new Blob([buffer], { type: file.type });
        } catch (firstError) {
            console.warn(`arrayBuffer 读取失败，尝试 FileReader: ${file.name}`, firstError);
            try {
                // 回退到 FileReader
                const buffer = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = () => reject(reader.error);
                    reader.readAsArrayBuffer(file);
                });
                blob = new Blob([buffer], { type: file.type });
            } catch (secondError) {
                console.warn(`FileReader 读取也失败，尝试 createImageBitmap 直接获取图像：${file.name}`, secondError);
                try {
                    // 最终回退：尝试直接使用 createImageBitmap 获取图像数据（绕过文件读取）
                    const bitmap = await createImageBitmap(file);
                    // 将 ImageBitmap 绘制到 canvas 并导出为 PNG Blob
                    const canvas = getCanvasFromPool(bitmap.width, bitmap.height);
                    const ctx = canvas.getContext('2d');
                    // 清除旧内容，避免透明图层残留
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(bitmap, 0, 0);
                    bitmap.close();
                    blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                    releaseCanvasToPool(canvas);
                    originalFormat = 'PNG'; // 强制格式为 PNG
                    console.warn(`已将图片 ${file.name} 转换为 PNG 格式存储（回退方案）`);
                } catch (thirdError) {
                    console.error(`所有读取方式均失败：${file.name}`, thirdError);
                    throw thirdError; // 彻底失败
                }
            }
        }

        // 存储原始图片
        await storage.set(`original_${id}`, blob);
        await storage.set(`current_${id}`, blob); // 当前图片初始为原始

        // 先获取图片尺寸
        const bitmap = await createImageBitmap(blob);
        const width = bitmap.width;
        const height = bitmap.height;
        bitmap.close();

        const imageData = {
            id,
            name: file.name,
            originalName: file.name,
            scrambleLevel: 0,          // 新增：混淆级别，0=原始，正数=混淆次数，负数=解混淆次数
            size: blob.size,
            width: width,
            height: height,
            naturalWidth: width,
            naturalHeight: height,
            format: originalFormat,
            processed: false
        };
        images.push(imageData);
        await renderImageItem(imageData);
        updateImageCounter();
        hideEmptyState();

        if (!hasImportedFiles) {
            hasImportedFiles = true;
            const desc = document.getElementById('description-text');
            if (desc) desc.style.display = 'none';
        }
        
        // 更新界面显示
        updateImageInfo(imageData.id);
    }

    /**
     * 格式化文件大小为易读格式
     * @param {number} bytes - 文件大小（字节）
     * @returns {string} 格式化后的文件大小字符串
     *
     * 支持B、KB、MB、GB四种单位，自动选择合适的单位
     */
    function formatFileSize(bytes) {
        if (bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    /**
     * 更新图片信息显示
     * @param {string} imageId - 图片 ID
     *
     * 更新图片名称、尺寸、大小和状态信息的显示
     * 优化：文件名仅在初次渲染时设置，此处仅更新可变部分（尺寸、状态等）
     */
    function updateImageInfo(imageId) {
        const imageData = images.find(img => img.id === imageId);
        if (!imageData) return;
    
        const cache = imageData.domCache;
        if (!cache) return;
    
        // 更新尺寸信息
        const hasValidSize = imageData.hasOwnProperty('width') && 
                            imageData.hasOwnProperty('height') && 
                            typeof imageData.width === 'number' && 
                            typeof imageData.height === 'number' &&
                            imageData.width > 0 && 
                            imageData.height > 0;
        
        if (cache.sizeRow) {
            cache.sizeRow.innerHTML = `<span>${hasValidSize ? 
                `${imageData.width}×${imageData.height}` : 
                '<span style="color: #999; font-style: italic;">尺寸未知</span>'}</span>`;
        }
            
        // 更新格式和大小信息
        if (cache.fileSize) {
            cache.fileSize.textContent = `格式：${imageData.format || 'N/A'} | ${formatFileSize(imageData.size)}`;
        }
            
        // 更新状态徽章（基于 scrambleLevel）
        if (cache.statusBadge) {
            const newStatusText = getStatusText(imageData.scrambleLevel);
            const newStatusClass = getStatusClass(imageData.scrambleLevel);
            cache.statusBadge.className = `status-badge ${newStatusClass}`;
            cache.statusBadge.textContent = newStatusText;
        }
    }

    /**

     * @param {string} imageId - 图片ID
     * @param {Event} event - 事件对象
     *
     * 切换单张图片的选择状态，更新UI显示
     */
    function toggleSelect(imageId, event) {
        event.stopPropagation();  // 阻止事件冒泡

        const item = document.querySelector(`[data-id="${imageId}"]`);
        const checkbox = item ? item.querySelector('.select-checkbox') : null;
        
        if (selectedImages.has(imageId)) {
            selectedImages.delete(imageId);
            if (item) item.classList.remove('selected');
            if (checkbox) checkbox.checked = false;  // 显式设置复选框状态
        } else {
            selectedImages.add(imageId);
            if (item) item.classList.add('selected');
            if (checkbox) checkbox.checked = true;   // 显式设置复选框状态
        }
        
        // 更新保存按钮文字
        updateSaveButtonText();
    }

    /**
     * 全选图片

     * 选择所有图片，更新选中状态和UI显示
     */
    function selectAll() {
        selectedImages.clear();
        images.forEach(img => {
            selectedImages.add(img.id);
            const item = document.querySelector(`[data-id="${img.id}"]`);
            if (item) {
                item.classList.add('selected');
                const checkbox = item.querySelector('.select-checkbox');

    /**
     * 删除选中的图片
     *
     * 释放选中图片的资源，从数组和 DOM 中移除，清空选择状态
     */
    async function deleteSelectedImages() {
        if (isProcessing) {
            alert('正在处理中，请稍后...');
            return;
        }
            
        // 如果没有选中的图片，提示用户
        if (selectedImages.size === 0) {
            const statusDiv = document.getElementById('batchStatus');
            statusDiv.innerHTML = '⚠️ 请先选择要删除的图片';
            setTimeout(() => statusDiv.innerHTML = '', 2000);
            return;
        }
            
        // 复制选中的 ID 集合，避免在迭代时修改集合
        const idsToDelete = Array.from(selectedImages);
            
        // 清理存储中的数据
        for (const id of idsToDelete) {
            await storage.delete(`original_${id}`);
            await storage.delete(`current_${id}`);
        }
            
        // 从数组中移除选中的图片
        images = images.filter(img => !selectedImages.has(img.id));
            
        // 从 DOM 中移除选中的图片项
        idsToDelete.forEach(id => {
            const item = document.querySelector(`[data-id="${id}"]`);
            if (item) {
                item.remove();
            }
        });
            
        // 重置选择状态
        selectedImages.clear();
        
        // 更新保存按钮文字
        updateSaveButtonText();
        
        // 更新计数器
        updateImageCounter();
            
        // 如果没有图片了，显示空状态
        if (images.length === 0) {
            showEmptyState();
        }
            
        console.log(`已删除 ${idsToDelete.length} 张选中的图片`);
    }

    /**
     * 删除单张图片
     * @param {string} imageId - 要删除的图片 ID
     * 
     * 从数组和 DOM 中移除图片，同时释放 Blob URL 资源
     */
    async function deleteSingleImage(imageId) {
        if (isProcessing) {
            alert('正在处理中，请稍后...');
            return;
        }
        
        const imageData = images.find(img => img.id === imageId);
        if (!imageData) {
            console.warn('未找到要删除的图片:', imageId);
            return;
        }
        
        // 直接删除，不弹出确认对话框
                
        try {
            // ✅ 清理存储：删除原始图片和当前图片
            await storage.delete(`original_${imageId}`);
            await storage.delete(`current_${imageId}`);
            console.log(`🗑️ 已删除存储数据：original_${imageId}, current_${imageId}`);
                    
            // 从 DOM 中移除图片项
            const item = document.querySelector(`[data-id="${imageId}"]`);
            if (item) {
                item.remove();
            }
            
            // 从数组中移除图片数据
            images = images.filter(img => img.id !== imageId);
            
            // 从选中集合中移除
            selectedImages.delete(imageId);
            
            // 更新保存按钮文字
            updateSaveButtonText();
            
            // 更新计数器
            updateImageCounter();
            
            // 如果没有图片了，显示空状态
            if (images.length === 0) {
                showEmptyState();
            }
            
            console.log('已删除图片:', imageData.name);
        } catch (error) {
            console.error('删除图片时出错:', error);
            alert('删除图片失败: ' + (error.message || '未知错误'));
        }
    }

    /**
     * 处理单张图片（用户界面调用）
     * 提供用户界面级别的单张图片处理功能
     * 
     * @param {string} imageId - 图片ID
     * @param {string} operation - 操作类型：'encrypt'|'decrypt'|'restore'|'save'
     */
    async function processSingle(imageId, operation) {
        if (isProcessing) return;

        isProcessing = true;
        const imageData = images.find(img => img.id === imageId);
        if (!imageData) {
            isProcessing = false;
            return;
        }

        const statusDiv = document.getElementById('batchStatus');
        
        let overlay = null;
        try {
            if (operation === 'save') {
                await saveSingleImage(imageId);
            } else {
                const item = document.querySelector(`[data-id="${imageId}"]`);
                if (item) overlay = showProcessingOverlay(item);

                await processSingleImage(imageData, operation);

                statusDiv.innerHTML = `✅ "${imageData.name}" 处理完成`;
                setTimeout(() => statusDiv.innerHTML = '', 2000);
            }
        } catch (error) {
            console.error('处理失败:', error);
            statusDiv.innerHTML = `❌ "${imageData.name}" 处理失败`;
            setTimeout(() => statusDiv.innerHTML = '', 2000);
        } finally {
            overlay?.remove();
            isProcessing = false;
        }
    }

    /**
     * 处理文件添加
     * @param {File[]} files - 文件数组
     *
     * 处理通过拖拽或文件选择添加的图片文件
     */
    async function handleFiles(files) {
        let addedCount = 0;
        let errorCount = 0;

        for (const file of files) {
            // 检查是否为 ZIP 文件
            const isZip = file.type === 'application/zip' || 
                          file.name.toLowerCase().endsWith('.zip');
            
            if (isZip) {
                // 处理 ZIP 文件
                const result = await extractZipAndAddImages(file);
                addedCount += result.added;
                errorCount += result.errors.length;
                continue;
            }
            
            // 原有图片处理逻辑
            if (!isValidImageFile(file)) {
                logError(file.name, '不是有效的图片文件');
                errorCount++;
                continue;
            }

            try {
                await addImage(file);
                addedCount++;
            } catch (error) {
                console.error(`添加图片失败：${file.name}`, error);
                logError(file.name, `添加失败: ${error.message || '未知错误'}`);
                errorCount++;
            }
        }

        let message = '';
        if (addedCount > 0 && errorCount > 0) {
            message = ` 已添加 ${addedCount} 张图片， ${errorCount} 个文件被拒绝或读取失败`;
        } else if (addedCount > 0) {
            message = ` 已添加 ${addedCount} 张图片`;
        } else if (errorCount > 0) {
            message = ` 所有 ${errorCount} 个文件都被拒绝或读取失败`;
        }

        if (message) {
            const statusDiv = document.getElementById('batchStatus');
            statusDiv.innerHTML = message;
            setTimeout(() => statusDiv.innerHTML = '', 3000);
        }
    }



    /**
     * 验证文件是否为图片
     * @param {File} file - 文件对象
     * @returns {boolean} 是否为有效的图片文件
     *
     * 检查文件的MIME类型和扩展名来确定是否为图片
     */
    function isValidImageFile(file) {
        // 检查MIME类型
        const validMimeTypes = [
            'image/jpeg',
            'image/jpg',
            'image/png',
            'image/gif',
            'image/webp',
            'image/svg+xml',
            'image/bmp',
            'image/tiff'
        ];

        if (validMimeTypes.includes(file.type.toLowerCase())) {
            return true;
        }

        // 检查文件扩展名
        const fileName = file.name.toLowerCase();
        const validExtensions = ['.jpg', '.jpeg', '.png', '.gif', '.webp', '.bmp', '.tiff', '.svg'];

        return validExtensions.some(ext => fileName.endsWith(ext));
    }

    /**

    function initColorPicker() {

                updateColorInputs(color);
                updateColorPreview(color.hexString);
                opaqueBackgroundColor = color.hexString;
            });
            // 初始化输入框
            const initialColor = colorPickerInstance.color;
            updateColorInputs(initialColor);
            updateColorPreview(initialColor.hexString);
            
            console.log('✅ 颜色选择器初始化成功');

            // 监听容器宽度：换行时切换为垂直布局（色条自动变为横向）
            let isWrapped = false;
            const pickerRow = document.getElementById('color-picker-box')?.parentElement;
            if (pickerRow) {
                const layout = [{ component: iro.ui.Box }, { component: iro.ui.Slider, options: { sliderType: 'hue' } }];
                new ResizeObserver(() => {
                    const wrapped = pickerRow.clientHeight > 250;
                    if (wrapped === isWrapped) return;
                    isWrapped = wrapped;
                    const currentColor = colorPickerInstance.color.hsv;
                    document.getElementById('color-picker-box').innerHTML = '';
                    colorPickerInstance = new iro.ColorPicker('#color-picker-box', {
                        width: 200, layoutDirection: wrapped ? 'vertical' : 'horizontal', layout,
                        color: currentColor, borderWidth: 1, borderColor: '#ddd',
                        containerStyle: 'border-radius: 0;'
                    });
                    colorPickerInstance.on('color:change', (color) => {
                        updateColorInputs(color);
                        updateColorPreview(color.hexString);
                        opaqueBackgroundColor = color.hexString;
                    });
                    const c = colorPickerInstance.color;
                    updateColorInputs(c);
                    updateColorPreview(c.hexString);
                }).observe(pickerRow);
            }
        } catch (error) {
            console.error('颜色选择器初始化失败:', error);
        }
    }
    
    /**
     * 更新颜色输入框的值
     * @param {Object} color - iro.js 颜色对象
     */
    function updateColorInputs(color) {
        const hexInput = document.getElementById('hex-input');
        const rgbRInput = document.getElementById('rgb-r-input');
        const rgbGInput = document.getElementById('rgb-g-input');
        const rgbBInput = document.getElementById('rgb-b-input');
        
        const activeElement = document.activeElement;
        
        // 只更新非焦点的输入框
        if (hexInput && activeElement !== hexInput) {
            hexInput.value = color.hexString;
        }
        
        if (activeElement !== rgbRInput && rgbRInput) {
            rgbRInput.value = color.rgb.r;
        }
        if (activeElement !== rgbGInput && rgbGInput) {
            rgbGInput.value = color.rgb.g;
        }
        if (activeElement !== rgbBInput && rgbBInput) {
            rgbBInput.value = color.rgb.b;
        }
    }
    
    /**
     * 更新颜色预览框
     * @param {string} hexColor - 十六进制颜色值
     */
    function updateColorPreview(hexColor) {
        const preview = document.getElementById('color-preview');
        if (preview) {
            preview.style.backgroundColor = hexColor;
        }
    }
    
    /**
     * 从十六进制输入框更新颜色
     * @param {string} hexValue - 十六进制颜色值
     */
    function updateColorFromHex(hexValue) {
        if (!colorPickerInstance) return;
        
        // 验证十六进制格式
        const hexRegex = /^#([A-Fa-f0-9]{6}|[A-Fa-f0-9]{3})$/;
        if (hexRegex.test(hexValue)) {
            colorPickerInstance.color.set(hexValue);
            opaqueBackgroundColor = hexValue;
            updateColorPreview(hexValue);
        }
    }
    
    /**
     * 从 RGB 输入框更新颜色
     */
    function updateColorFromRgb() {
        if (!colorPickerInstance) return;
        
        const rgbRInput = document.getElementById('rgb-r-input');
        const rgbGInput = document.getElementById('rgb-g-input');
        const rgbBInput = document.getElementById('rgb-b-input');
        
        if (!rgbRInput || !rgbGInput || !rgbBInput) return;
        
        const r = parseInt(rgbRInput.value) || 0;
        const g = parseInt(rgbGInput.value) || 0;
        const b = parseInt(rgbBInput.value) || 0;
        
        // 验证范围
        if (r >= 0 && r <= 255 && g >= 0 && g <= 255 && b >= 0 && b <= 255) {
            colorPickerInstance.color.set({ r, g, b });
            opaqueBackgroundColor = colorPickerInstance.color.hexString;
            updateColorPreview(opaqueBackgroundColor);
        }
    }

    /**
     * 按照 Viewer.js 最佳实践实现的图片预览功能
     * @param {string} imageId - 要预览的图片 ID
     * 
     * 遵循 Viewer.js 官方推荐的实现方式：
     * 1. 使用图片容器作为 Viewer 的目标元素
     * 2. 利用 Viewer.js 的内置生命周期事件
     * 3. 实现完善的资源管理和错误处理
     * 4. 支持优雅降级到基础查看器
     * 
     * 取消机制防止竞态条件：
     * - 使用取消令牌避免多个预览实例同时存在
     * - 快速连续点击时自动取消前一个操作
     */
    async function showPreview(imageId) {
        const imageData = images.find(img => img.id === imageId);
        if (!imageData) {
            console.warn('未找到指定图片:', imageId);
            return;
        }
        
        // 1. 彻底清理所有残留预览容器和实例
        const existingContainers = document.querySelectorAll('.image-gallery-container');
        existingContainers.forEach(container => {
            if (container.parentNode) container.parentNode.removeChild(container);
        });
        cleanupExistingViewer();
        
        // 2. 重置取消标志
        previewCanceled = false;
        
        // 3. 创建新容器
        const galleryContainer = await createImageGalleryContainer();
                
        try {
            // 4. 若关闭 Viewer.js 开关，直接使用基础查看器
            if (!useViewerJs) {
                await handleViewerInitializationFailure(galleryContainer, imageData);
                return;
            }

            // 5. 等待 Viewer 资源加载并初始化
            await getViewerLoadPromise();
                
            if (previewCanceled) {
                if (galleryContainer.parentNode) galleryContainer.parentNode.removeChild(galleryContainer);
                return;
            }
                
            if (!window.Viewer) {
                console.error('Viewer.js 不可用');
                await handleViewerInitializationFailure(galleryContainer, imageData);
                return;
            }
                
            await initializeViewerWithBestPractices(imageData, galleryContainer, imageId);
        } catch (error) {
            if (previewCanceled) return;
            console.error('Viewer 初始化失败:', error);
            await handleViewerInitializationFailure(galleryContainer, imageData);
        }
    }

    /**
     * 按照最佳实践初始化 Viewer.js
     * @param {Object} imageData - 图片数据
     * @param {HTMLElement} container - 容器元素
     * @param {string} targetImageId - 目标图片 ID
     */
    async function initializeViewerWithBestPractices(imageData, container, targetImageId) {
        // 最终检查取消状态
        if (previewCanceled) {
            console.log('⏭️ 预览操作已被取消，跳过 Viewer 实例创建');
            // 清理容器
            if (container && container.parentNode) {
                container.parentNode.removeChild(container);
            }
            return;
        }
            
        try {
            // 等待所有图片至少尝试加载完成
            if (container._loadPromises) {
                console.log('⏳ 等待图片加载完成...');
                await container._loadPromises;
                console.log('✅ 所有图片加载尝试完成');
            }
                
            // 额外等待一小段时间，确保 DOM 渲染完成
            await new Promise(resolve => setTimeout(resolve, 100));
                
            // @ts-ignore - Viewer.js 是动态加载的，忽略类型检查
            const ViewerConstructor = window.Viewer;
                
            viewerInstance = new ViewerConstructor(container, {
                // 基础配置
                inline: false,
                backdrop: true,
                loading: true,
                
                // 导航和交互
                keyboard: true,
                focus: true,
				loop: true,
                
                // UI组件
                button: true,
                navbar: true,
                toolbar: getOptimizedToolbarConfig(),
                title: false,
                
                // 行为配置
                movable: true,
                zoomable: true,
                rotatable: true,
                scalable: true,
                transition: false,   // 关闭动画
                fullscreen: true,
                
                // 过滤器：优化图片加载判断逻辑
                filter(image) {
                    // 更宽松的图片过滤条件，确保所有图片都能被加载
                    const isLoaded = image.complete || image.readyState === 4 || image.naturalWidth > 0;
                    if (isLoaded) {
                        return true;
                    }
                    // 对于未完成加载的图片，也允许 Viewer.js 加载
                    // Viewer.js 会在内部等待图片加载完成
                    console.log(`🔄 图片 ${image.alt} 尚未完全加载，Viewer.js 将等待其加载完成`);
                    return true;
                },
                
                // 生命周期事件
                ready() {
                    console.log('✅ Viewer.js 已准备就绪');
                },
                                
                shown() {
                    // 统计加载成功和失败的图片
                    const viewerImages = container.querySelectorAll('img');
                    let loadedCount = 0;
                    let failedImages = [];
                    
                    viewerImages.forEach((img, idx) => {
                        if (img.complete && img.naturalWidth > 0) {
                            loadedCount++;
                        } else {
                            failedImages.push(idx + 1);
                        }
                    });
                    
                    if (failedImages.length === 0) {
                        console.log(`✅ 已加载${loadedCount}张图片`);
                    } else {
                        console.log(`✅ 已加载${loadedCount}张图片，图片${failedImages.join('、')}失败`);
                    }
                },
                                
                viewed(event) {
                    const { detail } = event;
                    const currentImage = detail.image;
                    const currentIndex = detail.index;
                    console.log(`✅ 当前查看图片：${currentImage.alt || '未知'} (索引：${currentIndex})`);
                                    
                    // 每次切换图片时检查加载状态
                    if (!currentImage.complete || currentImage.naturalWidth === 0) {
                        console.warn('⚠️ 当前图片尚未加载完成');
                    }
                },
                
                hide() {
                    console.log('ℹ️ Viewer.js 开始隐藏');
                },
                
                hidden() {
                    console.log('✅ Viewer.js 已隐藏');
                    cleanupViewerResources(container);
                },
                
                play() {
                    console.log('▶️ 全屏');
                }
            });
            
            // 显示查看器
            viewerInstance.show();
                        
            // 延迟一小段时间确保 DOM 完全渲染
            await new Promise(resolve => setTimeout(resolve, 50));
            
            // 定位到目标图片 - 通过 data-imageId 属性查找 DOM 中的实际位置
            const targetImg = container.querySelector(`img[data-image-id="${targetImageId}"]`);
            if (targetImg) {
                const domIndex = Array.from(container.children).indexOf(targetImg);
                console.log(`🔍 容器中共有 ${container.children.length} 张图片`);
                console.log(`🎯 找到目标图片，DOM 索引：${domIndex}`);
                viewerInstance.view(domIndex);
            } else {
                // 详细调试信息
                console.error(`❌ 未在 DOM 中找到目标图片：${targetImageId}`);
                console.log(`📊 容器中的图片元素:`);
                Array.from(container.children).forEach((img, idx) => {
                    const imageId = img.dataset?.imageId || '无 ID';
                    console.log(`  [${idx}] ID: ${imageId}, Alt: ${img.alt}`);
                });
                                
                // 尝试使用 Viewer.js 的 images 数组访问（Viewer.js 1.x 使用 images 而非 list）
                if (viewerInstance && viewerInstance.images) {
                    console.log(`📋 Viewer.js images 中有 ${viewerInstance.images.length} 张图片`);
                    viewerInstance.images.forEach((img, idx) => {
                        const imageId = img.dataset?.imageId || '无 ID';
                        console.log(`  [${idx}] ID: ${imageId}, Alt: ${img.alt}`);
                    });
                                    
                    // 尝试在 Viewer.js 的 images 中查找
                    const foundIndex = viewerInstance.images.findIndex(img => img.dataset?.imageId === targetImageId);
                    if (foundIndex >= 0) {
                        console.log(`✅ 在 Viewer.js images 中找到目标图片，索引：${foundIndex}`);
                        viewerInstance.view(foundIndex);
                    }
                }
            }
            
        } catch (error) {
            console.error('❌ Viewer.js 初始化过程中发生错误:', error);
            await handleViewerInitializationFailure(container, imageData);
        }
    }

    /**
     * 处理 Viewer.js 初始化失败的情况
     * @param {HTMLElement} container - 容器元素
     * @param {Object} imageData - 图片数据
     */
    async function handleViewerInitializationFailure(container, imageData) {
        // 检查是否因取消而失败
        if (previewCanceled) {
            console.log('⏭️ 预览操作已被取消，跳过失败处理');
            cleanupViewerResources(container);
            return;
        }
            
        // 清理容器并释放 Blob URL
        cleanupViewerResources(container);
            
        // 启用基础图片查看器作为兜底方案
        console.log('ℹ️ 启用基础图片查看器作为替代方案');
            
        // 获取当前图片 Blob 并创建临时 URL
        try {
            const blob = await storage.get(`current_${imageData.id}`);
            if (blob) {
                const url = URL.createObjectURL(blob);
                showBasicImageViewer({ blobUrl: url, originalName: imageData.name });
                // 延迟释放 URL，确保图片加载完成
                setTimeout(() => {
                    URL.revokeObjectURL(url);
                    console.log('🔓 已释放临时 Blob URL');
                }, 1000);
            } else {
                console.error('无法获取图片数据:', imageData.id);
            }
        } catch (error) {
            console.error('获取图片 Blob 失败:', error);
        }
    }

    /**
     * 清理 Viewer.js 相关资源
     * @param {HTMLElement} container - 容器元素
     */
    function cleanupViewerResources(container) {
        if (viewerInstance) {
            try {
                viewerInstance.destroy();
            } catch (e) {
                console.warn('销毁 Viewer 实例出错:', e);
            }
            viewerInstance = null;
        }
        if (container && container.parentNode) {
            // 释放所有临时 blob URL
            const imgs = container.querySelectorAll('img');
            imgs.forEach(img => {
                const url = img.dataset.blobUrl;
                if (url && url.startsWith('blob:')) {
                    URL.revokeObjectURL(url);
                    console.log(`🔓 已释放临时 Blob URL`);
                }
            });
            container.parentNode.removeChild(container);
        }
        console.log('✅ Viewer.js 资源已清理');
    }

    // 刷新缩略图功能

    let isRefreshingThumbnails = false;  // 刷新锁，防止并发刷新

    /**
     * 刷新所有图片的缩略图
     * 从存储中重新获取每张图片的 current blob 并重绘缩略图
     */
    async function refreshAllThumbnails() {
        // 列表模式下不执行缩略图刷新
        if (currentViewMode === 'list') {
            const statusDiv = document.getElementById('batchStatus');
            statusDiv.innerHTML = 'ℹ️ 当前为列表模式，不显示缩略图，无需刷新';
            setTimeout(() => statusDiv.innerHTML = '', 2000);
            return;
        }
        
        const refreshBtn = document.getElementById('refresh-list-btn');
        
        // 防止重复刷新
        if (isRefreshingThumbnails) {
            console.log('刷新缩略图正在进行中，请稍后再试');
            return;
        }
        
        // 检查是否有图片
        if (images.length === 0) {
            const statusDiv = document.getElementById('batchStatus');
            statusDiv.innerHTML = '⚠️ 没有图片需要刷新';
            setTimeout(() => statusDiv.innerHTML = '', 2000);
            return;
        }
        
        isRefreshingThumbnails = true;
        // 禁用按钮防止误操作
        if (refreshBtn) {
            refreshBtn.disabled = true;
            refreshBtn.style.opacity = '0.5';
            refreshBtn.style.cursor = 'not-allowed';
        }
        
        // 创建快照避免数组变化导致索引错乱
        const snapshot = [...images];
        const statusDiv = document.getElementById('batchStatus');
        const totalCount = snapshot.length;
        let successCount = 0;
        let failureCount = 0;
        
        statusDiv.innerHTML = `<div class="loading"></div> 正在刷新缩略图 (0/${totalCount})...`;
        
        try {
            // 串行刷新，避免大量并发导致内存压力
            for (let i = 0; i < totalCount; i++) {
                const imageData = snapshot[i];
                if (!imageData) continue;
                
                try {
                    // 获取当前图片的 Blob
                    const blob = await storage.get(`current_${imageData.id}`);
                    if (blob) {
                        await updateThumbnail(imageData.id, blob);
                        successCount++;
                    } else {
                        console.warn(`图片 ${imageData.name} 的 Blob 数据不存在`);
                        failureCount++;
                    }
                } catch (error) {
                    console.error(`刷新缩略图失败: ${imageData.name}`, error);
                    failureCount++;
                    logError(imageData.name, `刷新缩略图失败: ${error.message || '未知错误'}`);
                }
                
                // 更新进度显示
                const progress = Math.round((i + 1) / totalCount * 100);
                statusDiv.innerHTML = `正在刷新缩略图 ${i + 1}/${totalCount} (${progress}%)<div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>`;
                
                // 让出控制权，避免阻塞UI
                await new Promise(resolve => setTimeout(resolve, 10));
            }
            
            showBatchStatus(successCount, failureCount, '刷新');
            
            console.log(`缩略图刷新完成：成功 ${successCount}，失败 ${failureCount}`);
        } catch (error) {
            console.error('刷新缩略图过程出错:', error);
            statusDiv.innerHTML = ' 刷新缩略图失败';
            setTimeout(() => statusDiv.innerHTML = '', 3000);
        } finally {
            isRefreshingThumbnails = false;
            // 恢复按钮状态
            if (refreshBtn) {
                refreshBtn.disabled = false;
                refreshBtn.style.opacity = '';
                refreshBtn.style.cursor = '';
            }
        }
    }
