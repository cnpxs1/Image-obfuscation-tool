<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片混淆工具</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <!-- Viewer.js CSS 智能加载 | 许可证：MIT License -->
    <!-- 第一级：bootcdn CSS -->
    <link id="viewer-css" href="https://cdn.bootcdn.net/ajax/libs/viewerjs/1.11.7/viewer.min.css" rel="stylesheet" onload="if(window.viewerResources){window.viewerResources.cssLoaded=true; window.viewerResources.currentCDN='bootcdn'}" onerror="loadCDNFallback('css', 'bootcdn')">
    <!-- iro.js 颜色选择器库智能加载 | 许可证：MIT License -->
    <script>
        // iro.js 资源加载状态
        window.iroResources = {
            loaded: false,
            loading: false,
            failed: false
        };
        
        function loadIro(cdnUrl, fallbackUrls, index = 0) {
            if (window.iroResources.loaded || window.iroResources.loading) return;
            window.iroResources.loading = true;
            
            const script = document.createElement('script');
            script.src = cdnUrl;
            script.onload = () => {
                if (typeof iro !== 'undefined') {
                    window.iroResources.loaded = true;
                    window.iroResources.loading = false;
                    console.log('iro.js 加载成功:', cdnUrl);
                } else {
                    console.warn('iro.js 脚本加载但未定义，视为失败');
                    window.iroResources.loading = false;
                    script.onerror(new Error('iro is not defined'));
                }
            };
            script.onerror = () => {
                console.warn('iro.js 加载失败:', cdnUrl);
                window.iroResources.loading = false;
                if (index < fallbackUrls.length) {
                    loadIro(fallbackUrls[index], fallbackUrls, index + 1);
                } else {
                    window.iroResources.failed = true;
                    console.error('iro.js 所有源均加载失败，颜色选择器功能将不可用');
                }
            };
            document.head.appendChild(script);
        }

        // localStorage 禁用时使用默认值（开启），否则按开关状态决定
        if (localStorage.getItem('localStorageEnabled') === 'false' || localStorage.getItem('iroJs') !== 'false') {
            loadIro(
                'https://fastly.jsdelivr.net/npm/@jaames/iro@5.5.2/dist/iro.min.js',
                [
                    'https://unpkg.com/@jaames/iro@5.5.2/dist/iro.min.js',
                    './assets/irojs/iro.js'
                ]
            );
        }
    </script>
    <!-- fflate 库智能加载 - ZIP 压缩/解压 | 许可证：MIT License -->
    <script>
        // fflate 资源加载状态
        window.fflateResources = {
            loaded: false,
            loading: false,
            failed: false
        };
        
        function loadFflate(cdnUrl, fallbackUrls, index = 0) {
            if (window.fflateResources.loaded || window.fflateResources.loading) return;
            window.fflateResources.loading = true;
            
            const script = document.createElement('script');
            script.src = cdnUrl;
            script.onload = () => {
                if (typeof fflate !== 'undefined') {
                    window.fflateResources.loaded = true;
                    window.fflateResources.loading = false;
                    console.log('fflate 加载成功:', cdnUrl);
                } else {
                    console.warn('fflate 脚本加载但未定义，视为失败');
                    window.fflateResources.loading = false;
                    script.onerror(new Error('fflate is not defined'));
                }
            };
            script.onerror = () => {
                console.warn('fflate 加载失败:', cdnUrl);
                window.fflateResources.loading = false;
                if (index < fallbackUrls.length) {
                    loadFflate(fallbackUrls[index], fallbackUrls, index + 1);
                } else {
                    window.fflateResources.failed = true;
                    console.error('fflate 所有源均加载失败，ZIP 功能将不可用');
                    // 禁用 ZIP 下载开关（延迟到 DOM 就绪）
                    const disableZipToggle = () => {
                        const zipToggle = document.getElementById('zip-download-toggle');
                        if (zipToggle) {
                            zipToggle.disabled = true;
                            zipToggle.title = 'fflate 库加载失败，ZIP 功能不可用';
                        }
                    };
                    if (document.readyState === 'loading') {
                        document.addEventListener('DOMContentLoaded', disableZipToggle);
                    } else {
                        disableZipToggle();
                    }
                }
            };
            document.head.appendChild(script);
        }

        // 优先级：jsDelivr -> unpkg -> 本地
        loadFflate(
            'https://fastly.jsdelivr.net/npm/fflate@0.8.2/umd/index.min.js',
            [
                'https://unpkg.com/fflate@0.8.2/umd/index.js',
                './assets/fflate/fflate.js'
            ]
        );
    </script>
    <!--
    图片混淆工具 - 基于希尔伯特曲线的图片混淆算法
    功能：支持图片的混淆、解混淆、还原操作，保持像素空间相关性
    特点：支持批量处理、拖拽上传、多种格式保存
    -->
    <style>
        /* 全局样式 */
        body {
            margin: 0;
            padding: 1rem;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 缓存方案指示器 */
        #cacheIndicator {
            position: fixed;
            top: 5px;
            right: 5px;
            background: #fff;
            color: #333;
            border: 2px solid #4CAF50;
            padding: 5px 8px;
            max-width: 75px;
            border-radius: 6px;
            z-index: 999; /* 低于图片查看器（基础查看器 10000，Viewer.js modal 通常>1000） */
            display: none;
            cursor: default;
            white-space: nowrap;/* 禁止换行 */
        }

        /* 气泡提示样式（统一样式） */
        #cacheIndicator::after {
            content: attr(data-tooltip);
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 8px;
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.95rem;
            max-width: 250px;
            min-width: 150px;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            line-height: 1.3;
            display: none;
        }

        /* PC端：鼠标悬停显示气泡 */
        @media screen and (min-width: 769px) {
            #cacheIndicator:hover::after {
                display: block;
            }
        }

        /* 移动端适配 */
        @media screen and (max-width: 768px) {
            .main-content {
                position: relative; /* 为缓存指示器提供定位上下文 */
            }
            
            /* 移动端时缓存指示器相对于 main-content 定位，在其上层并随内容滚动 */
            #cacheIndicator {
                position: absolute;
                top: 5px;
                right: 5px;
                margin-bottom: 10px;
                padding: 5px 8px;
                max-width: 75px;
                white-space: nowrap;/* 禁止换行 */
                cursor: pointer; /* 允许点击 */
            }
            
            /* 移动端：点击激活时显示气泡 */
            #cacheIndicator.tooltip-active::after {
                display: block;
            }
        }

        /* 通用文字气泡提示 */
        .text-tooltip {
            position: relative;
            cursor: help;
        }
        .text-tooltip::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-bottom: 6px;
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.85rem;
            white-space: nowrap;
            max-width: calc(100vw - 20px);
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            display: none;
        }
        /* 屏幕边缘检测：左边缘 */
        .text-tooltip.edge-left::after {
            left: 0;
            transform: none;
        }
        /* 屏幕边缘检测：右边缘 */
        .text-tooltip.edge-right::after {
            left: auto;
            right: 0;
            transform: none;
        }
        /* PC端：鼠标悬停 */
        @media (hover: hover) {
            .text-tooltip:hover::after {
                display: block;
            }
        }
        /* 移动端：点击激活 */
        .text-tooltip.tooltip-active::after {
            display: block;
        }

        /* 通用按钮样式 */
        .normal_button {
            min-width: 4rem;
            height: 2rem;
            line-height: 2rem;
            font-size: 1rem;
            padding: 0 0.5rem;
            margin: 0.3rem;
            border: 0;
            border-radius: 6px;
            display: inline-block;
            position: relative;
            vertical-align: middle;
            cursor: pointer;
        }

        /* 隐藏的文件输入按钮 */
        .ipt_btn {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* 拖放区域样式 */
        .drop-zone {
            margin: 1rem auto;
            padding: 2rem;
            border: 2px dashed #ccc;
            border-radius: 10px;
            text-align: center;
            max-width: 600px;
            cursor: pointer;
            transition: border-color 0.3s;
            min-height: 100px; /* 为内容预留最小高度 */
        }

        .drop-zone.drag-over,
        .image-item.selected {
            border-color: #0091ff;
            background-color: rgba(0, 132, 255, 0.1);
        }

        /* 图片列表网格布局 */
        .image-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1rem;
            max-width: 1200px;
            margin: 2px auto 2rem auto;
        }

        /* 单个图片项样式 */
        .image-item {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px;
            background: #f9f9f9;
            position: relative;
        }

        /* 缩略图容器 */
        .thumbnail-container {
            position: relative;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 4px;
            background: #f5f5f5;
            cursor: pointer;
        }

        /* 文本截断样式 - 使用更兼容的方式 */
        .text-multiline {
            line-height: 1.4em;
            height: 2.8em;
            overflow: hidden;
            text-align: center;
            word-wrap: break-word;
            width: 100%;
            box-sizing: border-box;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        /* 图片信息显示 */
        .image-info {
            margin-top: 0.5rem;
            font-size: 0.9rem;
            color: #666;
            text-align: center;
            min-height: 3.5rem; /* 为两行文本预留空间 */
            overflow-wrap: break-word;
            word-break: break-word; /* 用于中文等语言 */
        }

        /* 图片操作按钮区域 */
        .image-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            margin-top: 0.5rem;
            justify-content: center;
        }

        /* 操作按钮组 - 保证内部按钮不换行 */
        .action-group {
            display: flex;
            gap: 0.3rem;
            flex-wrap: nowrap;
            width: calc(180px + 0.6rem); /* 3 个按钮宽度 (60px*3) + 2 个间隙 (0.3rem*2) */
        }
        
        /* 通用开关样式（不含颜色） */
        .toggle-switch-container {
            display: inline-flex;
            align-items: center;
            height: 2rem;
            padding: 0 0;
            margin: 0.3rem;
            border: 2px solid;
            border-radius: 6px;
            background: #fff;
            gap: 0.5rem;
            box-sizing: border-box;
        }
        .toggle-switch {
            width: 4rem;
            height: calc(2rem - 4px);
            margin: 0;
            border-radius: 4px;
            display: block;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            transition: 0.3s;
            flex-shrink: 0;
        }
        .toggle-switch input {
            opacity: 0;
            position: absolute;
        }
        .toggle-slider {
            position: absolute;
            inset: 0;
        }
        .toggle-slider::before {
            content: "";
            position: absolute;
            left: 0.25rem;
            top: 50%;
            transform: translateY(-50%);
            width: calc(1.5rem - 2px);
            height: calc(1.5rem - 2px);
            border-radius: 4px;
            background: #fff;
            transition: 0.3s;
        }
        .toggle-switch input:checked + .toggle-slider::before {
            transform: translate(calc(2rem + 2px), -50%);
        }
        .toggle-switch-text {
            position: relative;
            top: -1px;
        }
        .toggle-switch-text::before {
            margin-right: 0.5rem;
        }

        /* 打包下载开关：颜色与文本 */
        .zip-download-container {
            border-color: #c8c8c8;
        }
        .zip-download-container:has(input:checked) {
            border-color: #78c878;
        }
        .zip-download-container .toggle-switch {
            background: #b4b4b4;
        }
        .zip-download-container .toggle-switch input:checked + .toggle-slider {
            background: #4caf50;
        }
        .zip-download-text::before {
            content: "逐个下载";
        }
        .zip-download-container:has(input:checked) .zip-download-text::before {
            content: "打包下载";
        }

        /* 设置开关（小尺寸），用于 WebP 无损、调试模式等 */
        .toggle-switch:has(.setting-switch) {
            width: 3rem;
            height: 1.5rem;
            border-radius: 3px;
        }
        .setting-switch + .toggle-slider {
            background: #b4b4b4;
        }
        .setting-switch:checked + .toggle-slider {
            background: #0091ff;
        }
        .setting-switch ~ .toggle-slider::before {
            left: 3px;
            width: calc(1.5rem - 5px);
            height: calc(1.5rem - 5px);
            border-radius: 3px;
        }
        .toggle-switch .setting-switch:checked ~ .toggle-slider::before {
            transform: translate(calc(1.5rem - 1px), -50%);
        }

        /* 删除和保存按钮平均分配空间 */
        .action-group .action-btn {
            flex: 1;
            min-width: 0;
        }

        /* 操作按钮样式 */
        .action-btn {
            padding: 0.2rem 0.5rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: white;
            cursor: pointer;
            font-size: 1rem;
            min-width: 60px;
            height: 2rem;
            line-height: 1.6rem;
            text-align: center;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:hover {
            background: #f0f0f0;
        }

        /* 删除按钮特殊样式 */
        .delete-btn {
            background: #ff4444;
            color: white;
            border-color: #ff4444;
        }

        .delete-btn:hover {
            background: #cc0000;
        }

        /* 状态徽章样式 */
        .status-badge {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-top: 0.3rem;
            border: 1px solid transparent; /* 默认透明边框 */
        }

        .status-original {
            background: #e3f2fd;
            color: #1976d2;
            border-color: #1976d2;
        }

        .status-encrypted {
            background: #fce4ec;
            color: #c2185b;
            border-color: #c2185b;
        }

        .status-decrypted {
            background: #e8f5e8;
            color: #388e3c;
            border-color: #388e3c;
        }

        /* 处理中遮罩层 */
        .processing-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            z-index: 2;
        }

        /* 控制按钮区域 */
        .controls-section {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin: 0;
        }

        /* 图片状态容器 */
        .image-manager-container {
            min-height: 90px;
            overflow: hidden;
        }

        /* 选择复选框 */
        .select-checkbox {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 20px;
            height: 20px;
            cursor: pointer;
            z-index: 3;
        }

        /* 批量处理状态显示 */
        .batch-status {
            text-align: center;
            margin: 1rem 0;
            font-size: 0.9rem;
            color: #666;
        }

        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #0091ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* 旋转动画 */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 进度条样式 */
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #f0f0f0;
            border-radius: 2px;
            margin-top: 0.5rem;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #eb3678, #fb773c);
            transition: width 0.3s ease;
        }

        /* 图片计数器 */
        .image-counter {
            text-align: center;
            margin: 0.5rem 0;
            color: #666;
        }

        /* 空状态提示 */
        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #999;
            font-style: italic;
            grid-column: 1 / -1;
        }

        /* 文件大小显示 */
        .file-size {
            font-size: 0.8rem;
            color: #888;
        }

        /* 图片信息行 */
        .image-info-row {
            display: flex;
            justify-content: center;
            font-size: 0.9rem;
            color: #666;
            margin: 0.2rem 0;
            align-items: center;
            text-align: center;
        }

        .image-info-row span {
            display: inline-block;
            min-width: 0;
            flex: 0 0 auto;
        }

        .image-info-row span.separator {
            margin: 0 0.3rem;
            display: inline-block;
        }


        /* 列表管理按钮容器 */
        .list-management-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 分隔线样式 */
        .divider {
            width: 1px;
            height: 24px;
            background-color: #969696;
        }

        /* 图标按钮基础样式 */
        .icon-btn {
            color: #333333;
            padding: 0;
            border: 2px solid #646464;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }
        .icon-btn:hover {
            background-color: #dcdcdc;
        }

        /* 刷新按钮 */
        .refresh-btn {
            background-color: #f5f5f5;
            min-width: 36px;
            height: 36px;
        }

        /* 设置按钮 */
        .settings-btn {
            background-color: #ffffff;
            margin: 0.3rem;
            width: 2rem;
            height: 2rem;
        }

        /* 设置面板分栏布局 */
        .setting-section {
            display: flex;
            align-items: stretch;
            gap: 20px;
            padding: 10px 0;
        }

        .setting-info {
            flex: 0 0 130px;
            min-width: 110px;
            text-align: left;
            border-right: 1px solid #e0e0e0;
            padding-right: 10px;
        }

        .setting-info h4 {
            margin: 0 0 6px 0;
            color: #555;
            font-size: 1rem;
        }

        .setting-info p {
            margin: 0;
            color: #888;
            font-size: 0.85rem;
            line-height: 1.4;
        }

        .setting-controls {
            flex: 1;
            min-width: 0;
            padding-left: 0;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
        }

        .setting-separator {
            border: none;
            border-top: 1px solid #e0e0e0;
            margin: 0;
        }

        /* 图片质量输入框始终显示微调按钮 */
        #quality-input::-webkit-inner-spin-button,
        #quality-input::-webkit-outer-spin-button {
            opacity: 1;
        }

        /* 响应式：窄屏时切换为上下布局 */
        @media (max-width: 500px) {
            .setting-section {
                flex-direction: column;
                gap: 8px;
            }
            .setting-info {
                flex: none;
                border-right: none;
                border-bottom: 1px solid #e0e0e0;
                padding-right: 0;
                padding-bottom: 8px;
            }
        }

        /* 错误日志面板 */
        .error-log-panel {
            background-color: #ffe6e6;
            border: 1px solid #ffcccc;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }

        .error-log-item {
            padding: 5px 0;
            border-bottom: 1px solid #ffdddd;
            font-family: monospace;
            font-size: 0.9rem;
            display: flex;
            align-items: flex-start;  /* 对齐到顶部 */
        }

        .error-log-item:last-child {
            border-bottom: none;
        }

        .error-timestamp {
            color: #666;
            font-size: 0.8rem;
            margin-right: 8px;
            flex: 0 0 auto;
            min-width: 80px;  /* 时间戳最小宽度 */
            max-width: 20%;   /* 限制最大宽度百分比 */
            word-break: break-word;  /* 允许换行 */
            white-space: normal;     /* 允许自动换行 */
        }
        
        .error-file-name {
            font-weight: bold;
            color: #d00;
            flex: 0 0 auto;
            min-width: 100px;  /* 文件名最小宽度 */
            max-width: 30%;    /* 限制最大宽度百分比 */
            word-break: break-word;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;     /* 单行显示，超出省略 */
        }

        function showBasicImageViewer(imageData) {

            // 清理可能存在的旧实例
            const existingViewer = document.querySelector('[data-basic-viewer]');

            `;

            // 创建图片元素
            const img = document.createElement('img');

            imgContainer.appendChild(loadingIndicator);
            imgContainer.appendChild(img);
            viewerContainer.appendChild(imgContainer);

            // 添加关闭按钮
            const closeBtn = document.createElement('button');
            closeBtn.innerHTML = '×';
            closeBtn.style.cssText = `
                position: absolute;
                right: 20px;
                top: 20px;
                width: 40px;
                height: 40px;
                background-color: rgba(0, 0, 0, 0.5);

            `;

            closeBtn.onmouseenter = () => {
                closeBtn.style.backgroundColor = 'rgba(0, 0, 0, 0.8)';
            };

            closeBtn.onmouseleave = () => {
                closeBtn.style.backgroundColor = 'rgba(0, 0, 0, 0.5)';
            };

            viewerContainer.appendChild(closeBtn);

            // 禁用页面滚动
            document.body.style.overflow = 'hidden';

            // 添加到页面
            document.body.appendChild(viewerContainer);

            // 图片加载完成后根据实际尺寸调整显示大小
            img.onload = () => {
                loadingIndicator.style.display = 'none';
                const margin = 50; // 页面边距
                const maxW = window.innerWidth - margin;
                const maxH = window.innerHeight - margin;
                const iw = img.naturalWidth;
                const ih = img.naturalHeight;
                if (iw && ih) {
                    const scale = Math.min(1, maxW / iw, maxH / ih);
                    img.style.width = (iw * scale) + 'px';
                    img.style.height = (ih * scale) + 'px';
                }
                imgContainer.style.maxWidth = maxW + 'px';
                imgContainer.style.maxHeight = maxH + 'px';
                img.style.cursor = img.naturalWidth * img.naturalHeight > maxW * maxH ? 'zoom-out' : 'default';
                console.log('基础查看器：图片加载完成');
            };
            
            img.onerror = () => {
                loadingIndicator.textContent = '图片加载失败';
                loadingIndicator.style.color = '#ff6b6b';
                console.error('基础查看器：图片加载失败');
            };
            
            // 关闭查看器的函数
            function closeBasicViewer() {
                // 清理通过 addEventListener 添加的事件监听器
                cleanupEventListeners();
                            
                // 清理全局事件监听器
                document.removeEventListener('keydown', escHandler);
                            
                // 移除查看器容器
                if (viewerContainer.parentNode) {
                    viewerContainer.parentNode.removeChild(viewerContainer);
                }
                            
                // 重新启用页面滚动
                document.body.style.overflow = '';
                            
                // 清理图片资源
                if (img) {
                    img.onload = null;
                    img.onerror = null;
                    img.onclick = null;
                    // 释放 Blob URL（如果存在）
                    if (img.src && img.src.startsWith('blob:')) {
                        try {
                            URL.revokeObjectURL(img.src);
                            console.log('🔓 已释放基础查看器的 Blob URL');
                        } catch (error) {
                            console.warn('释放 Blob URL 失败:', error);
                        }
                    }
                }
                            
                // 清理按钮事件
                if (closeBtn) {
                    closeBtn.onclick = null;
                    closeBtn.onkeydown = null;
                    closeBtn.onmouseenter = null;
                    closeBtn.onmouseleave = null;
                }
                            
                console.log('基础查看器已关闭并清理资源');
            }
            
            // 绑定关闭事件
            viewerContainer.onclick = closeBasicViewer;
            
            // 确保关闭按钮事件正确绑定
            const clickHandler = (e) => {
                e.stopPropagation();
                e.preventDefault();
                closeBasicViewer();
            };
            
            const keydownHandler = (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    closeBasicViewer();
                }
            };
            
            closeBtn.addEventListener('click', clickHandler);
            closeBtn.addEventListener('keydown', keydownHandler);
            
            // 在关闭函数中添加对应的移除操作
            const cleanupEventListeners = () => {
                closeBtn.removeEventListener('click', clickHandler);
                closeBtn.removeEventListener('keydown', keydownHandler);
            };
            
            // 确保按钮可获得焦点
            closeBtn.tabIndex = 0;
            
            // ESC 键关闭
            const escHandler = (e) => {
                if (e.key === 'Escape') {
                    closeBasicViewer();
                    document.removeEventListener('keydown', escHandler);
                }
            };
            document.addEventListener('keydown', escHandler);
            
            // 防止事件冒泡到容器
            img.onclick = (e) => e.stopPropagation();
            imgContainer.onclick = (e) => e.stopPropagation();
            
            console.log('基础图片查看器启动成功');
        }

        <h3 style="margin-top: 0; color: #d00; text-align: center;">错误日志</h3>
        <div id="errorLogContent" style="max-height: 200px; overflow-y: auto;"></div>
        <button id="clearErrorLog" class="normal_button" style="background-color: #ff1100; color: #fff; margin-top: 10px; display: block; margin-left: auto; margin-right: auto;">清空日志</button>
    </div>
</div>


<script>
    // =============================================
    // 安全函数
    // =============================================
    
    /**
     * HTML 转义函数，防止 XSS 攻击
     * @param {string} str - 需要转义的字符串
     * @returns {string} 转义后的安全字符串
     */
    function escapeHtml(str) {
        if (typeof str !== 'string') return String(str);
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#x27;')
            .replace(/\//g, '&#x2F;');
    }
    
    /**
     * WebP支持检测结果缓存
     * @type {Promise<boolean>|null}
     */
    let webpSupportCache = null;
    
    /**
     * 检测浏览器是否支持WebP格式（带缓存优化）
     * @returns {Promise<boolean>} 是否支持WebP
     * 
     * 优化：首次检测后缓存结果，避免重复创建Canvas检测
     */
    function isWebPSupported() {
        // 如果已有缓存结果，直接返回
        if (webpSupportCache !== null) {
            return webpSupportCache;
        }
        
        // 首次检测并缓存结果
        webpSupportCache = new Promise((resolve) => {
            const canvas = document.createElement('canvas');
            canvas.width = 1;
            canvas.height = 1;
            try {
                canvas.toBlob((blob) => {
                    const supported = blob !== null;
                    console.log(`WebP 支持检测: ${supported ? '支持' : '不支持'}`);
                    resolve(supported);
                }, 'image/webp');
            } catch (e) {
                console.warn('WebP 支持检测失败:', e);
                resolve(false);
            }
        });
        
        return webpSupportCache;
    }
    
    /**
     * 全局遮罩层清理函数
     * 清理页面上所有残留的处理中遮罩层
     * 作为异常情况下的最终保障措施
     */
    function cleanupAllProcessingOverlays() {
        try {
            const allOverlays = document.querySelectorAll('.processing-overlay');
            let cleanedCount = 0;
            
            allOverlays.forEach(overlay => {
                if (overlay && overlay.parentNode) {
                    overlay.remove();
                    cleanedCount++;
                }
            });
            
            if (cleanedCount > 0) {
                console.log(`已清理 ${cleanedCount} 个残留的处理遮罩层`);
            }
            
            return cleanedCount;
        } catch (error) {
            console.error('全局遮罩层清理失败:', error);
            return 0;
        }
    }
    
    // =============================================
    // 统一存储抽象层 (StorageAdapter)
    // =============================================

    /**
     * 根据当前环境选择存储后端
     * - 非 file 协议且支持 Cache API 时使用 CacheStorage（性能更优）
     * - 否则降级使用 IndexedDB
     */
    class StorageAdapter {
        constructor() {
            this.backend = null;
            this.isCacheApi = false;
            this.dbName = 'ImageObfuscationDB';
            this.storeName = 'imageBlobs';
            this.db = null;
            this.cacheName = 'image-obfuscation-cache-v1';
            this.ready = this._init();
        }
    
        async _init() {
            // 检测是否可以使用 Cache API（排除 file:// 协议）
            const isCacheSupported = typeof window.caches !== 'undefined' && location.protocol !== 'file:';
            if (isCacheSupported) {
                try {
                    // 尝试打开缓存，验证可用性
                    await caches.open(this.cacheName);
                    this.isCacheApi = true;
                    this.backend = await caches.open(this.cacheName);
                    console.log('✅ 使用 Cache API');
                    // 更新 UI 指示器
                    setTimeout(() => updateCacheIndicator('Cache API'), 100);
                    return;
                } catch (e) {
                    console.warn('Cache API 不可用，降级到 IndexedDB', e);
                }
            }
            // 降级到 IndexedDB
            this.isCacheApi = false;
            await this._initIndexedDB();
            console.log('✅ 使用 IndexedDB');
            // 更新 UI 指示器
            setTimeout(() => updateCacheIndicator('IndexedDB'), 100);
        }
    
        async _initIndexedDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(this.dbName, 1);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    this.db = request.result;
                    resolve();
                };
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(this.storeName)) {
                        db.createObjectStore(this.storeName);
                    }
                };
            });
        }
    
        async set(key, blob) {
            await this.ready;
            if (this.isCacheApi) {
                // Cache API 存储 Response 对象
                const response = new Response(blob, {
                    headers: { 'Content-Type': blob.type || 'image/png' }
                });
                await this.backend.put(key, response);
            } else {
                // IndexedDB 存储
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction([this.storeName], 'readwrite');
                    const store = transaction.objectStore(this.storeName);
                    const request = store.put(blob, key);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => resolve();
                });
            }
        }
    
        async get(key) {
            await this.ready;
            if (this.isCacheApi) {
                const response = await this.backend.match(key);
                if (!response) return null;
                return response.blob();
            } else {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction([this.storeName], 'readonly');
                    const store = transaction.objectStore(this.storeName);
                    const request = store.get(key);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => resolve(request.result || null);
                });
            }
        }
    
        async delete(key) {
            await this.ready;
            if (this.isCacheApi) {
                await this.backend.delete(key);
            } else {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction([this.storeName], 'readwrite');
                    const store = transaction.objectStore(this.storeName);
                    const request = store.delete(key);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => resolve();
                });
            }
        }
    
        async clear() {
            await this.ready;
            if (this.isCacheApi) {
                const keys = await this.backend.keys();
                for (const key of keys) {
                    await this.backend.delete(key);
                }
            } else {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction([this.storeName], 'readwrite');
                    const store = transaction.objectStore(this.storeName);
                    const request = store.clear();
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => resolve();
                });
            }
        }
    }

    // ==================== ZIP 文件处理功能 ====================

    /**
     * 解压 ZIP 文件并添加其中的图片
     * @param {File} zipFile - ZIP 文件对象
     * @returns {Promise<{added: number, errors: Array}>}
     */
    async function extractZipAndAddImages(zipFile) {
        // 等待 fflate 加载完成（最多 5 秒）
        if (typeof fflate === 'undefined') {
            for (let i = 0; i < 50; i++) {
                await new Promise(r => setTimeout(r, 100));
                if (typeof fflate !== 'undefined') break;
            }
            if (typeof fflate === 'undefined') {
                console.error('fflate 库未加载，无法解压 ZIP');
                logError(zipFile.name, 'fflate 库未加载，无法解压 ZIP');
                return { added: 0, errors: [{ name: zipFile.name, error: 'fflate 库未加载' }] };
            }
        }
        
        const statusDiv = document.getElementById('batchStatus');
        statusDiv.innerHTML = `<div class="loading"></div> 正在解析 ZIP 文件...`;

        try {
            // 读取 ZIP 文件为 Uint8Array
            const arrayBuffer = await zipFile.arrayBuffer();
            const zipData = new Uint8Array(arrayBuffer);

            // 使用 fflate 解压
            const unzipped = await new Promise((resolve, reject) => {
                fflate.unzip(zipData, (err, data) => {
                    if (err) reject(err);
                    else resolve(data);
                });
            });

            const imageFiles = [];
            const errors = [];

            // 遍历 ZIP 中的所有文件
            for (const [filename, fileData] of Object.entries(unzipped)) {
                // 跳过目录（以 / 结尾的条目）
                if (filename.endsWith('/')) continue;

                // 检查是否为图片文件（扩展名）
                const ext = filename.split('.').pop()?.toLowerCase();
                const imageExts = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'bmp', 'tiff', 'svg'];
                if (!imageExts.includes(ext)) continue;

                // 提取文件名（去掉路径前缀）
                const baseName = filename.split('/').pop();
                if (!baseName) continue;

                try {
                    // MIME 类型映射表
                    const mimeMap = {
                        jpg: 'image/jpeg', jpeg: 'image/jpeg', png: 'image/png',
                        gif: 'image/gif', webp: 'image/webp', bmp: 'image/bmp',
                        tiff: 'image/tiff', svg: 'image/svg+xml'
                    };
                    const mime = mimeMap[ext] || 'application/octet-stream';
                    
                    // 创建 Blob 并转换为 File 对象
                    const blob = new Blob([fileData], { type: mime });
                    const file = new File([blob], baseName, { type: blob.type });
                    imageFiles.push(file);
                } catch (e) {
                    errors.push({ name: baseName, error: e.message });
                    logError(baseName, `ZIP 解压提取失败: ${e.message}`);
                }
            }

            if (imageFiles.length === 0) {
                statusDiv.innerHTML = '⚠️ ZIP 文件中未找到支持的图片格式';
                setTimeout(() => statusDiv.innerHTML = '', 3000);
                return { added: 0, errors };
            }

            statusDiv.innerHTML = `<div class="loading"></div> 正在添加 ${imageFiles.length} 张图片...`;

            // 逐个添加图片
            let added = 0;
            for (let i = 0; i < imageFiles.length; i++) {
                try {
                    await addImage(imageFiles[i]);
                    added++;
                    // 更新进度
                    const progress = Math.round((i + 1) / imageFiles.length * 100);
                    statusDiv.innerHTML = `正在添加图片 ${i + 1}/${imageFiles.length} (${progress}%)<div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>`;
                    await new Promise(resolve => setTimeout(resolve, 0));
                } catch (e) {
                    errors.push({ name: imageFiles[i].name, error: e.message });
                    logError(imageFiles[i].name, `添加失败: ${e.message}`);
                }
            }

            statusDiv.innerHTML = `✅ 已从 ZIP 添加 ${added} 张图片${errors.length ? `，${errors.length} 个文件失败` : ''}`;
            setTimeout(() => statusDiv.innerHTML = '', 3000);

            return { added, errors };

        } catch (error) {
            console.error('ZIP 解压失败:', error);
            statusDiv.innerHTML = `❌ ZIP 解压失败: ${error.message}`;
            setTimeout(() => statusDiv.innerHTML = '', 3000);
            logError(zipFile.name, `ZIP 解压失败: ${error.message}`);
            return { added: 0, errors: [{ name: zipFile.name, error: error.message }] };
        }
    }

    /**
     * 打包下载选中的图片为 ZIP 文件
     * @param {string} format - 保存格式：'png'|'jpg'|'bmp'|'webp'
     * @returns {Promise<void>}
     */
    async function saveImagesAsZip(format) {
        // 防御性检测：检查 fflate 是否可用
        if (typeof fflate === 'undefined') {
            console.error('fflate 未加载，ZIP 打包功能不可用');
            const statusDiv = document.getElementById('batchStatus');
            statusDiv.innerHTML = '❌ ZIP 打包功能不可用（fflate 库未加载）';
            setTimeout(() => statusDiv.innerHTML = '', 3000);
            return;
        }
        
        const targetIds = selectedImages.size > 0
            ? Array.from(selectedImages)
            : images.map(img => img.id);

        if (targetIds.length === 0) {
            const statusDiv = document.getElementById('batchStatus');
            statusDiv.innerHTML = '⚠️ 请先选择图片';
            setTimeout(() => statusDiv.innerHTML = '', 2000);
            return;
        }

        const statusDiv = document.getElementById('batchStatus');
        statusDiv.innerHTML = `<div class="loading"></div> 正在准备打包 ${targetIds.length} 张图片...`;

        // 提前检测 WebP 支持（避免循环内重复 await）
        const webpSupported = format.toLowerCase() === 'webp' ? await isWebPSupported() : false;

        // 收集所有图片 Blob 并转换为目标格式
        const filesToZip = [];
        let successCount = 0;
        let failureCount = 0;

        for (let i = 0; i < targetIds.length; i++) {
            const imageId = targetIds[i];
            const imageData = images.find(img => img.id === imageId);
            if (!imageData) {
                failureCount++;
                continue;
            }

            try {
                const blob = await storage.get(`current_${imageData.id}`);
                if (!blob) {
                    failureCount++;
                    logError(imageData.name, '图片数据不存在');
                    continue;
                }

                const targetFormat = format.toLowerCase();
                if (targetFormat === 'webp' && !webpSupported) {
                    failureCount++;
                    logError(imageData.name, '浏览器不支持 WebP');
                    continue;
                }

                const outputBlob = await convertImageBlob(blob, targetFormat);

                // 生成文件名（使用 getStatusSuffix 基于 scrambleLevel）
                const ext = targetFormat === 'jpeg' ? 'jpg' : targetFormat;
                const statusSuffix = getStatusSuffix(imageData.scrambleLevel);
                const fileName = `${imageData.name.replace(/\.[^/.]+$/, '')}_${statusSuffix}.${ext}`;

                // 读取为 Uint8Array 供 fflate 使用
                const arrayBuffer = await outputBlob.arrayBuffer();
                filesToZip.push({
                    name: fileName,
                    data: new Uint8Array(arrayBuffer)
                });
                successCount++;

                // 更新进度
                const progress = Math.round((i + 1) / targetIds.length * 100);
                statusDiv.innerHTML = `正在处理 ${i + 1}/${targetIds.length} (${progress}%)<div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>`;
                await new Promise(resolve => setTimeout(resolve, 0));

            } catch (error) {
                console.error(`打包图片失败: ${imageData.name}`, error);
                failureCount++;
                logError(imageData.name, `打包失败: ${error.message || '未知错误'}`);
            }
        }

        if (successCount === 0) {
            statusDiv.innerHTML = `❌ 打包失败，没有可用的图片`;
            setTimeout(() => statusDiv.innerHTML = '', 3000);
            return;
        }

        // 使用 fflate 创建 ZIP
        statusDiv.innerHTML = `<div class="loading"></div> 正在创建 ZIP 文件...`;
        await new Promise(resolve => setTimeout(resolve, 10));

        try {
            // 构建 zip 数据对象
            const zipObj = {};
            for (const file of filesToZip) {
                zipObj[file.name] = file.data;
            }

            // 压缩为 ZIP (level: 1 - 最快压缩)
            const zipData = await new Promise((resolve, reject) => {
                fflate.zip(zipObj, { level: 1 }, (err, data) => {
                    if (err) reject(err);
                    else resolve(data);
                });
            });

            // 下载 ZIP 文件
            const zipBlob = new Blob([zipData], { type: 'application/zip' });
            const timestamp = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
            downloadBlob(zipBlob, `混淆图片_${timestamp}.zip`);

            statusDiv.innerHTML = `✅ 打包完成，已下载 ${successCount} 张图片${failureCount ? `，${failureCount} 张失败` : ''}`;
            setTimeout(() => statusDiv.innerHTML = '', 3000);

        } catch (error) {
            console.error('ZIP 创建失败:', error);
            statusDiv.innerHTML = `❌ ZIP 创建失败: ${error.message}`;
            setTimeout(() => statusDiv.innerHTML = '', 3000);
            logError('ZIP打包', `创建失败: ${error.message}`);
        }
    }

    // 全局存储实例
    const storage = new StorageAdapter();
    
    /** @type {Object|null} 当前移动端气泡关闭监听器 */
    let mobileTooltipListener = null;
    /** @type {Object} 缓存指示器 touch 滚动监听器引用（防泄漏） */
    let cacheIndicatorTouchListeners = null;

    /**
     * 更新缓存方案指示器显示
     * @param {string} cacheType - 缓存类型
     */
    function updateCacheIndicator(cacheType) {
        const indicator = document.getElementById('cacheIndicator');
        if (indicator) {
            indicator.textContent = cacheType;
            indicator.style.display = 'block';
            // 设置气泡提示数据
            const tooltipText = cacheType === 'Cache API' 
                ? '当前使用 Cache API 存储(性能更优)' 
                : '当前使用 IndexedDB 存储';
            indicator.setAttribute('data-tooltip', tooltipText);
            indicator.removeAttribute('title');
            
            // 清理旧的监听器
            if (mobileTooltipListener) {
                document.removeEventListener('click', mobileTooltipListener);
                mobileTooltipListener = null;
            }
            // 清理旧的 onclick
            indicator.onclick = null;

            // 移动端点击事件
            if (window.innerWidth <= 768) {
                indicator.onclick = function(e) {
                    e.stopPropagation();
                    // 切换气泡显示
                    this.classList.toggle('tooltip-active');
                    
                    // 重新绑定全局点击监听，确保每次打开都能正确关闭
                    if (mobileTooltipListener) {
                        document.removeEventListener('click', mobileTooltipListener);
                    }
                    mobileTooltipListener = function closeTooltip(ev) {
                        if (!indicator.contains(ev.target)) {
                            indicator.classList.remove('tooltip-active');
                            document.removeEventListener('click', mobileTooltipListener);
                            mobileTooltipListener = null;
                        }
                    };
                    // 使用 setTimeout 避免立即触发本次点击的全局监听
                    setTimeout(() => {
                        document.addEventListener('click', mobileTooltipListener);
                    }, 0);
                };

                // 清理旧的 touch 滚动监听器，防止重复绑定
                if (cacheIndicatorTouchListeners) {
                    document.removeEventListener('touchstart', cacheIndicatorTouchListeners);
                    document.removeEventListener('touchmove', cacheIndicatorTouchListeners);
                }
                // 移动端滑动页面时关闭气泡
                let startY = 0;
                const closeOnScroll = (e) => {
                    if (!indicator.classList.contains('tooltip-active')) return;
                    if (e.type === 'touchstart') {
                        startY = e.touches[0].clientY;
                    } else if (Math.abs(e.touches[0].clientY - startY) > 10) {
                        indicator.classList.remove('tooltip-active');
                    }
                };
                cacheIndicatorTouchListeners = closeOnScroll;
                document.addEventListener('touchstart', closeOnScroll, { passive: true });
                document.addEventListener('touchmove', closeOnScroll, { passive: true });
            }
        }
    }

    /**
     * 检测屏幕边缘，防止气泡超出屏幕
     * @param {HTMLElement} el
     */
    function checkTooltipEdge(el) {
        const rect = el.getBoundingClientRect();
        const tooltipWidth = 200; // 估算气泡宽度（px）
        const centerX = rect.left + rect.width / 2;
        el.classList.remove('edge-left', 'edge-right');
        if (centerX - tooltipWidth / 2 < 10) {
            el.classList.add('edge-left');
        } else if (centerX + tooltipWidth / 2 > window.innerWidth - 10) {
            el.classList.add('edge-right');
        }
    }

    /**
     * 为文字气泡元素绑定PC悬停+移动端点击，含屏幕边缘检测
     * @param {HTMLElement} el
     */
    function initTextTooltip(el) {
        // PC端：鼠标进入时检测边缘
        el.addEventListener('mouseenter', () => checkTooltipEdge(el));
        el.addEventListener('mouseleave', () => el.classList.remove('edge-left', 'edge-right'));

        // 移动端点击行为
        if (window.innerWidth > 768) return;
        let listener = null;
        let startY = 0;

        el.addEventListener('click', function(e) {
            e.stopPropagation();
            el.classList.toggle('tooltip-active');

            if (el.classList.contains('tooltip-active')) {
                checkTooltipEdge(el);
                if (listener) document.removeEventListener('click', listener);
                listener = function closeTooltip(ev) {
                    if (!el.contains(ev.target)) {
                        el.classList.remove('tooltip-active', 'edge-left', 'edge-right');
                        document.removeEventListener('click', listener);
                        listener = null;
                    }
                };
                setTimeout(() => document.addEventListener('click', listener), 0);
            } else {
                el.classList.remove('edge-left', 'edge-right');
                if (listener) {
                    document.removeEventListener('click', listener);
                    listener = null;
                }
            }
        });

        const closeOnScroll = (e) => {
            if (!el.classList.contains('tooltip-active')) return;
            if (e.type === 'touchstart') {
                startY = e.touches[0].clientY;
            } else if (Math.abs(e.touches[0].clientY - startY) > 10) {
                el.classList.remove('tooltip-active', 'edge-left', 'edge-right');
            }
        };
        document.addEventListener('touchstart', closeOnScroll, { passive: true });
        document.addEventListener('touchmove', closeOnScroll, { passive: true });
    }

    // =============================================
    // 全局变量声明
    // =============================================

    /** @type {Array} 存储所有图片数据的数组 */
    let images = [];
    /** @type {Set<string>} 存储选中图片 ID 的集合 */
    let selectedImages = new Set();
    /** @type {boolean} 处理状态标志，防止重复处理 */
    let isProcessing = false;
    /** @type {boolean} 首次导入文件标志 */
    let hasImportedFiles = false;
    /** @type {Object|null} Viewer.js 实例 */
    let viewerInstance = null;
    /** @type {boolean} 预览取消标志 */
    let previewCanceled = false;
    /** @type {boolean} 调试模式标志 */
    let debugMode = false;
    /** @type {boolean} 本地存储开关 */
    let localStorageEnabled = true;
    /** @type {boolean} 使用 Viewer.js 查看器 */
    let useViewerJs = true;
    /** @type {boolean} 使用 iro.js 颜色选择器 */
    let useIroJs = true;

    // 覆盖 console.log：调试模式关闭时仅输出缓存方法相关日志
    (function setupConsoleLog() {
        const _origLog = console.log.bind(console);
        const cacheKeywords = ['✅ 使用 Cache API', '✅ 使用 IndexedDB'];
        console.log = function(...args) {
            if (debugMode || cacheKeywords.some(k => args.some(a => typeof a === 'string' && a.includes(k)))) {
                _origLog(...args);
            }
        };
    })();

    // ==================== 视图模式管理 ====================

     */
    function logError(fileName, reason, metadata = {}) {
        const errorLogPanel = document.getElementById('errorLogPanel');
        const errorLogContent = document.getElementById('errorLogContent');

        // 统一由ErrorLogManager管理日志数据
        const logEntry = ErrorLogManager.add(fileName, reason, metadata);

        // 显示错误日志面板

        // 创建错误日志项（使用HTML转义防止XSS）

        errorItem.className = 'error-log-item';
        errorItem.dataset.logId = logEntry.id; // 关联日志ID便于管理
        errorItem.innerHTML = `<span class="error-timestamp">[${logEntry.formattedTime}]</span> <span class="error-file-name">${escapeHtml(logEntry.fileName)}</span><span class="error-reason"> - ${escapeHtml(logEntry.reason)}</span>`;
        
        // 添加鼠标悬停效果（可选）
        errorItem.style.cursor = 'default';
        errorItem.onmouseover = function() {
            this.style.backgroundColor = '#fff0f0';
        };
        errorItem.onmouseout = function() {
            this.style.backgroundColor = '';
        };
        
        // 添加到错误日志内容顶部
        if (errorLogContent.firstChild) {
            errorLogContent.insertBefore(errorItem, errorLogContent.firstChild);
        } else {
            errorLogContent.appendChild(errorItem);
        }
        
        // 限制最多显示 100 条错误日志，超出时自动移除最早的条目
        const MAX_ERROR_LOGS = 100;
        const errorItems = errorLogContent.querySelectorAll('.error-log-item');
        if (errorItems.length > MAX_ERROR_LOGS) {
            // 移除最旧的条目（位于末尾）
            const oldestItem = errorItems[errorItems.length - 1];
            if (oldestItem && oldestItem.parentNode) {
                // 通过 ErrorLogManager.remove() 方法统一清理数据和 DOM，保持数据一致性
                const logId = oldestItem.dataset.logId;
                ErrorLogManager.remove(logId);
                // 从 DOM 中移除对应的元素
                oldestItem.parentNode.removeChild(oldestItem);
                console.log(`🗑️ 已从 UI 层移除最旧错误日志：${logId}`);
            }
        }

        console.warn(`📝 错误已记录: ${fileName} - ${reason}`);
    }
    
    /** @type {Array<Object>} 错误日志数据存储 */
    let errorLogs = [];
    
    // =============================================
    // 错误日志管理器
    // =============================================
    
    /**
     * 错误日志管理器
     * 用于管理错误日志的添加、查询和清理
     */
    const ErrorLogManager = {
        /**
         * 添加错误日志
         * @param {string} fileName - 文件名
         * @param {string} reason - 错误原因
         * @param {Object} [metadata] - 可选的元数据
         */
        add(fileName, reason, metadata = {}) {
            const timestamp = new Date();
            const logEntry = {
                id: Date.now().toString(36) + Math.random().toString(36).substring(2),
                fileName,
                reason,
                timestamp,
                formattedTime: timestamp.toLocaleString('zh-CN', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false
                }),
                metadata: metadata,
                // 未来可能添加的字段：
                // blobUrl: null,  // 如果需要存储图片预览
                // previewData: null  // 预览数据
            };
            
            errorLogs.push(logEntry);
            
            // 限制最大的日志数量，防止内存泄漏
            const MAX_LOGS = 100;
            if (errorLogs.length > MAX_LOGS) {
                const removedLogs = errorLogs.splice(0, errorLogs.length - MAX_LOGS);
                // 清理被移除日志的资源
                this.cleanupLogs(removedLogs);
                console.log(`🗑️ 已从数据层清理${removedLogs.length}条错误日志`);
            }
            
            return logEntry;
        },
        
        /**
         * 获取所有错误日志
         * @returns {Array<Object>} 错误日志数组
         */
        getAll() {
            return [...errorLogs];
        },
        
        /**
         * 清理错误日志
         * @param {Array<Object>} [logs] - 要清理的日志数组，如果不提供则清理所有日志
         */
        cleanupLogs(logs = errorLogs) {
            logs.forEach(log => {
                // 通用Blob URL清理：遍历metadata中所有以blob:开头的字符串
                if (log.metadata) {
                    Object.keys(log.metadata).forEach(key => {
                        const value = log.metadata[key];
                        // 检查是否为blob URL字符串
                        if (typeof value === 'string' && value.startsWith('blob:')) {
                            try {
                                URL.revokeObjectURL(value);
                                console.log(`已释放错误日志中的Blob URL [${key}]:`, value);
                            } catch (error) {
                                console.warn(`释放Blob URL [${key}] 失败:`, error);
                            }
                            // 删除已释放的引用
                            delete log.metadata[key];
                        }
                    });
                }
            });
        },
        
        /**
         * 移除错误日志
         * @param {string} logId - 要移除的日志 ID
         * @returns {boolean} 是否成功移除
         */
        remove(logId) {
            const index = errorLogs.findIndex(log => log.id === logId);
            if (index !== -1) {
                const removedLog = errorLogs.splice(index, 1)[0];
                // 清理被移除日志的资源
                this.cleanupLogs([removedLog]);
                return true;
            }
            return false;
        },
        
        /**
         * 清空所有错误日志
         */
        clear() {
            // 先清理资源
            this.cleanupLogs();
            // 再清空数组
            errorLogs = [];
            console.log('✅ 错误日志数据已清空并释放相关资源');
        }
    };

    /**
     * 将图片 Blob 转换为目标格式
     * @param {Blob} blob - 原始图片 Blob
     * @param {string} targetFormat - 目标格式 (png/jpg/jpeg/bmp/webp)
     * @param {Object} [opts] - 选项
     * @returns {Promise<Blob>} 转换后的 Blob
     */
    async function convertImageBlob(blob, targetFormat, opts = {}) {
        const currentType = blob.type;
        const needConvert = !(currentType === `image/${targetFormat}` ||
            (targetFormat === 'jpg' && currentType === 'image/jpeg') ||
            (targetFormat === 'jpeg' && currentType === 'image/jpg'));

        if (!needConvert) return blob;

        const bitmap = await createImageBitmap(blob);
        const canvas = getCanvasFromPool(bitmap.width, bitmap.height);
        try {
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(bitmap, 0, 0);

            if ((targetFormat === 'jpg' || targetFormat === 'jpeg' || targetFormat === 'bmp') && blobMightHaveTransparency(currentType)) {
                ctx.fillStyle = opts.fillColor || opaqueBackgroundColor;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(bitmap, 0, 0);
            }

            bitmap.close();

            if (targetFormat === 'png') {
                return await new Promise(r => canvas.toBlob(r, 'image/png'));
            } else if (targetFormat === 'bmp') {
                const bmpData = await canvasToBMPAsync(canvas);
                return new Blob([bmpData], { type: 'image/bmp' });
            } else if (targetFormat === 'jpg' || targetFormat === 'jpeg') {
                return await new Promise(r => canvas.toBlob(r, 'image/jpeg', opts.quality != null ? opts.quality : imageQuality));
            } else if (targetFormat === 'webp') {
                const webpLossless = opts.lossless != null ? opts.lossless : document.getElementById('webp-lossless-toggle')?.checked;
                const webpQuality = webpLossless ? 1.0 : (opts.quality != null ? opts.quality : imageQuality);
                return await new Promise(r => canvas.toBlob(r, 'image/webp', webpQuality));
            }
            return blob;
        } finally {
            releaseCanvasToPool(canvas);
        }
    }
