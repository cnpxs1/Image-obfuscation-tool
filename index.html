    <!-- Viewer.js 加载状态初始化（必须在 CSS link 之前，避免缓存命中时 onload 竞态） -->
    <script>window.viewerResources = { cssLoaded: false, jsLoaded: false, localFallback: false, promptShown: false, currentCDN: null };</script>

    <!-- Viewer.js CDN 降级（必须在 CSS link 之前定义） -->
    <script>
        (function() {
            const R = window.viewerResources;
            R._resolve = null; R._reject = null; R._timeout = null;

            R._notifyReady = function() {
                if (R.jsLoaded && R.cssLoaded && window.Viewer && R._resolve) {
                    clearTimeout(R._timeout);
                    R._resolve(); R._resolve = R._reject = null;
                }
            };
            R._notifyFailed = function(reason) {
                if (R._reject) {
                    clearTimeout(R._timeout);
                    R._reject(new Error(reason)); R._resolve = R._reject = null;
                }
            };
            window.createViewerFallback = function(tag, url, onLoad, onError) {
                if (R.localFallback) return null;
                const el = document.createElement(tag);
                if (tag === 'link') { el.rel = 'stylesheet'; el.href = url; }
                else { el.src = url; }
                el.onload = function() { if (onLoad) onLoad(); };
                el.onerror = function() { if (onError) onError(); };
                document.head.appendChild(el);
                return el;
            };
            window.loadLocalViewerResource = function(type) {
                if (R.localFallback) return;
                const isCss = type === 'css';
                const url = './assets/viewerjs/viewer.min.' + (isCss ? 'css' : 'js');
                console.warn('[WARN] Viewer.js - CDN 加载失败，尝试本地 ' + type.toUpperCase());

                window.createViewerFallback(isCss ? 'link' : 'script', url,
                    function() {
                        if (isCss) R.cssLoaded = true; else R.jsLoaded = true;
                        R.currentCDN = 'local';
                        console.log('本地 Viewer.js ' + type.toUpperCase() + ' 加载成功');
                        R._notifyReady();
                    },
                    function() {
                        console.error('[ERROR] Viewer.js - 本地 ' + type.toUpperCase() + ' 加载失败');
                        R.localFallback = true;
                        R._notifyFailed('Viewer.js 资源加载失败');
                        if (!R.promptShown) {
                            R.promptShown = true;
                            setTimeout(function() {
                                alert('❌ Viewer.js 资源加载失败\n\n系统将使用基础图片查看器为您展示图片。\n如需完整功能，请检查网络连接或本地资源后刷新页面。');
                            }, 100);
                        }
                    }
                );
            };
            window.loadCDNFallback = function(resourceType, failedCDN) {
                console.warn('[WARN] Viewer.js - ' + failedCDN + ' ' + resourceType + ' 加载失败，降级');
                if (resourceType === 'css') {
                    if (failedCDN === 'bootcdn') {
                        console.log('尝试 cdnjs CSS');
                        window.createViewerFallback('link',
                            'https://cdnjs.cloudflare.com/ajax/libs/viewerjs/1.11.7/viewer.min.css',
                            function() { R.cssLoaded = true; R.currentCDN = 'cdnjs'; console.log('cdnjs CSS 加载成功'); R._notifyReady(); },
                            function() { console.warn('[WARN] Viewer.js - cdnjs CSS 加载失败'); window.loadLocalViewerResource('css'); }
                        );
                    } else { window.loadLocalViewerResource('css'); }
                } else if (resourceType === 'js') {
                    if (failedCDN === 'bootcdn') {
                        console.log('尝试 cdnjs JS');
                        window.createViewerFallback('script',
                            'https://cdnjs.cloudflare.com/ajax/libs/viewerjs/1.11.7/viewer.min.js',
                            function() { R.jsLoaded = true; R.currentCDN = 'cdnjs'; console.log('cdnjs JS 加载成功'); R._notifyReady(); },
                            function() { console.warn('[WARN] Viewer.js - cdnjs JS 加载失败'); window.loadLocalViewerResource('js'); }
                        );
                    } else { window.loadLocalViewerResource('js'); }
                }
            };
        })();
    </script>

    <!-- 第一级：bootcdn CSS -->
    <link id="viewer-css" href="https://cdn.bootcdn.net/ajax/libs/viewerjs/1.11.7/viewer.min.css" rel="stylesheet" onload="if(window.viewerResources){window.viewerResources.cssLoaded=true;window.viewerResources.currentCDN='bootcdn';window.viewerResources._notifyReady();}" onerror="if(window.viewerResources){loadCDNFallback('css','bootcdn')}">
    <!-- 通用 CDN 回退加载函数 -->
    <script>
        // 早期日志存根 — 在日志系统初始化前安全降级到 console
        // 使用 let 赋值而非 function 声明，避免被后面同名 function 声明提前覆盖
        let logLog = function(...args) { console.log(...args); };
        let logInfo = function(fileName, reason, metadata) { console.info('[INFO] ' + fileName + ' - ' + reason, metadata || {}); };
        let logWarn = function(fileName, reason, metadata) { console.warn('[WARN] ' + fileName + ' - ' + reason, metadata || {}); };
        let logError = function(fileName, reason, metadata) { console.error('[ERROR] ' + fileName + ' - ' + reason, metadata || {}); };

        function loadScriptWithFallback(globalName, stateObj, primaryUrl, fallbackUrls, onAllFailed) {
            function tryNext(failedUrl, nextIndex) {
                logWarn(globalName, '加载失败: ' + failedUrl);
                stateObj.loading = false;
                if (nextIndex < fallbackUrls.length) {
                    load(fallbackUrls[nextIndex], nextIndex + 1);
                } else {
                    stateObj.failed = true;
                    logError(globalName, '所有源均加载失败');
                    if (onAllFailed) onAllFailed();
                }
            }

            function load(cdnUrl, index = 0) {
                if (stateObj.loaded || stateObj.loading) return;
                stateObj.loading = true;

                const script = document.createElement('script');
                script.src = cdnUrl;
                script.onload = () => {
                    if (window[globalName] !== undefined) {
                        stateObj.loaded = true;
                        stateObj.loading = false;
                        logLog(globalName + ' 加载成功:', cdnUrl);
                    } else {
                        logWarn(globalName, '脚本加载但未定义，视为失败');
                        tryNext(cdnUrl, index + 1);
                    }
                };
                script.onerror = () => tryNext(cdnUrl, index + 1);
                document.head.appendChild(script);
            }
            load(primaryUrl, 0);
        }
    </script>
    <!-- iro.js 颜色选择器库加载 | 许可证：MIT License -->
    <script>
        window.iroResources = { loaded: false, loading: false, failed: false };

        try {
            if (localStorage.getItem('iroJs') !== 'false') {
                loadScriptWithFallback(
                    'iro', window.iroResources,
                    'https://fastly.jsdelivr.net/npm/@jaames/iro@5.5.2/dist/iro.min.js',
                [
                    'https://unpkg.com/@jaames/iro@5.5.2/dist/iro.min.js',
                    './assets/irojs/iro.js'
                ],
                function() { logError('iro.js', '所有源均加载失败，颜色选择器功能将不可用'); }
            );
            }
        } catch (e) {
            // localStorage 不可用时跳过 iro.js 按需加载
        }
    </script>
    <!-- fflate 库加载 - ZIP 压缩/解压 | 许可证：MIT License -->
    <script>
        window.fflateResources = { loaded: false, loading: false, failed: false };

        function disableZipToggle() {
            const zipToggle = document.getElementById('zip-download-toggle');
            if (zipToggle) {
                zipToggle.disabled = true;
                zipToggle.title = 'fflate 库加载失败，ZIP 功能不可用';
            }
        }

        loadScriptWithFallback(
            'fflate', window.fflateResources,
            'https://fastly.jsdelivr.net/npm/fflate@0.8.3/umd/index.min.js',
            [
                'https://unpkg.com/fflate@0.8.3/umd/index.js',
                './assets/fflate/fflate.js'
            ],
            function() {
                logError('fflate', '所有源均加载失败，ZIP 功能将不可用');
                if (document.readyState === 'loading') {
                    document.addEventListener('DOMContentLoaded', disableZipToggle);
                } else {
                    disableZipToggle();
                }
            }
        );
    </script>
    <!--
    图片混淆工具 - 基于希尔伯特曲线的图片混淆算法
    功能：支持图片的混淆、解混淆、还原操作，保持像素空间相关性
    特点：支持批量处理、拖拽上传、多种格式保存
    -->
    <style>
        /* 全局样式 */
        body {
            margin: 0;
            padding: 1rem;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 缓存方案指示器 */
        #cacheIndicator {
            position: fixed;
            top: 5px;
            right: 5px;
            background: #fff;
            color: #333;
            border: 2px solid #4CAF50;
            padding: 5px 8px;
            max-width: 75px;
            border-radius: 6px;
            z-index: 999; /* 低于图片查看器（基础查看器 10000，Viewer.js modal 通常>1000） */
            display: none;
            cursor: default;
            white-space: nowrap;/* 禁止换行 */
        }

        /* 公共气泡样式 */
        #cacheIndicator::after,
        .text-tooltip::after {
            content: attr(data-tooltip);
            position: absolute;
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 4px 8px;
            border-radius: 6px;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            display: none;
        }

        /* 缓存指示器气泡特有样式 */
        #cacheIndicator::after {
            top: 100%;
            right: 0;
            margin-top: 8px;
            font-size: 0.95rem;
            max-width: 250px;
            min-width: 150px;
            line-height: 1.3;
        }

        /* PC端：鼠标悬停显示气泡 */
        @media screen and (min-width: 769px) {
            #cacheIndicator:hover::after {
                display: block;
            }
        }

        /* 移动端适配 */
        @media screen and (max-width: 768px) {
            .main-content {
                position: relative; /* 为缓存指示器提供定位上下文 */
            }

            /* 移动端时缓存指示器相对于 main-content 定位，在其上层并随内容滚动 */
            #cacheIndicator {
                position: absolute;
                top: 5px;
                right: 5px;
                margin-bottom: 10px;
                padding: 5px 8px;
                max-width: 75px;
                cursor: pointer; /* 允许点击 */
            }

            /* 移动端：点击激活时显示气泡 */
            #cacheIndicator.tooltip-active::after {
                display: block;
            }
        }

        /* 通用文字气泡提示 */
        .text-tooltip {
            position: relative;
            cursor: help;
        }
        .text-tooltip::after {
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-bottom: 6px;
            font-size: 0.85rem;
            white-space: nowrap;
            max-width: calc(100vw - 20px);
        }
        /* 屏幕边缘检测：左边缘 */
        .text-tooltip.edge-left::after {
            left: 0;
            transform: none;
        }
        /* 屏幕边缘检测：右边缘 */
        .text-tooltip.edge-right::after {
            left: auto;
            right: 0;
            transform: none;
        }
        /* PC端：鼠标悬停 */
        @media (hover: hover) {
            .text-tooltip:hover::after {
                display: block;
            }
        }
        /* 移动端：点击激活 */
        .text-tooltip.tooltip-active::after {
            display: block;
        }

        /* 通用按钮样式 */
        .normal_button {
            min-width: 4rem;
            height: 2rem;
            line-height: 2rem;
            font-size: 1rem;
            padding: 0 0.5rem;
            margin: 0.3rem;
            border: 0;
            border-radius: 6px;
            display: inline-block;
            position: relative;
            vertical-align: middle;
            cursor: pointer;
        }

        /* 隐藏的文件输入按钮 */
        .ipt_btn {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* 拖放区域样式 */
        .drop-zone {
            margin: 1rem auto;
            padding: 2rem;
            border: 2px dashed #ccc;
            border-radius: 10px;
            text-align: center;
            max-width: 600px;
            cursor: pointer;

        }

        .drop-zone.drag-over,

        }

        /* 图片列表网格布局 */
        .image-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1rem;
            max-width: 1200px;
            margin: 2px auto 2rem auto;
        }

        /* 单个图片项样式 */
        .image-item {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px;
            background: #f9f9f9;
            position: relative;
        }

        /* 缩略图容器 */
        .thumbnail-container {
            position: relative;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 4px;
            background: #f5f5f5;
            cursor: pointer;
        }

        /* 文本截断样式 - 使用更兼容的方式 */
        .text-multiline {
            line-height: 1.4em;
            height: 2.8em;
            overflow: hidden;
            text-align: center;
            word-wrap: break-word;
            width: 100%;
            box-sizing: border-box;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        /* 图片信息显示 */
        .image-info {
            margin-top: 0.5rem;
            font-size: 0.9rem;

            text-align: center;
            min-height: 3.5rem; /* 为两行文本预留空间 */

        }

        /* 图片操作按钮区域 */
        .image-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            margin-top: 0.5rem;
            justify-content: center;
        }

        /* 操作按钮组 - 保证内部按钮不换行 */
        .action-group {
            display: flex;
            gap: 0.3rem;
            flex-wrap: nowrap;
            width: calc(180px + 0.6rem); /* 3 个按钮宽度 (60px*3) + 2 个间隙 (0.3rem*2) */
        }
        
        /* 通用开关样式（不含颜色） */
        .toggle-switch-container {
            display: inline-flex;
            align-items: center;
            height: 2rem;
            padding: 0;
            margin: 0.3rem;
            border: 2px solid;
            border-radius: 6px;
            background: #fff;
            gap: 0.5rem;
            box-sizing: border-box;
        }
        .toggle-switch {
            width: 4rem;
            height: calc(2rem - 4px);
            margin: 0;
            border-radius: 4px;
            display: block;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            transition: 0.3s;
            flex-shrink: 0;
        }
        .toggle-switch input {
            opacity: 0;
            position: absolute;
        }
        .toggle-slider {
            position: absolute;
            inset: 0;
        }
        .toggle-slider::before {
            content: "";
            position: absolute;
            left: 0.25rem;
            top: 50%;
            transform: translateY(-50%);
            width: calc(1.5rem - 2px);
            height: calc(1.5rem - 2px);
            border-radius: 4px;
            background: #fff;
            transition: 0.3s;
        }
        .toggle-switch input:checked + .toggle-slider::before {
            transform: translate(calc(2rem + 2px), -50%);
        }
        .toggle-switch-text {
            position: relative;
            top: -1px;
        }
        .toggle-switch-text::before {
            margin-right: 0.5rem;
        }

        /* 打包下载开关：颜色与文本 */
        .zip-download-container {
            border-color: #c8c8c8;
        }
        .zip-download-container:has(input:checked) {
            border-color: #78c878;
        }
        .zip-download-container .toggle-switch {
            background: #b4b4b4;
        }
        .zip-download-container .toggle-switch input:checked + .toggle-slider {
            background: #4caf50;
        }
        .zip-download-text::before {
            content: "逐个下载";
        }
        .zip-download-container:has(input:checked) .zip-download-text::before {
            content: "打包下载";
        }

        /* 设置开关（小尺寸），用于 WebP 无损、调试模式等 */
        .toggle-switch:has(.setting-switch) {
            width: 3rem;
            height: 1.5rem;
            border-radius: 3px;
        }
        .setting-switch + .toggle-slider {
            background: #b4b4b4;
        }
        .setting-switch:checked + .toggle-slider {
            background: #0091ff;
        }
        .setting-switch ~ .toggle-slider::before {
            left: 3px;
            width: calc(1.5rem - 5px);
            height: calc(1.5rem - 5px);
            border-radius: 3px;
        }
        .toggle-switch .setting-switch:checked ~ .toggle-slider::before {
            transform: translate(calc(1.5rem - 1px), -50%);
        }

        /* 删除和保存按钮平均分配空间 */
        .action-group .action-btn {
            flex: 1;

        }

    <!-- Viewer.js 事件驱动加载 -->
    <script>
        window.viewerLoadPromise = null;

        function getViewerLoadPromise() {
            const R = window.viewerResources;

            // 入口处检查：若所有资源已在调用前完成加载，直接返回已解析Promise，避免竞态
            if (window.Viewer && R.jsLoaded && R.cssLoaded) {
                return Promise.resolve();
            }

            if (window.viewerLoadPromise) return window.viewerLoadPromise;

            window.viewerLoadPromise = new Promise(function(resolve, reject) {
                if (R.jsLoaded && R.cssLoaded && window.Viewer) { resolve(); return; }
                if (R.localFallback) { reject(new Error('Viewer.js 资源加载失败')); return; }

                R._resolve = resolve;
                R._reject = reject;

                R._timeout = setTimeout(function() {
                    logError('Viewer.js', '加载超时 (5s)');
                    reject(new Error('Viewer.js 加载超时'));
                    R._resolve = R._reject = null;
                }, 5000);
            }).catch(function(err) {
                clearTimeout(R._timeout);
                window.viewerLoadPromise = null; throw err;
            });

            return window.viewerLoadPromise;
        }
        // 基础图片查看器 - 当所有Viewer.js 资源都失效时的兜底方案
        function showBasicImageViewer(imageData) {
            logLog('启动基础图片查看器');

            // 彻底清理可能存在的旧实例（释放事件监听器 + Blob URL + overflow 状态）
            if (activeBasicViewerClose) {
                activeBasicViewerClose();
                activeBasicViewerClose = null;
            }

            // ========== 创建 DOM 元素 ==========

            const viewerContainer = document.createElement('div');
            viewerContainer.setAttribute('data-basic-viewer', 'true');
            viewerContainer.style.cssText = `
                position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
                background: rgba(0, 0, 0, 0.9); display: flex; align-items: center;
                justify-content: center; z-index: 10000; cursor: zoom-out;
                opacity: 0; transition: opacity 0.2s ease;
            `;

            const img = document.createElement('img');
            img.draggable = false;
            img.src = imageData.blobUrl || imageData.url;
            img.alt = escapeHtml(imageData.originalName);
            img.style.cssText = `
                display: block; max-width: calc(100vw - 50px); max-height: calc(100vh - 50px);
                object-fit: contain; opacity: 0; transition: opacity 0.2s ease;
                -webkit-user-drag: none; user-select: none;
            `;
            img.addEventListener('dragstart', (e) => e.preventDefault());

            const closeBtn = document.createElement('button');
            closeBtn.textContent = '×';
            closeBtn.tabIndex = 0;
            closeBtn.setAttribute('aria-label', '关闭');
            closeBtn.style.cssText = `
                position: absolute; right: 20px; top: 20px; width: 40px; height: 40px;
                background-color: rgba(0, 0, 0, 0.5); border: none; border-radius: 50%;
                color: white; font-size: 24px; font-weight: normal; line-height: 1;
                cursor: pointer; transition: background-color 0.15s, opacity 0.2s ease;
                display: flex; align-items: center; justify-content: center; z-index: 10001;
                opacity: 0;
            `;

            // 组装 DOM
            viewerContainer.appendChild(img);
            viewerContainer.appendChild(closeBtn);

            // ========== 关闭逻辑（统一定义在前） ==========

            const handleCloseClick = (e) => {
                e.stopPropagation();
                e.preventDefault();
                closeBasicViewer();
            };

            const handleCloseKey = (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    closeBasicViewer();
                }
            };

            const handleEscapeKey = (e) => {
                if (e.key === 'Escape') {
                    closeBasicViewer();
                }
            };

            const handleCloseHoverIn = () => {
                closeBtn.style.backgroundColor = 'rgba(0, 0, 0, 0.8)';
            };

            const handleCloseHoverOut = () => {
                closeBtn.style.backgroundColor = 'rgba(0, 0, 0, 0.5)';
            };

            const handleImageStopPropagation = (e) => e.stopPropagation();

            function closeBasicViewer() {
                // 防止重复关闭
                if (closeBasicViewer._called) return;
                closeBasicViewer._called = true;

                // 移除按钮事件
                closeBtn.removeEventListener('click', handleCloseClick);
                closeBtn.removeEventListener('keydown', handleCloseKey);
                closeBtn.removeEventListener('mouseenter', handleCloseHoverIn);
                closeBtn.removeEventListener('mouseleave', handleCloseHoverOut);

                // 移除全局键盘事件
                document.removeEventListener('keydown', handleEscapeKey);

                // 淡出动画，完成后移除 DOM 并释放资源
                viewerContainer.style.opacity = '0';

                let cleaned = false;
                const finalize = () => {
                    if (cleaned) return;
                    cleaned = true;
                    viewerContainer.removeEventListener('transitionend', finalize);
                    if (viewerContainer.parentNode) {
                        viewerContainer.parentNode.removeChild(viewerContainer);
                    }
                    img.onload = null;
                    img.onerror = null;
                    img.onclick = null;
                    if (img.src && img.src.startsWith('blob:')) {
                        try {
                            URL.revokeObjectURL(img.src);
                            logLog('已释放基础查看器的 Blob URL');
                        } catch (error) {
                            logWarn('基础图片查看器', `释放 Blob URL 失败: ${error.message || error}`);
                        }
                    }
                    document.body.style.overflow = '';
                    if (activeBasicViewerClose === closeBasicViewer) {
                        activeBasicViewerClose = null;
                    }
                    logLog('基础查看器已关闭并清理资源');
                };

                viewerContainer.addEventListener('transitionend', finalize);

                // fallback: 若 transitionend 未触发，400ms 后强制清理
                setTimeout(finalize, 400);
            }

            // 注册当前实例的关闭函数，供后续新实例接管时彻底清理
            activeBasicViewerClose = closeBasicViewer;

            // ========== 绑定事件 ==========

            closeBtn.addEventListener('click', handleCloseClick);
            closeBtn.addEventListener('keydown', handleCloseKey);
            closeBtn.addEventListener('mouseenter', handleCloseHoverIn);
            closeBtn.addEventListener('mouseleave', handleCloseHoverOut);
            document.addEventListener('keydown', handleEscapeKey);

            viewerContainer.onclick = closeBasicViewer;
            img.onclick = handleImageStopPropagation;

            // ========== 图片加载回调 ==========

            img.onload = () => {
                logLog('基础查看器：图片加载完成');
            };

            img.onerror = () => {
                logError('基础图片查看器', '图片加载失败');
            };

            // ========== 展示 ==========

            document.body.style.overflow = 'hidden';
            document.body.appendChild(viewerContainer);

            // 背景蒙版先淡入，图片内容和关闭按钮延迟 250ms 后淡入
            requestAnimationFrame(() => {
                viewerContainer.style.opacity = '1';
                setTimeout(() => {
                    img.style.opacity = '1';
                    closeBtn.style.opacity = '1';
                }, 250);
            });

            logLog('基础图片查看器启动成功');
        }
        
    </script>

<script>
    // =============================================
    // 安全函数
    // =============================================
    
    /**
     * HTML 转义函数，防止 XSS 攻击
     * @param {string} str - 需要转义的字符串
     * @returns {string} 转义后的安全字符串
     */
    function escapeHtml(str) {
        if (typeof str !== 'string') return String(str);
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#x27;')
            .replace(/\//g, '&#x2F;');
    }
    
    /**
     * WebP支持检测结果缓存
     * @type {Promise<boolean>|null}
     */
    let webpSupportCache = null;
    
    /**
     * 检测浏览器是否支持WebP格式（带缓存优化）
     * @returns {Promise<boolean>} 是否支持WebP
     * 
     * 优化：首次检测后缓存结果，避免重复创建Canvas检测
     */
    function isWebPSupported() {
        // 如果已有缓存结果，直接返回
        if (webpSupportCache !== null) {
            return webpSupportCache;
        }
        
        // 首次检测并缓存结果
        webpSupportCache = new Promise((resolve) => {
            const canvas = document.createElement('canvas');
            canvas.width = 1;
            canvas.height = 1;
            try {
                canvas.toBlob((blob) => {
                    const supported = blob !== null;
                    logLog(`WebP 支持检测: ${supported ? '支持' : '不支持'}`);
                    resolve(supported);
                }, 'image/webp');
            } catch (e) {
                logWarn('浏览器检测', `WebP 支持检测失败: ${e.message || e}`);
                resolve(false);
            }
        });
        
        return webpSupportCache;
    }
    
    /**
     * 全局遮罩层清理函数
     * 清理页面上所有残留的处理中遮罩层
     * 作为异常情况下的最终保障措施
     */
    function cleanupAllProcessingOverlays() {
        try {
            const allOverlays = document.querySelectorAll('.processing-overlay');
            let cleanedCount = 0;
            
            allOverlays.forEach(overlay => {
                if (overlay && overlay.parentNode) {
                    overlay.remove();
                    cleanedCount++;
                }
            });
            
            if (cleanedCount > 0) {
                logLog(`已清理 ${cleanedCount} 个残留的处理遮罩层`);
            }
            
            return cleanedCount;
        } catch (error) {
            logError('遮罩层清理', `全局遮罩层清理失败: ${error.message || error}`);
            return 0;
        }
    }
    
    // =============================================
    // 统一存储抽象层 (StorageAdapter)
    // =============================================

    /**
     * 根据当前环境选择存储后端
     * - 非 file 协议且支持 Cache API 时使用 CacheStorage（性能更优）
     * - 否则降级使用 IndexedDB
     */
    class StorageAdapter {
        constructor() {
            this.backend = null;
            this.dbName = 'ImageObfuscationDB';
            this.storeName = 'imageBlobs';
            this.db = null;
            this.cacheName = 'image-obfuscation-cache-v1';
            this.ready = this._init();
        }
    
        async _init() {
            // 检测是否可以使用 Cache API（排除 file:// 协议）
            const isCacheSupported = typeof window.caches !== 'undefined' && location.protocol !== 'file:';
            if (isCacheSupported) {
                try {
                    // 启动时删除整个旧缓存（单次操作，避免逐个 delete() 导致长任务阻塞 LCP）
                    await caches.delete(this.cacheName);
                    this.backend = await caches.open(this.cacheName);
                    logLog('使用 Cache API');
                    logLog('已清理旧数据');
                    // 更新 UI 指示器
                    setTimeout(() => updateCacheIndicator('Cache API'), 100);
                    return;
                } catch (e) {
                    // delete 或 open 失败 → 降级 IndexedDB（如私有模式 Safari）
                    logInfo('存储适配层', `Cache API 不可用，降级到 IndexedDB: ${e.message || e}`);
                }
            }
            // 降级到 IndexedDB
            await this._initIndexedDB();
            // 启动时清空所有旧数据
            await new Promise((resolve, reject) => {
                const transaction = this.db.transaction([this.storeName], 'readwrite');
                const store = transaction.objectStore(this.storeName);
                const request = store.clear();
                transaction.oncomplete = () => resolve();
                transaction.onerror = () => reject(transaction.error);
                request.onerror = () => reject(request.error);
            });
            logLog('使用 IndexedDB');
            logLog('已清理旧数据');
            // 更新 UI 指示器
            setTimeout(() => updateCacheIndicator('IndexedDB'), 100);
        }
    
        async _initIndexedDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(this.dbName, 1);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    this.db = request.result;
                    resolve();
                };
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(this.storeName)) {
                        db.createObjectStore(this.storeName);
                    }
                };
            });
        }
    
        async set(key, blob) {
            await this.ready;
            try {
                if (this.backend) {
                    const response = new Response(blob, {
                        headers: { 'Content-Type': blob.type || 'image/png' }
                    });
                    await this.backend.put(key, response);
                } else {
                    await new Promise((resolve, reject) => {
                        const transaction = this.db.transaction([this.storeName], 'readwrite');
                        const store = transaction.objectStore(this.storeName);
                        const request = store.put(blob, key);
                        transaction.onerror = () => reject(transaction.error);
                        request.onerror = () => reject(request.error);
                        request.onsuccess = () => resolve();
                    });
                }
            } catch (err) {
                const name = (err && err.name) || '';
                if (name === 'QuotaExceededError') {
                    const quotaErr = new Error('存储空间已满，请清理部分图片后重试');
                    quotaErr.type = 'quota';
                    throw quotaErr;
                }
                const storageErr = new Error(`存储写入失败: ${err.message || err}`);
                storageErr.type = 'storage';
                storageErr.cause = err;
                throw storageErr;
            }
        }
    
        /** @returns {Promise<Blob|null>} */
        async get(key) {
            await this.ready;
            if (this.backend) {
                const response = await this.backend.match(key);
                if (!response) return null;
                return await response.blob();
            } else {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction([this.storeName], 'readonly');
                    const store = transaction.objectStore(this.storeName);
                    const request = store.get(key);
                    transaction.onerror = () => reject(transaction.error);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => resolve(request.result || null);
                });
            }
        }
    
        async delete(key) {
            await this.ready;
            if (this.backend) {
                await this.backend.delete(key);
            } else {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction([this.storeName], 'readwrite');
                    const store = transaction.objectStore(this.storeName);
                    const request = store.delete(key);
                    transaction.onerror = () => reject(transaction.error);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => resolve();
                });
            }
        }
    
        async clear() {
            await this.ready;
            if (this.backend) {
                await caches.delete(this.cacheName);
                this.backend = await caches.open(this.cacheName);
            } else {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction([this.storeName], 'readwrite');
                    const store = transaction.objectStore(this.storeName);
                    const request = store.clear();
                    transaction.onerror = () => reject(transaction.error);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => resolve();
                });
            }
        }
    }

    // ==================== ZIP 文件处理功能 ====================

    /**
     * 解压 ZIP 文件并添加其中的图片
     * @param {File} zipFile - ZIP 文件对象
     * @returns {Promise<{added: number, errors: Array}>}
     */
    async function extractZipAndAddImages(zipFile) {
        // 等待 fflate 加载完成（最多 5 秒）
        if (typeof fflate === 'undefined') {
            for (let i = 0; i < 50; i++) {
                await new Promise(r => setTimeout(r, 100));
                if (typeof fflate !== 'undefined') break;
            }
            if (typeof fflate === 'undefined') {
                logError(zipFile.name, 'fflate 库未加载，无法解压 ZIP');
                return { added: 0, errors: [{ name: zipFile.name, error: 'fflate 库未加载' }] };
            }
        }
        
        const statusDiv = document.getElementById('batchStatus');
        statusDiv.innerHTML = `<div class="loading"></div> 正在解析 ZIP 文件...`;

        try {
            // 读取 ZIP 文件为 Uint8Array
            const arrayBuffer = await zipFile.arrayBuffer();
            const zipData = new Uint8Array(arrayBuffer);

            // 使用 fflate 解压
            /** @type {Record<string, Uint8Array>} */
            const unzipped = await new Promise((resolve, reject) => {
                fflate.unzip(zipData, (err, data) => {
                    if (err) reject(err);
                    else resolve(data);
                });
            });

            const imageFiles = [];
            const errors = [];

            // 遍历 ZIP 中的所有文件
            for (const [filename, fileData] of Object.entries(unzipped)) {
                // 跳过目录（以 / 结尾的条目）
                if (filename.endsWith('/')) continue;

                // 检查是否为图片文件（扩展名）
                const ext = filename.split('.').pop()?.toLowerCase();
                if (!VALID_EXTENSIONS.includes(ext)) continue;

                // 提取文件名（去掉路径前缀）
                const baseName = filename.split('/').pop();
                if (!baseName) continue;

                try {
                    const mime = MIME_MAP[ext] || 'application/octet-stream';
                    
                    // 创建 Blob 并转换为 File 对象
                    const blob = new Blob([fileData], { type: mime });
                    const file = new File([blob], baseName, { type: blob.type });
                    imageFiles.push(file);
                } catch (e) {
                    errors.push({ name: baseName, error: e.message });
                    logError(baseName, `ZIP 解压提取失败: ${e.message}`);
                }
            }

            if (imageFiles.length === 0) {
                showTempStatus('⚠️ ZIP 文件中未找到支持的图片格式', 3000);
                return { added: 0, errors };
            }

            statusDiv.innerHTML = `<div class="loading"></div> 正在添加 ${imageFiles.length} 张图片...`;

            // 逐个添加图片
            let added = 0;
            for (let i = 0; i < imageFiles.length; i++) {
                try {
                    await addImage(imageFiles[i]);
                    added++;
                    // 更新进度
                    const progress = Math.round((i + 1) / imageFiles.length * 100);
                    statusDiv.innerHTML = `正在添加图片 ${i + 1}/${imageFiles.length} (${progress}%)${progressBarHtml(progress)}`;
                    await new Promise(resolve => setTimeout(resolve, 0));
                } catch (e) {
                    errors.push({ name: imageFiles[i].name, error: e.message });
                    logError(imageFiles[i].name, `添加失败: ${e.message}`);
                }
            }

            showTempStatus(`✅ 已从 ZIP 添加 ${added} 张图片${errors.length ? `，${errors.length} 个文件失败` : ''}`, 3000);

            return { added, errors };

        } catch (error) {
            showTempStatus(`❌ ZIP 解压失败: ${error.message}`, 3000);
            logError(zipFile.name, `ZIP 解压失败: ${error.message}`);
            return { added: 0, errors: [{ name: zipFile.name, error: error.message }] };
        }
    }

    /**
     * 打包下载选中的图片为 ZIP 文件
     * @param {string} format - 保存格式：'png'|'jpg'|'bmp'|'webp'
     * @returns {Promise<void>}
     */
    async function saveImagesAsZip(format) {
        // 防御性检测：检查 fflate 是否可用
        if (typeof fflate === 'undefined') {
            logError('fflate', 'fflate 未加载，ZIP 打包功能不可用');
            showTempStatus('❌ ZIP 打包功能不可用（fflate 库未加载）', 3000);
            return;
        }

        const targetIds = getTargetImageIds();

        if (targetIds.length === 0) {
            showTempStatus('⚠️ 请先选择图片');
            return;
        }

        const statusDiv = document.getElementById('batchStatus');
        statusDiv.innerHTML = `<div class="loading"></div> 正在准备打包 ${targetIds.length} 张图片...`;

        // 提前检测 WebP 支持（避免循环内重复 await）
        const webpSupported = format.toLowerCase() === 'webp' ? await isWebPSupported() : false;

        // 收集所有图片 Blob 并转换为目标格式
        const filesToZip = [];
        let successCount = 0;
        let failureCount = 0;

        for (let i = 0; i < targetIds.length; i++) {
            const imageId = targetIds[i];
            const imageData = images.find(img => img.id === imageId);
            if (!imageData) {
                failureCount++;
                continue;
            }

            try {
                const blob = await storage.get(`current_${imageData.id}`);
                if (!blob) {
                    failureCount++;
                    logError(imageData.name, '图片数据不存在');
                    continue;
                }

                const targetFormat = format.toLowerCase();
                if (targetFormat === 'webp' && !webpSupported) {
                    failureCount++;
                    logError(imageData.name, '浏览器不支持 WebP');
                    continue;
                }

                const outputBlob = await convertImageBlob(blob, targetFormat);

                // 生成文件名（使用 getStatusSuffix 基于 scrambleLevel）
                const ext = getOutputExtension(targetFormat);
                const statusSuffix = getStatusInfo(imageData.scrambleLevel).suffix;
                const fileName = `${imageData.name.replace(/\.[^/.]+$/, '')}_${statusSuffix}.${ext}`;

                // 读取为 Uint8Array 供 fflate 使用
                const arrayBuffer = await outputBlob.arrayBuffer();
                filesToZip.push({
                    name: fileName,
                    data: new Uint8Array(arrayBuffer)
                });
                successCount++;

                // 更新进度
                const progress = Math.round((i + 1) / targetIds.length * 100);
                statusDiv.innerHTML = `正在处理 ${i + 1}/${targetIds.length} (${progress}%)${progressBarHtml(progress)}`;
                await new Promise(resolve => setTimeout(resolve, 0));

            } catch (error) {
                failureCount++;
                logError(imageData.name, `打包失败: ${error.message || '未知错误'}`);
            }
        }

        if (successCount === 0) {
            showTempStatus('❌ 打包失败，没有可用的图片', 3000);
            return;
        }

        // 使用 fflate 创建 ZIP
        statusDiv.innerHTML = `<div class="loading"></div> 正在创建 ZIP 文件...`;
        await new Promise(resolve => setTimeout(resolve, 10));

        try {
            // 构建 zip 数据对象
            const zipObj = {};
            for (const file of filesToZip) {
                zipObj[file.name] = file.data;
            }

            // 压缩为 ZIP (level: 1 - 最快压缩)
            /** @type {Uint8Array} */
            const zipData = await new Promise((resolve, reject) => {
                fflate.zip(zipObj, { level: 1 }, (err, data) => {
                    if (err) reject(err);
                    else resolve(data);
                });
            });

            // 下载 ZIP 文件
            const zipBlob = new Blob([zipData], { type: 'application/zip' });
            const timestamp = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
            downloadBlob(zipBlob, `混淆图片_${timestamp}.zip`);

            showTempStatus(`✅ 打包完成，已下载 ${successCount} 张图片${failureCount ? `，${failureCount} 张失败` : ''}`, 3000);

        } catch (error) {
            showTempStatus(`❌ ZIP 创建失败: ${error.message}`, 3000);
            logError('ZIP打包', `创建失败: ${error.message}`);
        }
    }

    /**
     * 检测屏幕边缘，防止气泡超出屏幕
     * @param {HTMLElement} el
     */
    function checkTooltipEdge(el) {
        const rect = el.getBoundingClientRect();
        const tooltipWidth = 200; // 估算气泡宽度（px）
        const centerX = rect.left + rect.width / 2;
        el.classList.remove('edge-left', 'edge-right');
        if (centerX - tooltipWidth / 2 < 10) {
            el.classList.add('edge-left');
        } else if (centerX + tooltipWidth / 2 > window.innerWidth - 10) {
            el.classList.add('edge-right');
        }
    }

    /**
     * 为文字气泡元素绑定PC悬停+移动端点击，含屏幕边缘检测
     * @param {HTMLElement} el
     */
    function initTextTooltip(el) {
        // PC端：鼠标进入时检测边缘
        el.addEventListener('mouseenter', () => checkTooltipEdge(el));
        el.addEventListener('mouseleave', () => el.classList.remove('edge-left', 'edge-right'));

        // 移动端点击行为
        if (window.innerWidth > 768) return;
        const closer = createClickOutsideCloser(el, ['tooltip-active', 'edge-left', 'edge-right']);

        el.addEventListener('click', function(e) {
            e.stopPropagation();
            el.classList.toggle('tooltip-active');

            if (el.classList.contains('tooltip-active')) {
                checkTooltipEdge(el);
                closer.bind();
            } else {
                el.classList.remove('edge-left', 'edge-right');
                closer.unbind();
            }
        });

        addTouchScrollDismiss(el, true);
    }

    // ==================== 日志系统（四级：Error / Warn / Info / Log） ====================

    /** 日志最大数量限制 */
    const MAX_LOGS = 100;
    /** @type {Array<Object>} 日志数据存储 */
    let logs = [];

    const LEVEL_COLORS = { error: '#d81e06', warn: '#ec7a40', info: '#1296db' };
    const LEVEL_ORDER = ['error', 'warn', 'info']; // 严重程度降序

    /**
     * 日志管理器
     * 统一管理三级日志的添加、查询和清理
     */
    const LogManager = {
        add(fileName, reason, level, metadata = {}) {
            const timestamp = new Date();
            const logEntry = {
                id: Date.now().toString(36) + Math.random().toString(36).substring(2),
                fileName,
                reason,
                level,
                timestamp,
                formattedTime: timestamp.toLocaleString('zh-CN', {
                    year: 'numeric', month: '2-digit', day: '2-digit',
                    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
                }),
                metadata: metadata,
            };
            logs.push(logEntry);
            if (logs.length > MAX_LOGS) {
                const removedLogs = logs.splice(0, logs.length - MAX_LOGS);
                this.cleanupLogs(removedLogs);
            }
            return logEntry;
        },

        cleanupLogs(targetLogs = logs) {
            targetLogs.forEach(log => {
                if (log.metadata) {
                    Object.keys(log.metadata).forEach(key => {
                        const value = log.metadata[key];
                        if (typeof value === 'string' && value.startsWith('blob:')) {
                            try { URL.revokeObjectURL(value); } catch (e) { /* ignore */ }
                            delete log.metadata[key];
                        }
                    });
                }
            });
        },

        remove(logId) {
            const index = logs.findIndex(log => log.id === logId);
            if (index !== -1) {
                const removedLog = logs.splice(index, 1)[0];
                this.cleanupLogs([removedLog]);
                return true;
            }
            return false;
        },

        clear() {
            this.cleanupLogs();
            logs = [];
        },

        getByLevels(levels) {
            if (!levels || levels.size === 0) return logs;
            return logs.filter(l => levels.has(l.level));
        },

        getCounts() {
            return {
                error: logs.filter(l => l.level === 'error').length,
                warn: logs.filter(l => l.level === 'warn').length,
                info: logs.filter(l => l.level === 'info').length
            };
        },

        /** 返回最高严重级别，无日志时返回 null */
        getHighestLevel() {
            for (const lv of LEVEL_ORDER) {
                if (logs.some(l => l.level === lv)) return lv;
            }
            return null;
        }
    };

        const filterKey = levels.size === 0 ? '' : [...levels].sort().join(',');
        if (filterKey !== lastFilter) {
            lastFilter = filterKey;
            renderedLogIds.clear();

            if (filteredLogs.length === 0) {
                list.innerHTML = '<div class="log-panel-empty">暂无日志</div>';
            } else {
                const frag = document.createDocumentFragment();
                for (let i = filteredLogs.length - 1; i >= 0; i--) {
                    frag.appendChild(createLogItem(filteredLogs[i]));
                    renderedLogIds.add(filteredLogs[i].id);
                }
                list.innerHTML = '';
                list.appendChild(frag);
            }
        } else {
            // 同过滤器 → 增量追加新日志到顶部
            pruneRenderedIds(filteredLogs);
            const newLogs = filteredLogs.filter(l => !renderedLogIds.has(l.id));
            if (newLogs.length === 0) {
                renderStats(stats, levels);
                return;
            }

            const empty = list.querySelector('.log-panel-empty');
            if (empty) empty.remove();

            const frag = document.createDocumentFragment();
            for (let i = newLogs.length - 1; i >= 0; i--) {
                frag.appendChild(createLogItem(newLogs[i]));
                renderedLogIds.add(newLogs[i].id);
            }
            list.insertBefore(frag, list.firstChild);

            // 超出上限时移除底部旧 DOM 节点
            while (list.children.length > MAX_LOGS) {
                list.lastElementChild.remove();
            }
        }

        renderStats(stats, levels);
    }

            const color = LEVEL_COLORS[lv];
            const active = levels.has(lv) ? ' active' : '';
            const borderStyle = allActive ? `border-color:${color};` : '';
            return `<button class="log-stat-btn${active}" data-level="${lv}" style="color:${color};${borderStyle}">

    }

        gif: 'image/gif', webp: 'image/webp', bmp: 'image/bmp',

    /**
     * 创建点击外部关闭处理器，用于 tooltip 等浮层组件
     * @param {HTMLElement} el - 目标元素
     * @param {string[]} classList - 关闭时需移除的 CSS 类名
     * @returns {{ bind: Function, unbind: Function }}
     */
    function createClickOutsideCloser(el, classList) {
        let listener = null;
        return {
            bind() {
                if (listener) document.removeEventListener('click', listener);
                listener = (ev) => {
                    if (!el.contains(ev.target)) {
                        el.classList.remove(...classList);
                        document.removeEventListener('click', listener);
                        listener = null;
                    }
                };
                setTimeout(() => document.addEventListener('click', listener), 0);
            },
            unbind() {
                if (listener) {
                    document.removeEventListener('click', listener);
                    listener = null;
                }
            }
        };
    }

    /** 检查 localStorage 是否可用于非保护键 */
    function isStorageEnabledForKey(key) {
        return key === 'localStorageEnabled' || localStorageEnabled;

    /**
     * 创建 ImageBitmap 并自动管理生命周期（消除重复的 createImageBitmap + finally close 模式）
     * @param {Blob} blob - 图片 Blob
     * @param {(bitmap: ImageBitmap) => Promise<any>} callback
     * @returns {Promise<any>} callback 的返回值
     */
    async function withImageBitmap(blob, callback) {
        const bitmap = await createImageBitmap(blob, { premultiplyAlpha: 'none' });
        try {
            return await callback(bitmap);
        } finally {
            bitmap.close();
        }
    }

    /**
     * 将图片 Blob 转换为目标格式
     * @param {Blob} blob - 原始图片 Blob
     * @param {string} targetFormat - 目标格式 (png/jpg/jpeg/bmp/webp)
     * @param {{fillColor?: string, quality?: number, lossless?: boolean}} [opts] - 选项
     * @returns {Promise<Blob>} 转换后的 Blob
     */
    async function convertImageBlob(blob, targetFormat, opts = {}) {
        const currentType = blob.type;
        const needConvert = !(currentType === `image/${targetFormat}` ||
            (targetFormat === 'jpg' && currentType === 'image/jpeg'));

        if (!needConvert) return blob;

        const bitmap = await createImageBitmap(blob, { premultiplyAlpha: 'none' });
        const canvas = getCanvasFromPool(bitmap.width, bitmap.height);
        try {
            const ctx = canvas.getContext('2d', { premultipliedAlpha: false });
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if ((targetFormat === 'jpg' || targetFormat === 'jpeg' || targetFormat === 'bmp') && blobMayHaveTransparency(currentType)) {
                ctx.fillStyle = opts.fillColor || opaqueBackgroundColor;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            ctx.drawImage(bitmap, 0, 0);

            if (targetFormat === 'png') {
                return await new Promise(r => canvas.toBlob(r, 'image/png'));
            } else if (targetFormat === 'bmp') {
                const bmpData = await canvasToBmpAsync(canvas);
                return new Blob([bmpData], { type: 'image/bmp' });
            } else if (targetFormat === 'jpg' || targetFormat === 'jpeg') {
                return await new Promise(r => canvas.toBlob(r, 'image/jpeg', opts.quality != null ? opts.quality : imageQuality));
            } else if (targetFormat === 'webp') {
                const webpLossless = opts.lossless != null ? opts.lossless : document.getElementById('webp-lossless-toggle')?.checked;
                const webpQuality = webpLossless ? 1.0 : (opts.quality != null ? opts.quality : imageQuality);
                return await new Promise(r => canvas.toBlob(r, 'image/webp', webpQuality));
            }
            return blob;
        } finally {
            bitmap.close();
            releaseCanvasToPool(canvas);
        }
    }
